// Pack checklist state: { [packId]: { checked: Set<string>, toGet: Set<string>, notes: {}, qty: {} } }
window._packCheckState = window._packCheckState || {};

function getPackState(packId) {
  if (!window._packCheckState[packId]) {
    window._packCheckState[packId] = { checked: new Set(), toGet: new Set(), notes: {}, qty: {} };
  }
  return window._packCheckState[packId];
}

// ── Load/save checklist state to Supabase packs row (checklist_state JSON column) ──
async function loadPackChecklistState(pack) {
  const packId = pack.id;
  try {
    let stored = null;
    if (pack.checklist_state) {
      stored = typeof pack.checklist_state === 'string' ? JSON.parse(pack.checklist_state) : pack.checklist_state;
    }
    if (stored) {
      window._packCheckState[packId] = {
        checked: new Set(stored.checked || []),
        toGet:   new Set(stored.toGet   || []),
        notes:   stored.notes || {},
        qty:     stored.qty   || {},
      };
    } else {
      window._packCheckState[packId] = { checked: new Set(), toGet: new Set(), notes: {}, qty: {} };
    }
  } catch(e) {
    window._packCheckState[packId] = { checked: new Set(), toGet: new Set(), notes: {}, qty: {} };
  }
}

async function savePackChecklistState(packId) {
  const s = getPackState(packId);
  const payload = {
    checked: [...s.checked],
    toGet:   [...s.toGet],
    notes:   s.notes,
    qty:     s.qty,
  };
  try {
    await getDB().from(T.PACKS).update({ checklist_state: JSON.stringify(payload) }).eq('id', packId);
  } catch(e) { /* best-effort */ }
}

// ── Pack list ──
async function renderPacking() {
  const [rawPacks, inventory] = await Promise.all([
    dbFetch(T.PACKS, {order:['created_at',false]}),
    dbFetch(T.INVENTORY, {order:['item_name',true]}),
  ]);
  window._invCache = inventory;

  // Sort: upcoming trips (start_date >= today) first by nearest date,
  // then past trips (start_date < today) sorted most-recent first,
  // then packs with no date at the end.
  const todayMidnight = new Date(); todayMidnight.setHours(0,0,0,0);
  const upcoming = rawPacks.filter(p => p.start_date && new Date(p.start_date) >= todayMidnight)
    .sort((a,b) => new Date(a.start_date) - new Date(b.start_date));
  const past = rawPacks.filter(p => p.start_date && new Date(p.start_date) < todayMidnight)
    .sort((a,b) => new Date(b.start_date) - new Date(a.start_date));
  const undated = rawPacks.filter(p => !p.start_date);
  const packs = [...upcoming, ...past, ...undated];

  function packCard(p) {
    let ids = [];
    try { ids = Array.isArray(p.item_ids) ? p.item_ids : JSON.parse(p.item_ids||'[]'); } catch(e){}
    const items = ids.map(id => inventory.find(i=>i.item_id===id||i.id===id)).filter(Boolean);
    const thumbs = items.slice(0,4).map(i => i.image
      ? `<img class="thumb" src="${i.image.replace(/"/g,'&quot;')}" alt="" loading="lazy" onerror="this.style.background='var(--bg)'">`
      : `<div class="thumb-placeholder">👗</div>`
    ).join('');
    const dates = [p.start_date,p.end_date].filter(Boolean).map(d=>fmtDate(d)).join(' → ');
    const bagBadge = p.baggage_limit ? `<span style="font-size:11px;font-weight:600;color:var(--accent);background:var(--accent-light);padding:2px 8px;border-radius:99px">${p.baggage_limit}kg</span>` : '';
    const pid = String(p.id).replace(/"/g,'&quot;');
    return `<div class="card" style="padding:16px;margin-bottom:10px;cursor:pointer" data-packid="${pid}" onclick="var c=event.target.closest('.card[data-packid]');if(c)renderPackDetail(c.dataset.packid)">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div style="flex:1;min-width:0;pointer-events:none">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:2px">
            <div class="row-title">${(p.name||'Untitled Pack').replace(/</g,'&lt;')}</div>
            ${bagBadge}
          </div>
          ${dates ? `<div class="row-sub">${dates}</div>` : ''}
          ${p.project ? `<div class="row-sub" style="color:var(--accent);font-weight:500">📁 ${p.project.replace(/</g,'&lt;')}</div>` : ''}
          <div class="row-sub">${items.length} clothing item${items.length!==1?'s':''}</div>
        </div>
        <button class="menu-btn" style="pointer-events:all" onclick="event.stopPropagation();ctxPack(event,'${pid}')">···</button>
      </div>
      ${thumbs ? `<div class="thumb-row" style="pointer-events:none">${thumbs}</div>` : ''}
      <div style="margin-top:10px;font-size:12px;color:var(--accent);font-weight:500;pointer-events:none">Click to pack →</div>
    </div>`;
  }

  root().innerHTML = `
<div class="page">
  <div class="topbar-centered">
    <div class="topbar-centered-title">Packing</div>
    <button class="icon-btn topbar-centered-right" onclick="showAddPackModal()">+</button>
  </div>
  ${wardTabBar('packing')}
  ${packs.length ? packs.map(packCard).join('') : '<div class="card"><div class="row"><div class="muted">No packs yet — tap + to create one</div></div></div>'}
</div>`;
}

// ── Pack detail page ──
async function renderPackDetail(packId) {
  root().innerHTML = '<div class="spinner"></div>';
  const [packs, inventory] = await Promise.all([
    dbFetch(T.PACKS, {eq:{id:packId}}),
    dbFetch(T.INVENTORY, {order:['item_name',true]}),
  ]);
  const pack = packs[0];
  if (!pack) { renderPacking(); return; }
  window._invCache = inventory;

  await loadPackChecklistState(pack);

  window._currentPackId = packId;
  _renderPackDetailUI(pack, inventory);
}

function _renderPackDetailUI(pack, inventory) {
  const packId = pack.id;
  const state  = getPackState(packId);

  const allCheckItems = CHECKLIST_DEF.flatMap(g => g.items);
  const totalCount   = allCheckItems.length;
  const checkedCount = allCheckItems.filter(item => state.checked.has(item) && !state.toGet.has(item)).length;

  let clothingIds = [];
  try { clothingIds = Array.isArray(pack.item_ids) ? pack.item_ids : JSON.parse(pack.item_ids||'[]'); } catch(e){}
  const clothingItems = clothingIds.map(id => inventory.find(i=>i.item_id===id||i.id===id)).filter(Boolean);

  // ── Safe HTML escape ──
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  // ── Checklist HTML ──
  function buildChecklist() {
    return CHECKLIST_DEF.map(group => {
      const visItems = group.items.filter(item => !state.toGet.has(item));
      const checkedInGroup = visItems.filter(i => state.checked.has(i)).length;
      const svgDone  = `<svg viewBox="0 0 20 20" fill="none" width="22" height="22"><circle cx="10" cy="10" r="9" fill="#C8B6A6"/><path d="M6 10l3 3 5-6" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
      const svgEmpty = `<svg viewBox="0 0 20 20" fill="none" width="22" height="22"><circle cx="10" cy="10" r="9" stroke="#D0D0D0" stroke-width="1.5"/></svg>`;

      const rows = group.items.map(item => {
        if (state.toGet.has(item)) return '';
        const checked = state.checked.has(item);
        const qty  = state.qty[item]   || '';
        const note = state.notes[item] || '';
        return `<div class="pk-check-row${checked?' pk-checked':''}" data-item="${esc(item)}">
          <button class="pk-checkbox" data-action="toggle" data-item="${esc(item)}" aria-label="Toggle ${esc(item)}">${checked ? svgDone : svgEmpty}</button>
          <div class="pk-check-label" data-action="toggle" data-item="${esc(item)}" style="cursor:pointer;flex:1">${esc(item)}${qty ? `<span class="pk-qty">${esc(qty)}</span>` : ''}</div>
          <button class="pk-action-btn" data-action="menu" data-item="${esc(item)}" title="Options">···</button>
        </div>${note ? `<div class="pk-note-line">${esc(note)}</div>` : ''}`;
      }).join('');

      return `<div class="pk-group" data-group="${esc(group.group)}">
        <div class="pk-group-header">
          <span class="pk-group-name">${esc(group.group)}</span>
          <span class="pk-group-count">${checkedInGroup}/${visItems.length}</span>
        </div>
        <div class="pk-group-rows">${rows || '<div style="padding:10px 16px;font-size:13px;color:var(--text3)">All items moved to To Get</div>'}</div>
      </div>`;
    }).join('');
  }

  // ── To Get HTML ──
  function buildToGet() {
    const list = [...state.toGet];
    if (!list.length) return `<div style="padding:20px;text-align:center;font-size:13px;color:var(--text3)">No items here yet — use ··· on any checklist item to move it here</div>`;
    return list.map(item => `
      <div class="pk-check-row pk-toget-row" data-item="${esc(item)}">
        <div class="pk-toget-icon">🛒</div>
        <div style="flex:1;font-size:15px;padding:0 8px">${esc(item)}</div>
        <button class="pk-got-btn" data-action="gotit" data-item="${esc(item)}">Got it ✓</button>
      </div>`).join('');
  }

  // ── Clothing HTML ──
  function buildClothing() {
    if (!clothingItems.length) return `<div style="padding:24px 16px;text-align:center;font-size:13px;color:var(--text3)">No clothing selected yet.<br>Tap <strong>Edit clothing</strong> to choose from your wardrobe.</div>`;
    return `<div class="picker-grid" style="max-height:none;padding-bottom:8px">
      ${clothingItems.map(i => {
        const key = esc(i.item_id || i.id || '');
        const pid = esc(packId);
        return `<div class="picker-item selected" data-action="remove-clothing" data-itemid="${key}" data-packid="${pid}" style="cursor:pointer">
          ${i.image ? `<img src="${esc(i.image)}" alt="" loading="lazy" style="width:100%;aspect-ratio:3/4;object-fit:cover;display:block" onerror="this.style.display='none'">` : `<div class="picker-ph">👗</div>`}

          <div class="picker-label">${esc(i.item_name||i.item_id||'')}</div>
        </div>`;
      }).join('')}
    </div>`;
  }

  root().innerHTML = `
<div class="page" id="pk-detail-page">
  <div class="topbar-centered">
    <button class="back-btn" onclick="renderPacking()">‹ Back</button>
    <div class="topbar-centered-title">${esc(pack.name||'Pack')}</div>
    <button class="menu-btn topbar-centered-right" onclick="ctxPack(event,'${esc(packId)}')">···</button>
  </div>

  ${pack.baggage_limit || pack.baggage_notes ? `
  <div class="pk-baggage-bar">
    ${pack.baggage_limit ? `<span class="pk-baggage-limit">🧳 ${esc(String(pack.baggage_limit))}kg limit</span>` : ''}
    ${pack.baggage_notes ? `<span class="pk-baggage-notes">${esc(pack.baggage_notes)}</span>` : ''}
    <span style="flex:1"></span>
    <span style="font-size:12px;color:var(--accent);font-weight:600">${clothingItems.length} item${clothingItems.length!==1?'s':''} packed</span>
  </div>` : `
  <div style="padding:8px 0 10px;display:flex;align-items:center;gap:8px">
    <span style="font-size:12px;color:var(--text2);font-weight:600">${clothingItems.length} clothing item${clothingItems.length!==1?'s':''} packed</span>
  </div>`}
  ${pack.project ? `<div style="padding:4px 0 8px;font-size:13px;color:var(--accent);font-weight:500;cursor:pointer" onclick="openProjectByTitle('${esc(pack.project)}')">📁 ${esc(pack.project)}</div>` : ''}

  <div class="pk-progress-wrap">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <span style="font-size:12px;font-weight:600;color:var(--text2)">Essentials packed</span>
      <span id="pk-prog-label" style="font-size:12px;font-weight:600;color:var(--accent)">${checkedCount} / ${totalCount}</span>
    </div>
    <div class="prog-wrap"><div class="prog-bar" id="pk-prog-bar" style="width:${totalCount ? Math.round(checkedCount/totalCount*100) : 0}%"></div></div>
  </div>

  <div class="tabs">
    <button class="tab active" id="pk-tab-check" onclick="pkSwitchTab('checklist')">Checklist</button>
    <button class="tab" id="pk-tab-toget" onclick="pkSwitchTab('toget')">To Get${state.toGet.size ? ` <span class="pk-tab-badge">${state.toGet.size}</span>` : ''}</button>
    <button class="tab" id="pk-tab-clothing" onclick="pkSwitchTab('clothing')">Clothing${clothingItems.length ? ` <span style="font-size:10px;color:var(--text3)">(${clothingItems.length})</span>` : ''}</button>
  </div>

  <div id="pk-panel-checklist">
    <div id="pk-checklist-content">${buildChecklist()}</div>
    <button class="btn btn-ghost" style="margin-top:8px" onclick="pkResetChecked('${esc(packId)}')">Reset all checks</button>
  </div>

  <div id="pk-panel-toget" class="hidden">
    <div class="card" style="margin-bottom:12px">
      <div id="pk-toget-content">${buildToGet()}</div>
    </div>
    <p style="text-align:center;font-size:12px;color:var(--text3);padding:0 8px">Use ··· on any checklist item → "Move to To Get". Tap "Got it" to move back.</p>
  </div>

  <div id="pk-panel-clothing" class="hidden">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span style="font-size:13px;color:var(--text2)" id="pk-clothing-count">${clothingItems.length} item${clothingItems.length!==1?'s':''} selected</span>
      <button onclick="showEditClothingModal('${esc(packId)}')" style="font-size:13px;font-weight:600;color:var(--accent);background:var(--accent-light);border:none;border-radius:8px;padding:7px 14px;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif">Add Clothes</button>
    </div>
    <div id="pk-clothing-content">${buildClothing()}</div>
  </div>
</div>`;

  // ── Single delegated listener on detail page ──
  document.getElementById('pk-detail-page').addEventListener('click', function(e) {
    const actionEl = e.target.closest('[data-action]');
    if (!actionEl) return;
    e.stopPropagation();
    const action = actionEl.dataset.action;
    const item   = actionEl.dataset.item;

    if (action === 'toggle' && item) { pkToggleCheck(item); return; }
    if (action === 'menu'   && item) { pkShowItemMenu(e, item); return; }
    if (action === 'gotit'  && item) { pkMarkGot(item); return; }
    if (action === 'remove-clothing') {
      const itemid = actionEl.dataset.itemid;
      const pid    = actionEl.dataset.packid;
      if (itemid && pid) pkRemoveClothing(itemid, pid);
      return;
    }
  });

  // Store builders for live refresh
  window._pkBuildChecklist = buildChecklist;
  window._pkBuildToGet     = buildToGet;
  window._pkBuildClothing  = buildClothing;
  window._pkCurrentPack    = pack;
  window._pkCurrentInventory = inventory;
}

function pkSwitchTab(tab) {
  document.getElementById('pk-tab-check').classList.toggle('active', tab === 'checklist');
  document.getElementById('pk-tab-toget').classList.toggle('active', tab === 'toget');
  document.getElementById('pk-tab-clothing').classList.toggle('active', tab === 'clothing');
  document.getElementById('pk-panel-checklist').classList.toggle('hidden', tab !== 'checklist');
  document.getElementById('pk-panel-toget').classList.toggle('hidden', tab !== 'toget');
  document.getElementById('pk-panel-clothing').classList.toggle('hidden', tab !== 'clothing');
}

function pkToggleCheck(item) {
  const packId = window._currentPackId;
  const state  = getPackState(packId);
  if (state.toGet.has(item)) return;
  if (state.checked.has(item)) state.checked.delete(item);
  else state.checked.add(item);
  pkRefreshUI();
  savePackChecklistState(packId);
}

function pkRefreshUI() {
  const packId = window._currentPackId;
  const state  = getPackState(packId);

  const el = document.getElementById('pk-checklist-content');
  if (el && window._pkBuildChecklist) el.innerHTML = window._pkBuildChecklist();

  const tg = document.getElementById('pk-toget-content');
  if (tg && window._pkBuildToGet) tg.innerHTML = window._pkBuildToGet();

  const allItems = CHECKLIST_DEF.flatMap(g => g.items);
  const total   = allItems.length;
  const checked = allItems.filter(i => state.checked.has(i) && !state.toGet.has(i)).length;
  const bar = document.getElementById('pk-prog-bar');
  const lbl = document.getElementById('pk-prog-label');
  if (bar) bar.style.width = (total ? Math.round(checked/total*100) : 0) + '%';
  if (lbl) lbl.textContent = checked + ' / ' + total;

  const togetTab = document.getElementById('pk-tab-toget');
  if (togetTab) togetTab.innerHTML = state.toGet.size
    ? `To Get <span class="pk-tab-badge">${state.toGet.size}</span>`
    : 'To Get';
}

function pkShowItemMenu(e, item) {
  e.stopPropagation();
  showCtx(e, [
    { label: 'Move to To Get', fn: () => pkMoveToGet(item) },
    { label: 'Add qty / note',  fn: () => pkEditMeta(item) },
  ]);
}

function pkMoveToGet(item) {
  const packId = window._currentPackId;
  const state  = getPackState(packId);
  state.toGet.add(item);
  state.checked.delete(item);
  pkRefreshUI();
  savePackChecklistState(packId);
  pkSwitchTab('toget');
}

function pkMarkGot(item) {
  const packId = window._currentPackId;
  const state  = getPackState(packId);
  state.toGet.delete(item);
  pkRefreshUI();
  savePackChecklistState(packId);
}

function pkEditMeta(item) {
  const packId = window._currentPackId;
  const state  = getPackState(packId);
  const curQty  = (state.qty[item]   || '').replace(/"/g,'&quot;');
  const curNote = (state.notes[item] || '').replace(/"/g,'&quot;');
  showModal('Edit item', `
    <div style="margin-bottom:10px;font-size:15px;font-weight:600">${item.replace(/</g,'&lt;')}</div>
    <div class="fg"><label>Quantity</label><input id="f-pk-qty" value="${curQty}" placeholder="e.g. ×2"/></div>
    <div class="fg"><label>Note</label><input id="f-pk-note" value="${curNote}" placeholder="Optional note"/></div>
  `, async () => {
    const qty  = v('f-pk-qty');
    const note = v('f-pk-note');
    if (qty)  state.qty[item]   = qty;   else delete state.qty[item];
    if (note) state.notes[item] = note;  else delete state.notes[item];
    pkRefreshUI();
    savePackChecklistState(packId);
  });
}

function pkResetChecked(packId) {
  if (!confirm('Clear all checks for this pack?')) return;
  const state = getPackState(packId);
  state.checked.clear();
  pkRefreshUI();
  savePackChecklistState(packId);
}

async function pkRemoveClothing(itemId, packId) {
  const pack = window._pkCurrentPack;
  const inv  = window._pkCurrentInventory;
  if (!pack) return;
  let ids = [];
  try { ids = Array.isArray(pack.item_ids) ? pack.item_ids : JSON.parse(pack.item_ids||'[]'); } catch(e){}
  pack.item_ids = JSON.stringify(ids.filter(id => id !== itemId));
  await dbUpdate(T.PACKS, packId, { item_ids: pack.item_ids });
  _renderPackDetailUI(pack, inv);
  pkSwitchTab('clothing');
}

async function showEditClothingModal(packId) {
  const pack      = window._pkCurrentPack;
  const inventory = window._pkCurrentInventory || await dbFetch(T.INVENTORY, {order:['item_name',true]});
  if (!pack) return;
  let selIds = [];
  try { selIds = Array.isArray(pack.item_ids) ? pack.item_ids : JSON.parse(pack.item_ids||'[]'); } catch(e){}

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  const vibeMode = window._vibeMode || '';
  const vm = vibeMode.toLowerCase();
  // Sort: selected first, then vibe-match + available, then rest
  const sortedInv = [...inventory].sort((a, b) => {
    const aSel  = selIds.includes(a.item_id||a.id) ? 0 : 1;
    const bSel  = selIds.includes(b.item_id||b.id) ? 0 : 1;
    if (aSel !== bSel) return aSel - bSel;
    const aAvail = a.status === 'Available' ? 0 : 1;
    const bAvail = b.status === 'Available' ? 0 : 1;
    if (vm) {
      const aM = (a.vibe||'').toLowerCase().includes(vm) ? 0 : 1;
      const bM = (b.vibe||'').toLowerCase().includes(vm) ? 0 : 1;
      const combined = (aM + aAvail) - (bM + bAvail);
      if (combined !== 0) return combined;
    }
    return aAvail - bAvail;
  });

  const pickerHtml = sortedInv.map(i => {
    const key       = esc(i.item_id || i.id || '');
    const sel       = selIds.includes(i.item_id || i.id || '');
    const vibeMatch = vm && (i.vibe||'').toLowerCase().includes(vm);
    const avail     = i.status === 'Available';
    const dimmed    = vm && !vibeMatch && !sel;
    return `<div class="picker-item${sel?' selected':''}" onclick="togglePickerItem(this)" data-key="${key}" style="${dimmed?'opacity:.4':''}${vibeMatch&&!sel?';outline:1.5px solid var(--accent);outline-offset:-1.5px;border-radius:8px':''}">
      ${i.image ? `<img src="${esc(i.image)}" alt="" loading="lazy" style="width:100%;aspect-ratio:3/4;object-fit:cover;display:block${!avail&&!sel?';opacity:.65':''}">` : `<div class="picker-ph">👗</div>`}
      <div class="picker-check">✓</div>
      <div class="picker-label">${esc(i.item_name||i.item_id||'')}${!avail?'·'+esc(i.status||''):''}</div>
    </div>`;
  }).join('');

  const vibeCount = vibeMode ? sortedInv.filter(i=>(i.vibe||'').toLowerCase().includes(vm)).length : 0;

  showModal('Select Clothing', `
    ${vibeMode ? `<div style="margin-bottom:10px;font-size:12px;color:var(--accent);font-weight:600;display:flex;align-items:center;justify-content:space-between">
      <span>✦ Showing ${vibeMode.replace(/</g,'&lt;')} vibe first</span>
      <span style="font-weight:400;color:var(--text3)">${vibeCount} matching</span>
    </div>` : ''}
    <input id="pack-picker-search" type="search" placeholder="Search items…" autocomplete="off"
      style="width:100%;padding:9px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;outline:none;margin-bottom:10px"
      oninput="filterPickerGrid('pack-picker',this.value)"/>
    <div class="picker-grid" id="pack-picker" style="max-height:420px">${pickerHtml}</div>
  `, async () => {
    const picked = [...document.querySelectorAll('#pack-picker .picker-item.selected')].map(el => el.dataset.key);
    pack.item_ids = JSON.stringify(picked);
    await dbUpdate(T.PACKS, packId, { item_ids: pack.item_ids });
    _renderPackDetailUI(pack, inventory);
    pkSwitchTab('clothing');
  });
}

// ════════════════════════════════════════════════════════════
// PROGRESS PAGE
// ════════════════════════════════════════════════════════════
async function renderProgress() {
  root().innerHTML = '<div class="spinner"></div>';

  const now = new Date();
  const curY = now.getFullYear(), curM = now.getMonth();
  function isThisMonth(dateStr) {
    if (!dateStr) return false;
    const d = new Date(dateStr);
    return d.getFullYear() === curY && d.getMonth() === curM;
  }
  const tod = new Date(); tod.setHours(0,0,0,0);
  const weekEnd = new Date(tod); weekEnd.setDate(weekEnd.getDate()+7); weekEnd.setHours(23,59,59,999);

  const [
    fixedCosts, variableSpending, categoryBudgets, debts,
    inboxItems, actions,
    inventory, outfits, packs,
    progHabits, progTodayLogs
  ] = await Promise.all([
    dbFetch(T.FIXED_COSTS,       {order:['due_day',true]}),
    dbFetch(T.VARIABLE_SPENDING, {order:['date',false]}),
    dbFetch(T.CATEGORY_BUDGETS,  {}),
    dbFetch(T.DEBT_MASTER,       {}),
    dbFetch(T.INBOX,             {}),
    dbFetch(T.ACTIONS,           {}),
    dbFetch(T.INVENTORY,         {select:'item_id,status'}),
    dbFetch(T.OUTFITS,           {select:'id'}),
    dbFetch(T.PACKS,             {select:'id'}),
    dbFetch(T.HABITS,            {order:['created_at',true]}),
    dbFetch(T.HABIT_LOGS,        {eq:{log_date: habitTodayStr()}}),
  ]);

  // ── Habit week logs for Progress page ──
  const progWeekStart = (() => {
    const d = new Date(); d.setHours(0,0,0,0);
    d.setDate(d.getDate() - d.getDay());
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  })();
  const { data: progWeekLogsRaw } = await getDB()
    .from(T.HABIT_LOGS)
    .select('*')
    .gte('log_date', progWeekStart);
  const progWeekLogs = progWeekLogsRaw || [];

  // ── Spending by category ──
  const thisMonthSpending = variableSpending.filter(r => isThisMonth(r.date));
  const catMap = {};
  thisMonthSpending.forEach(r => { const c = r.category||'Other'; catMap[c] = (catMap[c]||0) + (parseFloat(r.amount)||0); });
  const catBudgetMap = {};
  categoryBudgets.forEach(b => { catBudgetMap[b.category] = parseFloat(b.monthly_target)||0; });
  const catEntries = Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
  const topCats = catEntries.slice(0,5);
  const highestSpend = catEntries[0] || null;
  // Highest overspend vs target
  const overspendEntries = catEntries
    .filter(([c,spent]) => catBudgetMap[c] > 0 && spent > catBudgetMap[c])
    .map(([c,spent]) => ([c, spent - catBudgetMap[c], spent, catBudgetMap[c]]))
    .sort((a,b)=>b[1]-a[1]);
  const highestOverspend = overspendEntries[0] || null;

  // ── Finance ──
  const activeDebts   = debts.filter(d => d.status?.toLowerCase() !== 'cleared');
  const totalDebt     = activeDebts.reduce((s,d) => s+debtBal(d), 0);
  const budgetTarget  = categoryBudgets.reduce((s,r) => s+(parseFloat(r.monthly_target)||0), 0);
  const totalSpent    = variableSpending.filter(r=>isThisMonth(r.date)).reduce((s,r) => s+(parseFloat(r.amount)||0), 0);
  const budgetRem     = budgetTarget - totalSpent;
  const budgetPct     = budgetTarget > 0 ? Math.min((totalSpent/budgetTarget)*100, 100) : 0;
  const totalFixed    = fixedCosts.reduce((s,r) => s+(parseFloat(r.monthly_amount)||0), 0);
  const paidFixed     = fixedCosts.reduce((s,r) => s+(parseFloat(r.paid_amount_this_month)||0), 0);
  const fixedPct      = totalFixed > 0 ? Math.min((paidFixed/totalFixed)*100, 100) : 0;
  const { totalUtil } = calcDamageAndRisk(debts);
  // Bills due in next 7 days — monthly bills, not yet fully paid
  const billsDueSoon = fixedCosts.filter(b => {
    const due = parseFloat(b.monthly_amount)||0;
    const paid = parseFloat(b.paid_amount_this_month)||0;
    if (paid >= due && due > 0) return false;
    const d = billNextDueDate(b);
    return d && d >= tod && d <= weekEnd;
  });
  const billsDueSoonAmt = billsDueSoon.reduce((s,b) => s+(parseFloat(b.monthly_amount)||0), 0);

  // ── Actions ──
  function urgency(a) {
    if ((a.status||'').toLowerCase() === 'done') return 'done';
    if (!a.hard_deadline) return 'upcoming';
    const dl = new Date(a.hard_deadline); dl.setHours(0,0,0,0);
    if (dl < tod) return 'overdue';
    if (dl.getTime() === tod.getTime()) return 'today';
    const wk = new Date(tod); wk.setDate(wk.getDate()+7);
    if (dl <= wk) return 'week';
    return 'upcoming';
  }
  const actOpen     = actions.filter(a => (a.status||'').toLowerCase() !== 'done');
  const actOverdue  = actOpen.filter(a => urgency(a) === 'overdue').length;
  const actToday    = actOpen.filter(a => urgency(a) === 'today').length;
  const actWeek     = actOpen.filter(a => urgency(a) === 'week').length;
  const actDone     = actions.filter(a => (a.status||'').toLowerCase() === 'done').length;

  // ── Inbox ──
  const inboxNew        = inboxItems.filter(i => (i.status||'new').toLowerCase() === 'new').length;
  const inboxActionable = inboxItems.filter(i => i.status?.toLowerCase() === 'actionable').length;
  const inboxProcessed  = inboxItems.filter(i => i.status?.toLowerCase() === 'processed').length;

  // ── Wardrobe ──
  const wTotal   = inventory.length;
  const wAvail   = inventory.filter(i => i.status === 'Available').length;
  const wLaundry = inventory.filter(i => i.status === 'In Laundry').length;
  const wPacked  = inventory.filter(i => i.status === 'Packed').length;
  const wOutfits = outfits.length;
  const wPacks   = packs.length;

  // ── Weekly attention ──
  const attentionItems = [];
  if (actOverdue > 0) attentionItems.push({label: `${actOverdue} overdue action${actOverdue!==1?'s':''}`, cls:'neg'});
  if (billsDueSoon.length > 0) attentionItems.push({label: `${billsDueSoon.length} bill${billsDueSoon.length!==1?'s':''} due soon (${fmt(billsDueSoonAmt)})`, cls:''});
  if (inboxNew + inboxActionable > 0) attentionItems.push({label: `${inboxNew+inboxActionable} inbox item${(inboxNew+inboxActionable)!==1?'s':''} need attention`, cls:''});
  if (wLaundry > 0) attentionItems.push({label: `${wLaundry} item${wLaundry!==1?'s':''} in laundry`, cls:''});

  function progressBar(pct, over) {
    return `<div class="prog-wrap"><div class="prog-bar${over?' over':''}" style="width:${Math.min(pct,100).toFixed(1)}%"></div></div>`;
  }

  function statRow(label, val, cls, sub) {
    return `<div style="display:flex;justify-content:space-between;align-items:baseline;padding:9px 0;border-bottom:1px solid var(--border)">
      <span style="font-size:13px;color:var(--text2)">${label}</span>
      <span style="font-size:16px;font-weight:600" class="${cls||''}">${val}${sub?`<span style="font-size:11px;font-weight:400;color:var(--text3);margin-left:4px">${sub}</span>`:''}</span>
    </div>`;
  }

  function sectionCard(title, icon, rows, navTarget) {
    return `<div class="card" style="padding:16px;margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <span style="font-size:13px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3)">${icon} ${title}</span>
        ${navTarget ? `<button onclick="navigate('${navTarget}')" style="background:none;border:none;font-size:12px;color:var(--accent);cursor:pointer;font-family:inherit;font-weight:500;padding:0">View →</button>` : ''}
      </div>
      <div style="margin-top:-4px">${rows}</div>
    </div>`;
  }

  const financeRows =
    statRow('Total debt', fmt(totalDebt), totalDebt>0?'neg':'') +
    statRow('Spending vs target', `${fmt(totalSpent)} / ${fmt(budgetTarget)}`, budgetRem<0?'neg':'') +
    progressBar(budgetPct, budgetRem<0) +
    statRow('Fixed costs covered', `${fmt(paidFixed)} / ${fmt(totalFixed)}`, '') +
    progressBar(fixedPct, false) +
    (totalUtil > 0 ? statRow('Credit utilisation', totalUtil.toFixed(1)+'%', totalUtil>30?'neg':'') : '') +
    (billsDueSoon.length ? statRow('Bills due next 7 days', fmt(billsDueSoonAmt), 'neg', `(${billsDueSoon.length} bill${billsDueSoon.length!==1?'s':''})`) : statRow('Bills due next 7 days', 'None', ''));

  const actionsRows =
    statRow('Overdue', actOverdue, actOverdue>0?'neg':'') +
    statRow('Due today', actToday, actToday>0?'neg':'') +
    statRow('Due this week', actWeek, '') +
    statRow('Completed', actDone, 'pos') +
    statRow('Total open', actOpen.length, '');

  const inboxRows =
    statRow('New', inboxNew, '') +
    statRow('Actionable', inboxActionable, inboxActionable>0?'neg':'') +
    statRow('Processed', inboxProcessed, 'pos');

  const wardrobeRows =
    statRow('Total items', wTotal, '') +
    statRow('Available', wAvail, 'pos') +
    statRow('In laundry', wLaundry, wLaundry>0?'neg':'') +
    statRow('Packed', wPacked, '') +
    statRow('Saved outfits', wOutfits, '') +
    statRow('Packs', wPacks, '');

  root().innerHTML = `
<div class="page">
  <div class="topbar-centered">
    <button class="back-btn" onclick="navigate('dashboard')">‹ Back</button>
    <div class="topbar-centered-title">Progress</div>
    <div class="topbar-centered-right"></div>
  </div>

  ${attentionItems.length ? `
  <div class="card" style="padding:14px 16px;margin-bottom:16px;border-left:3px solid var(--danger)">
    <div style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:8px">Needs Attention</div>
    ${attentionItems.map(a=>`<div style="font-size:13px;font-weight:500;padding:3px 0;${a.cls==='neg'?'color:var(--danger)':'color:var(--text)'}">${a.label}</div>`).join('')}
  </div>` : `
  <div class="card" style="padding:14px 16px;margin-bottom:16px;border-left:3px solid var(--teal)">
    <div style="font-size:13px;font-weight:500;color:var(--teal)">✓ Nothing urgent right now</div>
  </div>`}

  ${sectionCard('Finance', '💷', financeRows, 'finance')}

  ${catEntries.length ? `
  <div class="card" style="padding:16px;margin-bottom:12px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span style="font-size:13px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3)">📊 Spending</span>
      <button onclick="navigate('spending')" style="background:none;border:none;font-size:12px;color:var(--accent);cursor:pointer;font-family:inherit;font-weight:500;padding:0">View →</button>
    </div>
    ${highestSpend ? `<div style="padding:9px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:baseline">
      <span style="font-size:13px;color:var(--text2)">Top category</span>
      <span style="font-size:15px;font-weight:600;color:var(--text)">${highestSpend[0].replace(/</g,'&lt;')} <span style="font-size:12px;font-weight:400;color:var(--text3)">${fmt(highestSpend[1])}</span></span>
    </div>` : ''}
    ${highestOverspend ? `<div style="padding:9px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:baseline">
      <span style="font-size:13px;color:var(--text2)">Highest overspend</span>
      <span style="font-size:15px;font-weight:600;color:var(--danger)">${highestOverspend[0].replace(/</g,'&lt;')} <span style="font-size:12px;font-weight:400;color:var(--text3)">+${fmt(highestOverspend[1])}</span></span>
    </div>` : ''}
    <div style="margin-top:8px">
      ${topCats.map(([cat,spent],i) => {
        const target = catBudgetMap[cat] || 0;
        const pct = target > 0 ? Math.min((spent/target)*100,100) : 0;
        const over = target > 0 && spent > target;
        return `<div style="margin-bottom:8px">
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px">
            <span style="font-size:12px;font-weight:500;color:var(--text)">${cat.replace(/</g,'&lt;')}</span>
            <span style="font-size:12px;color:${over?'var(--danger)':'var(--text2)'}">${fmt(spent)}${target?` / ${fmt(target)}`:''}${over?' ↑':''}</span>
          </div>
          ${target ? `<div class="prog-wrap" style="height:4px"><div class="prog-bar${over?' over':''}" style="width:${pct.toFixed(1)}%"></div></div>` : ''}
        </div>`;
      }).join('')}
    </div>
  </div>` : ''}

  ${sectionCard('Actions', '✅', actionsRows, 'actions')}
  ${sectionCard('Inbox', '📬', inboxRows, 'inbox')}
  ${sectionCard('Wardrobe', '👗', wardrobeRows, 'wardrobe')}

  ${(() => {
    // Build today and week maps for habits
    const todayMap = {};
    progTodayLogs.forEach(l => { todayMap[l.habit_id] = l; });
    const weekMap = {};
    progWeekLogs.forEach(l => {
      weekMap[l.habit_id] = (weekMap[l.habit_id] || 0) + (parseInt(l.value) || 0);
    });

    // Show habits with a target OR any activity today or this week
    const visible = progHabits.filter(h => {
      const hasTarget   = !!h.target;
      const todayLog    = todayMap[h.id];
      const todayActive = todayLog && (parseInt(todayLog.value)||0) > 0;
      const weekActive  = (weekMap[h.id]||0) > 0;
      return hasTarget || todayActive || weekActive || h.tracking_mode === 'Check';
    });

    if (!visible.length) return '';

    function hStatRow(h, mode) {
      const isCheck = h.tracking_mode === 'Check';
      const target  = h.target ? parseInt(h.target) : null;
      const tType   = h.target_type || 'min';
      let valStr, cls;

      if (mode === 'today') {
        const log   = todayMap[h.id];
        const done  = isCheck && log && log.value >= 1;
        const count = !isCheck ? (log ? (parseInt(log.value)||0) : 0) : 0;
        if (isCheck) {
          valStr = done ? '✓ Done' : '—'; cls = done ? 'pos' : '';
        } else if (target !== null) {
          const exceeded = tType === 'max' && count > target;
          const met      = tType === 'min' && count >= target;
          valStr = `${count} / ${target}`; cls = exceeded ? 'neg' : met ? 'pos' : '';
        } else {
          valStr = count > 0 ? String(count) : '—'; cls = '';
        }
      } else {
        const weekVal = weekMap[h.id] || 0;
        if (isCheck) {
          valStr = weekVal > 0 ? `${weekVal}× done` : '—'; cls = weekVal > 0 ? 'pos' : '';
        } else if (target !== null) {
          const exceeded = tType === 'max' && weekVal > target;
          const met      = tType === 'min' && weekVal >= target;
          valStr = `${weekVal} / ${target}`; cls = exceeded ? 'neg' : met ? 'pos' : '';
        } else {
          valStr = weekVal > 0 ? String(weekVal) : '—'; cls = '';
        }
      }
      return `<div style="display:flex;justify-content:space-between;align-items:baseline;padding:9px 0;border-bottom:1px solid var(--border)">
        <span style="font-size:13px;color:var(--text2)">${(h.title||'').replace(/</g,'&lt;')}</span>
        <span style="font-size:16px;font-weight:600" class="${cls}">${valStr}</span>
      </div>`;
    }

    const todayRows = visible.map(h => hStatRow(h,'today')).join('');
    const weekRows  = visible.map(h => hStatRow(h,'week')).join('');

    return sectionCard('Habits', '🔄',
      `<div style="font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);padding-bottom:4px">Today</div>${todayRows}` +
      `<div style="font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);padding-top:8px;padding-bottom:4px">This Week</div>${weekRows}`,
      'habits');
  })()}
</div>`;
}

const IDEA_TYPES = ['Music','Idea','Recipe','Note','Business'];

async function renderIdeas(params = {}) {
  const ideas = await dbFetch(T.IDEAS, {order:['created_at', false]});

  function ideaRow(item) {
    const safeId = String(item.id).replace(/'/g, "\\'");

      <div class="row-left">
        <div class="row-tag">${typeLabel.toUpperCase()}</div>
        <div class="row-title">${(item.title||'—').replace(/</g,'&lt;')}</div>
        ${item.notes ? `<div class="row-sub">${item.notes.replace(/</g,'&lt;')}</div>` : ''}
        <div class="row-sub" style="margin-top:4px">${fmtDate(item.created_at)}</div>
      </div>

<div class="page">

  </div>

  <div class="filter-bar">
    <button class="filter-chip${!fType?' active':''}" onclick="window._ideaFilterType='';renderIdeas({})">All</button>
    ${allTypes.map(t => typeChip(t, fType === t)).join('')}
  </div>

  <div class="search-wrap">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <input class="search-input" placeholder="Search ideas…" oninput="filterRows(this.value)"/>

  <div class="card">
    ${filtered.length ? filtered.map(ideaRow).join('') : `<div class="row"><div class="muted">No ideas yet — tap + to add one</div></div>`}

</div>`;
}

function ctxIdea(e, id) {
  showCtx(e, [
    {label:'Edit',   fn: () => showIdeaModal(id)},
    {label:'Delete', danger: true, fn: async () => {
      if (confirm('Delete this idea?')) {
        await dbDelete(T.IDEAS, id);
        renderIdeas({fType: window._ideaFilterType || ''});
      }
    }},
  ]);
}

async function showIdeaModal(editId) {
  let ex = null;
  if (editId) { const r = await dbFetch(T.IDEAS, {eq:{id:editId}}); ex = r[0] || null; }

  // Merge default types with any custom types already in DB
  const [allIdeas, allProjects] = await Promise.all([
    dbFetch(T.IDEAS, {}),
    dbFetch(T.PROJECTS, {}),
  ]);
  const customTypes = allIdeas.map(r => r.type).filter(Boolean);
  const allTypes = [...new Set([...IDEA_TYPES, ...customTypes])].sort();
  window._allProjectTitles = allProjects.map(r => r.title).filter(Boolean);

  showModal(editId ? 'Edit Idea' : 'New Idea', `
    ${datalist('dl-idea-type', allTypes)}
    <div class="fg"><label>Title</label><input id="f-idea-title" value="${(ex?.title||'').replace(/"/g,'&quot;')}" placeholder="What's the idea?" autocomplete="off"/></div>
    <div class="fg"><label>Type</label>${dlInput('f-idea-type','dl-idea-type', ex?.type||'', 'e.g. Music, Recipe…')}</div>
    <div class="fg"><label>Project (optional)</label><input id="f-idea-project" list="dl-idea-proj-list" value="${(ex?.project||'').replace(/"/g,'&quot;')}" placeholder="Link to a project…" autocomplete="off"/><datalist id="dl-idea-proj-list">${(window._allProjectTitles||[]).map(t=>`<option value="${t.replace(/"/g,'&quot;')}">`).join('')}</datalist></div>
    <div class="fg"><label>Notes</label><input id="f-idea-notes" value="${(ex?.notes||'').replace(/"/g,'&quot;')}" placeholder="Optional notes…"/></div>
  `, async () => {
    const title = v('f-idea-title');
    if (!title) return alert('Enter a title.');
    const row = {
      title,
      type:    v('f-idea-type')    || null,
      project: v('f-idea-project') || null,
      notes:   v('f-idea-notes')   || null,
    };
    if (editId) {
      await dbUpdate(T.IDEAS, editId, row);
    } else {
      await dbInsert(T.IDEAS, row);
    }
    renderIdeas({fType: window._ideaFilterType || ''});
  });
  setTimeout(() => document.getElementById('f-idea-title')?.focus(), 100);
}

// Table: projects (id, title, type, status, notes, created_at, user_id)

const PROJECT_TYPES    = ['Work','Personal','Creative','Business','Content'];
const PROJECT_STATUSES = ['Not Started','In Progress','Done','Parked'];

async function renderProjects(params = {}) {
  const projects = await dbFetch(T.PROJECTS, {order:['created_at', false]});

  const allTypes = [...new Set([...PROJECT_TYPES, ...projects.map(r => r.type).filter(Boolean)])].sort();
  const fType   = params.fType   !== undefined ? params.fType   : (window._projFilterType   || '');

  window._projFilterType   = fType;
  window._projFilterStatus = fStatus;

  const filtered = projects.filter(p =>
    (!fType   || p.type   === fType) &&
    (!fStatus || p.status === fStatus)
  );

  const statusCls = {
    'Not Started': 'status-not-started',
    'In Progress':  'status-in-progress',
    'Done':         'status-done',
    'Parked':       'status-waiting',
  };

  function projectRow(item) {
    const safeId  = String(item.id).replace(/'/g, "\\'");
    const sCls    = statusCls[item.status] || 'status-not-started';
    return `<div class="row bill-row" data-s="${[item.title, item.type, item.status, item.notes].join(' ').toLowerCase()}" style="cursor:pointer" onclick="renderProjectDetail('${safeId}')">
      <div class="row-left">
        <div class="row-tag">${(item.type||'Project').toUpperCase()}</div>
        <div class="row-title">${(item.title||'—').replace(/</g,'&lt;')}</div>

        ${item.notes ? `<div class="row-sub" style="margin-top:4px">${item.notes.replace(/</g,'&lt;')}</div>` : ''}
      </div>
      <button class="menu-btn" style="flex-shrink:0" onclick="event.stopPropagation();ctxProject(event,'${safeId}')">···</button>
    </div>`;
  }

  function typeChip(label, active) {
    const safe = label.replace(/'/g, "\\'");
    return `<button class="filter-chip${active?' active':''}" onclick="window._projFilterType='${safe}';renderProjects({fType:'${safe}',fStatus:window._projFilterStatus||''})">${label.replace(/</g,'&lt;')}</button>`;
  }

  function statusChip(label, active) {
    const safe = label.replace(/'/g, "\\'");
    return `<button class="filter-chip${active?' active':''}" onclick="window._projFilterStatus='${safe}';renderProjects({fType:window._projFilterType||'',fStatus:'${safe}'})">${label.replace(/</g,'&lt;')}</button>`;
  }

  root().innerHTML = `
<div class="page">
  <div class="topbar-centered">
    <div class="topbar-centered-title">Projects</div>
    <button class="icon-btn topbar-centered-right" onclick="showProjectModal(null)">+</button>
  </div>

  <div class="filter-bar">
    <button class="filter-chip${!fType?' active':''}" onclick="window._projFilterType='';renderProjects({fType:'',fStatus:window._projFilterStatus||''})">All Types</button>
    ${allTypes.map(t => typeChip(t, fType === t)).join('')}
  </div>

  <div class="filter-bar" style="margin-bottom:16px">
    <button class="filter-chip${!fStatus?' active':''}" onclick="window._projFilterStatus='';renderProjects({fType:window._projFilterType||'',fStatus:''})">All Status</button>
    ${PROJECT_STATUSES.map(s => statusChip(s, fStatus === s)).join('')}
  </div>

  <div class="search-wrap">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>

  <div class="card">

</div>`;
}

function ctxProject(e, id) {
  showCtx(e, [
    {label:'Edit',   fn: () => showProjectModal(id)},
    {label:'Delete', danger: true, fn: async () => {
      if (confirm('Delete this project?')) {
        await dbDelete(T.PROJECTS, id);
        renderProjects({fType: window._projFilterType||'', fStatus: window._projFilterStatus||''});
      }
    }},

}

async function showProjectModal(editId) {
  let ex = null;
  if (editId) { const r = await dbFetch(T.PROJECTS, {eq:{id:editId}}); ex = r[0] || null; }

  const allProjects = await dbFetch(T.PROJECTS, {});
  const customTypes = allProjects.map(r => r.type).filter(Boolean);
  const allTypes = [...new Set([...PROJECT_TYPES, ...customTypes])].sort();

  const currentStatus = ex?.status || 'Not Started';

  showModal(editId ? 'Edit Project' : 'New Project', `
    ${datalist('dl-proj-type', allTypes)}
    <div class="fg"><label>Title</label><input id="f-proj-title" value="${(ex?.title||'').replace(/"/g,'&quot;')}" placeholder="Project name" autocomplete="off"/></div>
    <div class="fg"><label>Type</label>${dlInput('f-proj-type','dl-proj-type', ex?.type||'', 'e.g. Work, Creative…')}</div>
    <div class="fg"><label>Status</label><select id="f-proj-status">
      ${PROJECT_STATUSES.map(s => `<option value="${s}"${currentStatus===s?' selected':''}>${s}</option>`).join('')}
    </select></div>
    <div class="fg"><label>Notes</label><input id="f-proj-notes" value="${(ex?.notes||'').replace(/"/g,'&quot;')}" placeholder="Optional notes…"/></div>
  `, async () => {
    const title = v('f-proj-title');
    if (!title) return alert('Enter a title.');
    const row = {
      title,
      type:   v('f-proj-type')   || null,
      status: v('f-proj-status') || 'Not Started',
      notes:  v('f-proj-notes')  || null,
    };
    if (editId) {
      await dbUpdate(T.PROJECTS, editId, row);
      // If we were on the detail page, go back to it
      if (window._currentProjectId === editId) {
        renderProjectDetail(editId);
      } else {
        renderProjects({fType: window._projFilterType||'', fStatus: window._projFilterStatus||''});
      }
    } else {
      await dbInsert(T.PROJECTS, row);
      renderProjects({fType: window._projFilterType||'', fStatus: window._projFilterStatus||''});
    }
  });
  setTimeout(() => document.getElementById('f-proj-title')?.focus(), 100);
}

async function renderProjectDetail(projectId) {
  root().innerHTML = '<div class="spinner"></div>';
  const [projRows, allActions, allIdeas, moodItems, allContent] = await Promise.all([
    dbFetch(T.PROJECTS,      {eq:{id:projectId}}),
    dbFetch(T.ACTIONS,       {order:['created_at',false]}),
    dbFetch(T.IDEAS,         {order:['created_at',false]}),
    dbFetch(T.MOODBOARD,     {order:['created_at',false]}),
    dbFetch(T.CONTENT_ITEMS, {order:['post_date',true]}),
  ]);
  const proj = projRows[0];
  if (!proj) { renderProjects({}); return; }

  window._currentProjectId    = projectId;
  window._currentProjectTitle = proj.title;

  // Match by project title (the link field on actions, ideas, content, moodboard)
  const projActions  = allActions.filter(a => a.project === proj.title);
  const projIdeas    = allIdeas.filter(i => i.project === proj.title);
  const projMood     = moodItems.filter(m => m.project === proj.title);
  const projContent  = allContent.filter(c => c.project === proj.title);

  const statusCls = {
    'Not Started': 'status-not-started',
    'In Progress':  'status-in-progress',
    'Done':         'status-done',
    'Parked':       'status-waiting',
  };
  const sCls = statusCls[proj.status] || 'status-not-started';

  const urgStatusCls = {
    'Not Started': 'status-not-started',
    'In Progress':  'status-in-progress',
    'Done':         'status-done',
    'Waiting':      'status-waiting',
  };

  function actionRow(a) {
    const safeId = String(a.id).replace(/'/g, "\\'");
    const aSCls  = urgStatusCls[a.status] || 'status-not-started';
    const tod = new Date(); tod.setHours(0,0,0,0);
    let urgBadge = '';
    if (a.hard_deadline) {
      const dl = new Date(a.hard_deadline); dl.setHours(0,0,0,0);
      if (dl < tod && (a.status||'').toLowerCase() !== 'done') urgBadge = `<span class="status-badge status-overdue" style="margin-left:4px">Overdue</span>`;
    }
    return `<div class="row">
      <div class="row-left">
        <span class="status-badge ${aSCls}">${a.status||'Not Started'}</span>${urgBadge}
        <div class="row-title" style="margin-top:4px">${(a.title||'—').replace(/</g,'&lt;')}</div>
        ${a.hard_deadline ? `<div class="row-sub">Due: ${fmtDate(a.hard_deadline)}</div>` : ''}
        ${a.notes ? `<div class="row-sub">${a.notes.replace(/</g,'&lt;')}</div>` : ''}
      </div>
      <button class="menu-btn" onclick="ctxProjAction(event,'${safeId}')">···</button>
    </div>`;
  }

  function ideaRow(i) {
    const safeId = String(i.id).replace(/'/g, "\\'");
    return `<div class="row">

// Fields: id, title, platform, content_type, status, post_date,
//         project, notes, created_at, user_id
// ════════════════════════════════════════════════════════════
const CONTENT_PLATFORMS  = ['Instagram','TikTok','YouTube','X / Twitter','LinkedIn','Other'];
const CONTENT_TYPES      = ['Feed Post','Reel / Video','Story','Carousel','Short','Promo','Other'];
const CONTENT_STATUSES   = ['Idea','Planned','Ready','Posted','Archived'];

const CONTENT_STATUS_CLS = {
  'Idea':     'status-not-started',
  'Planned':  'status-in-progress',
  'Ready':    'status-waiting',
  'Posted':   'status-done',
  'Archived': 'status-processed',
};

// Parse comma-separated asset links into an array of trimmed, non-empty URLs
function parseAssetLinks(raw) {
  if (!raw) return [];
  return raw.split(',').map(s => s.trim()).filter(Boolean);
}

async function renderContent(params = {}) {
  const [items, allProjects] = await Promise.all([
    dbFetch(T.CONTENT_ITEMS, {order:['post_date', true]}),
    dbFetch(T.PROJECTS, {}),
  ]);

  const fPlatform = params.fPlatform !== undefined ? params.fPlatform : (window._contentFPlatform || '');
  const fStatus   = params.fStatus   !== undefined ? params.fStatus   : (window._contentFStatus   || '');
  const fProject  = params.fProject  !== undefined ? params.fProject  : (window._contentFProject  || '');
  window._contentFPlatform = fPlatform;
  window._contentFStatus   = fStatus;
  window._contentFProject  = fProject;
  window._calAllItems      = items; // cache for calendar day-click

  const allPlatforms = [...new Set([...CONTENT_PLATFORMS, ...items.map(r=>r.platform).filter(Boolean)])].sort();
  const allProjTitles = allProjects.map(r=>r.title).filter(Boolean).sort();
  const projsInUse = [...new Set(items.map(r=>r.project).filter(Boolean))].sort();

  // Sort: upcoming (future/today post_date) first by nearest, then no-date, then past/Posted/Archived at bottom
  const today = new Date(); today.setHours(0,0,0,0);
  function sortKey(item) {
    if (!item.post_date) return 1;
    const d = new Date(item.post_date); d.setHours(0,0,0,0);
    return d >= today ? 0 : 2;
  }
  const sorted = [...items].sort((a,b) => {
    const ka = sortKey(a), kb = sortKey(b);
    if (ka !== kb) return ka - kb;
    if (ka === 0) return new Date(a.post_date) - new Date(b.post_date);
    if (ka === 2) return new Date(b.post_date) - new Date(a.post_date);
    return 0;
  });

  const filtered = sorted.filter(i =>
    (!fPlatform || i.platform === fPlatform) &&
    (!fStatus   || i.status   === fStatus)   &&
    (!fProject  || i.project  === fProject)
  );

  function dateState(item) {
    if (!item.post_date) return null;
    const d = new Date(item.post_date); d.setHours(0,0,0,0);
    if (d < today && item.status !== 'Posted' && item.status !== 'Archived') return 'overdue';
    if (d.getTime() === today.getTime()) return 'today';
    return null;
  }

  function contentRow(item) {
    const safeId  = String(item.id).replace(/'/g, "\\'");
    const sCls    = CONTENT_STATUS_CLS[item.status] || 'status-not-started';
    const ds      = dateState(item);
    const rowStyle = ds === 'overdue' ? 'border-left:3px solid var(--danger);background:var(--danger-light)' :
                     ds === 'today'   ? 'border-left:3px solid var(--amber)' : '';
    const dateStr  = item.post_date ? fmtDate(item.post_date) : '';
    const links    = parseAssetLinks(item.asset_link);
    const assetIndicator = links.length > 1
      ? `<span style="font-size:10px;font-weight:600;background:var(--accent-light);color:var(--text);padding:2px 7px;border-radius:99px;flex-shrink:0">⊞ Carousel ×${links.length}</span>`
      : links.length === 1
      ? `<span style="font-size:10px;font-weight:600;background:var(--accent-light);color:var(--text);padding:2px 7px;border-radius:99px;flex-shrink:0">◻ Single</span>`
      : '';
    return `<div class="row bill-row" style="${rowStyle};cursor:pointer" data-s="${[item.title,item.platform,item.content_type,item.status,item.project,item.notes,item.caption,item.asset_reference].join(' ').toLowerCase()}" onclick="renderContentDetail('${safeId}')">
      <div class="row-left">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:3px">
          ${item.platform ? `<span class="row-tag" style="margin-bottom:0">${item.platform.toUpperCase()}</span>` : ''}
          ${item.content_type ? `<span style="font-size:10px;font-weight:500;color:var(--text3)">${item.content_type}</span>` : ''}
          ${assetIndicator}
        </div>
        <div class="row-title">${(item.title||'—').replace(/</g,'&lt;')}</div>
        <div style="display:flex;align-items:center;gap:6px;margin-top:4px;flex-wrap:wrap">
          <span class="status-badge ${sCls}">${item.status||'Idea'}</span>
          ${ds === 'overdue' ? `<span class="status-badge status-overdue">Overdue</span>` : ''}
          ${ds === 'today'   ? `<span style="font-size:10px;font-weight:700;color:var(--amber)">Today</span>` : ''}
          ${dateStr ? `<span style="font-size:12px;color:var(--text3)">${dateStr}</span>` : ''}
        </div>
        ${item.project ? `<div class="row-sub" style="margin-top:3px">📁 ${item.project.replace(/</g,'&lt;')}</div>` : ''}
        ${item.asset_reference ? `<div class="row-sub" style="margin-top:3px">🖼 ${item.asset_reference.replace(/</g,'&lt;')}</div>` : ''}
        ${item.notes   ? `<div class="row-sub">${item.notes.replace(/</g,'&lt;')}</div>` : ''}
        ${item.caption ? `<div class="row-sub" style="margin-top:3px;font-style:italic;color:var(--text3)">"${item.caption.replace(/</g,'&lt;').substring(0,80)}${item.caption.length>80?'…':''}"</div>` : ''}
      </div>
      <button class="menu-btn" style="flex-shrink:0" onclick="event.stopPropagation();ctxContent(event,'${safeId}')">···</button>
    </div>`;
  }

  function fchip(label, active, onclick) {
    return `<button class="filter-chip${active?' active':''}" onclick="${onclick}">${label.replace(/</g,'&lt;')}</button>`;
  }

  // ── View mode ─────────────────────────────────────────────
  const viewMode = params.view || window._contentView || 'list';
  window._contentView = viewMode;

  // ── Calendar builder ──────────────────────────────────────
  function buildCalendar() {
    const calYear  = window._calYear  || today.getFullYear();
    const calMonth = window._calMonth !== undefined ? window._calMonth : today.getMonth();
    window._calYear  = calYear;
    window._calMonth = calMonth;

    const firstDay  = new Date(calYear, calMonth, 1);
    const lastDay   = new Date(calYear, calMonth + 1, 0);
    const monthName = firstDay.toLocaleDateString('en-GB', {month:'long', year:'numeric'});

    // Build a day-keyed map of items (YYYY-MM-DD → array)
    const dayMap = {};
    items.forEach(item => {
      if (!item.post_date) return;
      const key = item.post_date.substring(0, 10);
      if (!dayMap[key]) dayMap[key] = [];
      dayMap[key].push(item);
    });

    const todayKey = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

    // Day-of-week header (Mon–Sun)
    const DOW = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    const dowHdr = DOW.map(d => `<div style="text-align:center;font-size:10px;font-weight:700;letter-spacing:.06em;color:var(--text3);padding:4px 0">${d}</div>`).join('');

    // Blank cells before first day (Monday-based)
    let startDow = firstDay.getDay(); // 0=Sun
    startDow = startDow === 0 ? 6 : startDow - 1; // convert to Mon=0

    const cells = [];
    for (let b = 0; b < startDow; b++) cells.push(`<div></div>`);

    for (let d = 1; d <= lastDay.getDate(); d++) {
      const key   = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isToday = key === todayKey;
      const dayItems = dayMap[key] || [];
      const hasOverdue = dayItems.some(i => i.status !== 'Posted' && i.status !== 'Archived' && new Date(key) < today);

      const itemDots = dayItems.slice(0, 3).map(i => {
        const safeId = String(i.id).replace(/'/g, "\\'");
        const isPosted = i.status === 'Posted';
        const isOv = !isPosted && i.status !== 'Archived' && new Date(key) < today;
        const dotCol = isPosted ? 'var(--teal)' : isOv ? 'var(--danger)' : 'var(--accent)';
        const title = (i.title||'').replace(/</g,'&lt;').substring(0,16) + (i.title&&i.title.length>16?'…':'');
        const platform = i.platform ? i.platform.substring(0,3).toUpperCase() : '';
        return `<div onclick="event.stopPropagation();renderContentDetail('${safeId}')"
          style="font-size:9px;font-weight:600;line-height:1.3;padding:1px 3px;border-radius:3px;
                 background:${dotCol}22;color:${isOv?'var(--danger)':isPosted?'var(--teal)':'var(--text)'};
                 white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;margin-top:1px"
          title="${(i.title||'').replace(/"/g,'&quot;')}">${platform ? platform+' · ':''} ${title}</div>`;
      }).join('');
      const overflow = dayItems.length > 3 ? `<div style="font-size:9px;color:var(--text3);margin-top:1px">+${dayItems.length-3} more</div>` : '';

      cells.push(`<div onclick="contentCalDayClick('${key}')"
        style="min-height:56px;border-radius:var(--rs);padding:4px;cursor:${dayItems.length?'pointer':'default'};
               background:${isToday?'var(--accent-light)':'var(--card)'};
               border:1px solid ${isToday?'var(--accent)':'var(--border)'};
               ${hasOverdue&&!isToday?'border-color:var(--danger)20':''};
               transition:background .12s;overflow:hidden">
        <div style="font-size:11px;font-weight:${isToday?'700':'500'};color:${isToday?'var(--text)':'var(--text2)'};text-align:center;margin-bottom:2px">${d}</div>
        ${itemDots}${overflow}
      </div>`);
    }

    return `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <button onclick="contentCalNav(-1)" style="background:none;border:none;font-size:18px;cursor:pointer;color:var(--text2);padding:4px 8px;border-radius:6px">‹</button>
      <span style="font-size:15px;font-weight:600;color:var(--text)">${monthName}</span>
      <button onclick="contentCalNav(1)" style="background:none;border:none;font-size:18px;cursor:pointer;color:var(--text2);padding:4px 8px;border-radius:6px">›</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px">${dowHdr}</div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">${cells.join('')}</div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:12px;font-size:11px;color:var(--text3)">
      <span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:var(--teal);opacity:.7;margin-right:4px"></span>Posted</span>
      <span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:var(--accent);opacity:.7;margin-right:4px"></span>Planned</span>
      <span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:var(--danger);opacity:.7;margin-right:4px"></span>Overdue</span>
    </div>`;
  }

  root().innerHTML = `
<div class="page">
  <div class="topbar-centered">
    <div class="topbar-centered-title">Content</div>
    <button class="icon-btn topbar-centered-right" onclick="showContentModal(null)">+</button>
  </div>

  <!-- View toggle -->
  <div class="tabs" style="margin-bottom:14px">
    <button class="tab${viewMode==='list'?' active':''}" onclick="window._contentView='list';renderContent({view:'list'})">List</button>
    <button class="tab${viewMode==='calendar'?' active':''}" onclick="window._contentView='calendar';renderContent({view:'calendar'})">Calendar</button>
  </div>

  ${viewMode === 'calendar' ? `
  <div id="content-calendar">${buildCalendar()}</div>
  ` : `
  <!-- Platform filter -->
  <div class="filter-bar" style="margin-bottom:6px">
    ${fchip('All', !fPlatform, "window._contentFPlatform='';renderContent({view:'list'})")}
    ${allPlatforms.map(p => { const safe=p.replace(/'/g,"\\'"); return fchip(p, fPlatform===p, `window._contentFPlatform='${safe}';renderContent({view:'list',fPlatform:'${safe}',fStatus:window._contentFStatus||'',fProject:window._contentFProject||''})`); }).join('')}
  </div>

  <!-- Status filter -->
  <div class="filter-bar" style="margin-bottom:${projsInUse.length?'6px':'14px'}">
    ${fchip('All Status', !fStatus, "window._contentFStatus='';renderContent({view:'list'})")}
    ${CONTENT_STATUSES.map(s => { const safe=s.replace(/'/g,"\\'"); return fchip(s, fStatus===s, `window._contentFStatus='${safe}';renderContent({view:'list',fPlatform:window._contentFPlatform||'',fStatus:'${safe}',fProject:window._contentFProject||''})`); }).join('')}
  </div>

  ${projsInUse.length ? `<!-- Project filter -->
  <div class="filter-bar" style="margin-bottom:14px">
    ${fchip('All Projects', !fProject, "window._contentFProject='';renderContent({view:'list'})")}
    ${projsInUse.map(p => { const safe=p.replace(/'/g,"\\'"); return fchip(p, fProject===p, `window._contentFProject='${safe}';renderContent({view:'list',fPlatform:window._contentFPlatform||'',fStatus:window._contentFStatus||'',fProject:'${safe}'})`); }).join('')}
  </div>` : ''}

  <div class="search-wrap">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <input class="search-input" placeholder="Search content…" oninput="filterRows(this.value)"/>
  </div>

  <div class="card">
    ${filtered.length ? filtered.map(contentRow).join('') : `<div class="row"><div class="muted">No content yet — plan posts and never miss a release date</div></div>`}
  </div>
  `}
</div>`;
}

function ctxContent(e, id) {
  showCtx(e, [
    {label:'Edit',   fn: () => showContentModal(id)},
    {label:'Mark Posted', fn: async () => { await dbUpdate(T.CONTENT_ITEMS, id, {status:'Posted'}); renderContent({view:window._contentView||'list'}); }},
    {label:'Delete', danger: true, fn: async () => {
      if (confirm('Delete this content item?')) {
        await dbDelete(T.CONTENT_ITEMS, id);
        renderContent({view:window._contentView||'list', fPlatform:window._contentFPlatform||'', fStatus:window._contentFStatus||'', fProject:window._contentFProject||''});
      }
    }},
  ]);
}

// Navigate calendar months
function contentCalNav(dir) {
  let m = (window._calMonth !== undefined ? window._calMonth : new Date().getMonth()) + dir;
  let y = window._calYear || new Date().getFullYear();
  if (m > 11) { m = 0; y++; }
  if (m < 0)  { m = 11; y--; }
  window._calMonth = m;
  window._calYear  = y;
  renderContent({view:'calendar'});
}

// Show items for a specific day below calendar (inline)
function contentCalDayClick(dateKey) {
  // Navigate to a filtered list view for that date
  // We'll just re-render list filtered by date visually by scrolling — instead open a quick modal
  const allItems = window._calAllItems || [];
  const dayItems = allItems.filter(i => i.post_date && i.post_date.substring(0,10) === dateKey);
  if (!dayItems.length) return;
  if (dayItems.length === 1) { renderContentDetail(String(dayItems[0].id)); return; }

  // Multiple items — show a simple modal list
  const d = new Date(dateKey);
  const dateLabel = d.toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long'});
  showModal(dateLabel,
    dayItems.map(i => {
      const safeId = String(i.id).replace(/'/g,"\\'");
      const sCls   = CONTENT_STATUS_CLS[i.status] || 'status-not-started';
      return `<div style="padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer" onclick="document.querySelector('.overlay')?.remove();renderContentDetail('${safeId}')">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:3px">
          ${i.platform ? `<span class="row-tag" style="margin-bottom:0">${i.platform.toUpperCase()}</span>` : ''}
          <span class="status-badge ${sCls}">${i.status||'Idea'}</span>
        </div>
        <div class="row-title">${(i.title||'—').replace(/</g,'&lt;')}</div>
      </div>`;
    }).join(''),
    null // no save button needed — override with close only
  );
  // remove save button from modal
  setTimeout(() => {
    const btn = document.getElementById('modal-save-btn');
    if (btn) btn.style.display = 'none';
  }, 50);
}

async function showContentModal(editId) {
  let ex = null;
  if (editId) { const r = await dbFetch(T.CONTENT_ITEMS, {eq:{id:editId}}); ex = r[0] || null; }

  const [allItems, allProjects] = await Promise.all([
    dbFetch(T.CONTENT_ITEMS, {}),
    dbFetch(T.PROJECTS, {}),
  ]);
  const customPlatforms = allItems.map(r=>r.platform).filter(Boolean);
  const customTypes     = allItems.map(r=>r.content_type).filter(Boolean);
  const allPlatforms    = [...new Set([...CONTENT_PLATFORMS, ...customPlatforms])].sort();
  const allTypes        = [...new Set([...CONTENT_TYPES,     ...customTypes])].sort();
  const projTitles      = allProjects.map(r=>r.title).filter(Boolean);

  const curStatus = ex?.status || 'Idea';

  showModal(editId ? 'Edit Content' : 'New Content', `
    ${datalist('dl-ct-platform', allPlatforms)}
    ${datalist('dl-ct-type',     allTypes)}
    ${datalist('dl-ct-project',  projTitles)}
    <div class="fg"><label>Title</label><input id="f-ct-title" value="${(ex?.title||'').replace(/"/g,'&quot;')}" placeholder="Content title" autocomplete="off"/></div>
    <div class="fg"><label>Platform</label>${dlInput('f-ct-platform','dl-ct-platform', ex?.platform||'', 'e.g. Instagram, TikTok…')}</div>
    <div class="fg"><label>Content Type</label>${dlInput('f-ct-type','dl-ct-type', ex?.content_type||'', 'e.g. Reel / Video, Post…')}</div>
    <div class="fg"><label>Status</label><select id="f-ct-status">
      ${CONTENT_STATUSES.map(s=>`<option value="${s}"${curStatus===s?' selected':''}>${s}</option>`).join('')}
    </select></div>
    <div class="fg"><label>Post Date (optional)</label><input id="f-ct-date" type="date" value="${ex?.post_date ? ex.post_date.substring(0,10) : ''}"/></div>
    <div class="fg"><label>Project (optional)</label>${dlInput('f-ct-project','dl-ct-project', ex?.project||'', 'Link to a project…')}</div>
    <div class="fg"><label>Asset Reference <span style="font-weight:400;color:var(--text3)">(optional)</span></label><input id="f-ct-assetref" value="${(ex?.asset_reference||'').replace(/"/g,'&quot;')}" placeholder="e.g. IMG_4821, reel cover v2…"/></div>
    <div class="fg"><label>Asset Link <span style="font-weight:400;color:var(--text3)">(optional)</span></label><input id="f-ct-assetlink" type="url" value="${(ex?.asset_link||'').replace(/"/g,'&quot;')}" placeholder="https://dropbox.com/…"/></div>
    <div class="fg"><label>Hashtags <span style="font-weight:400;color:var(--text3)">(optional)</span></label><input id="f-ct-hashtags" value="${(ex?.hashtags||'').replace(/"/g,'&quot;')}" placeholder="#content #instagram…"/></div>
    <div class="fg"><label>Notes</label><input id="f-ct-notes" value="${(ex?.notes||'').replace(/"/g,'&quot;')}" placeholder="Optional notes…"/></div>
    <div class="fg"><label>Caption <span style="font-weight:400;color:var(--text3)">(optional)</span></label><textarea id="f-ct-caption" rows="4" style="width:100%;padding:11px 13px;border-radius:var(--rs);border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;outline:none;resize:vertical;line-height:1.5" placeholder="Draft your caption here…">${(ex?.caption||'').replace(/</g,'&lt;')}</textarea></div>
  `, async () => {
    const title = v('f-ct-title');
    if (!title) return alert('Enter a title.');
    const captionEl = document.getElementById('f-ct-caption');
    const row = {
      title,
      platform:        v('f-ct-platform')  || null,
      content_type:    v('f-ct-type')       || null,
      status:          v('f-ct-status')     || 'Idea',
      post_date:       v('f-ct-date')       || null,
      project:         v('f-ct-project')    || null,
      asset_reference: v('f-ct-assetref')   || null,
      asset_link:      v('f-ct-assetlink')  || null,
      hashtags:        v('f-ct-hashtags')   || null,
      notes:           v('f-ct-notes')      || null,
      caption:         (captionEl?.value?.trim()) || null,
    };
    if (editId) {
      await dbUpdate(T.CONTENT_ITEMS, editId, row);
    } else {
      await dbInsert(T.CONTENT_ITEMS, row);
    }
    renderContent({fPlatform:window._contentFPlatform||'', fStatus:window._contentFStatus||'', fProject:window._contentFProject||''});
  });
  setTimeout(() => document.getElementById('f-ct-title')?.focus(), 100);
}

// ════════════════════════════════════════════════════════════
// CONTENT DETAIL PAGE
// ════════════════════════════════════════════════════════════
async function renderContentDetail(itemId) {
  root().innerHTML = '<div class="spinner"></div>';
  const rows = await dbFetch(T.CONTENT_ITEMS, {eq:{id:itemId}});
  const item = rows[0];
  if (!item) { renderContent({}); return; }
  window._contentDetailCache = item;
  const sCls   = CONTENT_STATUS_CLS[item.status] || 'status-not-started';
  const safeId = String(item.id).replace(/'/g, "\\'");

  // Parse and clean asset links
  const links = (item.asset_link || '')
    .split(',')
    .map(s => s.trim())
    .filter(Boolean);
  const isCarousel = links.length > 1;

  function detailRow(label, val, extra) {
    if (!val) return '';
    return `<div style="padding:10px 0;border-bottom:1px solid var(--border)">
      <div style="font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:3px">${label}</div>
      <div style="font-size:15px;color:var(--text);line-height:1.5">${extra||val}</div>
    </div>`;
  }

  // ── Asset reference + link block ─────────────────────────
  let assetRefLinkHtml = '';
  if (item.asset_reference || links.length > 0) {
    assetRefLinkHtml = `<div class="card" style="padding:0 16px;margin-bottom:16px">`;
    if (item.asset_reference) {
      assetRefLinkHtml += detailRow('Asset Reference', item.asset_reference, item.asset_reference.replace(/</g,'&lt;'));
    }
    if (links.length > 0) {
      const linkItems = links.map((u,i) => {
        const safe = u.replace(/</g,'&lt;').replace(/"/g,'&quot;');
        return `<div style="padding:${i===0?'10px':'4px'} 0 ${i===links.length-1?'10px':'4px'} 0${i<links.length-1?';border-bottom:1px solid var(--border)':''}">
          <a href="${safe}" target="_blank" rel="noopener" style="font-size:14px;color:var(--teal);word-break:break-all;text-decoration:none;display:flex;align-items:center;gap:6px">
            ${links.length > 1 ? `<span style="font-size:11px;font-weight:600;color:var(--text3);flex-shrink:0">${i+1}.</span>` : ''}
            <span>${safe} ↗</span>
          </a>
        </div>`;
      }).join('');
      assetRefLinkHtml += `<div style="padding:10px 0;border-bottom:${item.asset_reference?'':'none'}">
        <div style="font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:4px">${isCarousel ? `Asset Links (${links.length})` : 'Asset Link'}</div>
        ${linkItems}
      </div>`;
    }
    assetRefLinkHtml += `</div>`;
  }

  // ── Asset preview block ───────────────────────────────────
  let assetPreviewHtml = '';
  if (links.length === 1) {
    const url = links[0].replace(/"/g,'&quot;');
    const urlEsc = links[0].replace(/'/g,"\\'").replace(/"/g,'&quot;');
    assetPreviewHtml = `
  <div style="margin-bottom:16px">
    <div style="font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:8px">Asset Preview</div>
    <div id="asset-preview-wrap" style="border-radius:var(--r);overflow:hidden;background:var(--accent-light);min-height:80px;display:flex;align-items:center;justify-content:center">
      <img src="${url}" alt="Asset preview" loading="lazy" style="width:100%;max-height:340px;object-fit:contain;display:block"
        onerror="document.getElementById('asset-preview-wrap').innerHTML='<div style=\\'padding:20px;text-align:center;color:var(--text3);font-size:13px\\'>Preview unavailable — <a href=\\'${urlEsc}\\' target=\\'_blank\\' rel=\\'noopener\\' style=\\'color:var(--teal)\\'>open link ↗</a></div>'"
      />
    </div>
    <div style="margin-top:6px;text-align:right">
      <a href="${url}" target="_blank" rel="noopener" style="font-size:12px;color:var(--teal);text-decoration:none">Open full link ↗</a>
    </div>
  </div>`;
  } else if (links.length > 1) {
    const cols = Math.min(links.length, 3);

// Copy helper for content detail
function contentCopy(mode, itemId) {
  // Re-fetch from DOM is not possible; use a stored reference
  // We'll pass the data via a window cache set when rendering
  const item = window._contentDetailCache;
  if (!item) return;
  let text = '';
  if (mode === 'caption')  text = item.caption  || '';
  if (mode === 'hashtags') text = item.hashtags || '';
  if (mode === 'both')     text = [item.caption, item.hashtags].filter(Boolean).join('\n\n');
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    showToast('Copied!', 'success');
  }).catch(() => {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('Copied!', 'success');
  });
}
