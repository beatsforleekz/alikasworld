<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Alika</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
/* ── Reset ── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:16px;overflow-x:hidden}

/* ── Variables ── */
:root{
  /* ── Semantic tokens (set by theme) ── */
  --bg:#F4F1EC;--card:#FFFFFF;
  --text:#111111;--text2:#6B6B6B;--text3:#9E9E9E;
  --border:#E5E2DC;--accent:#C8B6A6;--accent-light:#F0EBE4;

  /* ── Functional aliases (keep existing var names working) ── */
  --purple:var(--accent);--purple-light:var(--accent-light);--purple-mid:#B8A494;
  --teal:#4A7C6F;--teal-light:#E8F0EE;
  --danger:#C0533A;--danger-light:#F9EDE9;
  --amber:#A07840;--amber-light:#F5EFE4;
  --nav-h:64px;--r:14px;--rs:8px;

  /* ── Tab / input backgrounds ── */
  --tab-bg:#EDE9E3;--input-bg:#EDE9E3;
  /* ── Interaction ── */
  --card-hover-border:#C8B6A6;
  --transition:150ms ease;
}
/* ── Theme: Minimal Light ── */
[data-theme="light"]{
  --bg:#F7F7F5;--card:#FFFFFF;
  --text:#111111;--text2:#6B6B6B;--text3:#9E9E9E;
  --border:#E8E5E0;--accent:#D9D4CC;--accent-light:#EFECE8;
  --tab-bg:#ECEAE5;--input-bg:#ECEAE5;
  --card-hover-border:#D9D4CC;
}
/* ── Theme: Dark ── */
[data-theme="dark"]{
  --bg:#111111;--card:#1A1A1A;
  --text:#F5F5F5;--text2:#B8B8B8;--text3:#888888;
  --border:#2A2A2A;--accent:#8C7B6B;--accent-light:#2A2520;
  --tab-bg:#1E1E1E;--input-bg:#1E1E1E;
  --card-hover-border:#8C7B6B;
  --teal:#5A9B8E;--teal-light:#1A2E2B;
  --danger:#D06050;--danger-light:#2D1B18;
  --amber:#B8904A;--amber-light:#2A2010;
}
/* ── Theme switcher widget ── */
#theme-switcher{display:none}
/* theme-switcher moved to settings page */.theme-swatch{width:14px;height:14px;border-radius:50%;border:1px solid var(--border);flex-shrink:0}

/* ── Shell ── */
#shell{width:100%;max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;position:relative;background:var(--bg)}
#page-root{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:calc(var(--nav-h) + 16px)}

/* ── Bottom Nav ── */
#bottom-nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;height:var(--nav-h);
  background:var(--card);border-top:1px solid var(--border);
  display:grid;grid-auto-flow:column;grid-auto-columns:minmax(64px,1fr);
  align-items:center;justify-content:flex-start;overflow-x:auto;overflow-y:hidden;
  z-index:100;padding:0 8px env(safe-area-inset-bottom,0);
  scroll-snap-type:x proximity;-webkit-overflow-scrolling:touch;scrollbar-width:none;overscroll-behavior-x:contain
}
#bottom-nav::-webkit-scrollbar{display:none}
.nav-btn{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  font-size:10px;color:var(--text3);background:none;border:none;
  min-width:64px;height:100%;padding:6px 6px 8px;cursor:pointer;
  font-family:'Plus Jakarta Sans',sans-serif;scroll-snap-align:center;white-space:nowrap
}
.nav-btn svg{width:22px;height:22px;stroke:var(--text3);fill:none;stroke-width:1.5}
.nav-label{display:block;max-width:100%;font-size:9.5px;line-height:1.1;overflow:hidden;text-overflow:ellipsis}
.nav-btn.active{color:var(--text)}
.nav-btn.active svg{stroke:var(--text)}

/* ── Page ── */
.page{padding:0 16px 24px;overflow-x:hidden}

/* ── Topbar ── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 16px 8px;position:sticky;top:0;background:var(--bg);z-index:10
}
.topbar-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:20px}
.topbar-centered{
  position:relative;display:flex;align-items:center;
  gap:12px;padding:16px 16px 10px;position:sticky;top:0;background:var(--bg);z-index:10;
  min-height:56px
}
.topbar-centered-title{
  position:absolute;left:50%;transform:translateX(-50%);
  font-family:'Plus Jakarta Sans',sans-serif;font-size:22px;font-weight:400;
  letter-spacing:.01em;white-space:nowrap;pointer-events:none;max-width:calc(100% - 132px);
  overflow:hidden;text-overflow:ellipsis
}
.topbar-centered-right{margin-left:auto;flex-shrink:0;position:relative;z-index:1}
.back-btn{
  display:flex;align-items:center;gap:4px;font-size:14px;font-weight:500;
  color:var(--text2);background:none;border:none;cursor:pointer;padding:4px 0;
  font-family:'Plus Jakarta Sans',sans-serif;flex-shrink:0;position:relative;z-index:1
}

/* ── Tab toggle ── */
.tabs{
  display:flex;gap:4px;background:var(--tab-bg);border-radius:12px;padding:4px;margin-bottom:20px;
  overflow-x:auto;overflow-y:hidden;scrollbar-width:none;-webkit-overflow-scrolling:touch;scroll-snap-type:x proximity
}
.tabs::-webkit-scrollbar{display:none}
.tab{
  flex:1 1 0;min-width:104px;padding:9px 12px;border:none;background:none;border-radius:8px;
  font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:500;
  cursor:pointer;transition:all .15s;color:var(--text3);white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;scroll-snap-align:start
}
.tab.active{background:#fff;color:#111111;font-weight:500;box-shadow:0 1px 4px rgba(0,0,0,.06)}

/* ── Snapshot ── */
.snap-grid{display:grid;grid-template-columns:repeat(2,1fr);margin-bottom:24px;gap:1px;background:var(--border);border-radius:var(--r);overflow:hidden;border:1px solid var(--border)}
.snap-item{padding:16px 12px;text-align:center;background:var(--card)}
.snap-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:6px;line-height:1.3;display:block}
.snap-val{font-size:18px;font-weight:600;color:var(--text);display:block}
.snap-val.neg{color:var(--danger)}
.snap-val.pos{color:#4A7C6F}

/* ── Section titles ── */
.sec-label{text-align:center;font-size:11px;font-weight:500;letter-spacing:.12em;color:var(--text3);text-transform:uppercase;margin:24px 0 4px}
.sec-title{text-align:center;font-family:'Plus Jakarta Sans',sans-serif;font-size:22px;letter-spacing:.04em;text-transform:uppercase;margin-bottom:16px}

/* ── Card ── */
.card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);overflow:hidden;margin-bottom:12px}

/* ── List rows ── */
.row{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.row:last-child{border-bottom:none}
.row-left{flex:1;min-width:0}
.row-tag{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:2px}
.row-tag.received{color:#4A7C6F}
.row-tag.paid{color:#4A7C6F}
.row-tag.expected{color:var(--text2)}
.row-tag.overdue{color:var(--danger)}
.row-title{font-size:15px;font-weight:500;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:2;white-space:normal}
.row-sub{font-size:13px;color:var(--text2);margin-top:2px;overflow-wrap:anywhere}

/* ── Risk rows ── */
.risk-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border)}
.risk-cell{padding:20px 16px;text-align:center;background:var(--card)}
.risk-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;display:block}
.risk-val{font-size:20px;font-weight:600;display:block}
.risk-val.neg{color:var(--danger)}
.chevron{display:none}

/* ── Buttons ── */
.btn{display:block;width:100%;padding:15px;border-radius:var(--rs);font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:600;text-align:center;cursor:pointer;border:none;margin-bottom:12px}
.btn:active{opacity:.8}
.btn-primary{background:var(--text);color:var(--bg)}
.btn-ghost{background:var(--accent-light);color:var(--text)}
.icon-btn{width:32px;height:32px;border-radius:50%;background:var(--text);color:var(--bg);border:none;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.menu-btn{background:var(--input-bg);border:none;border-radius:6px;padding:4px 8px;font-size:16px;cursor:pointer;color:var(--text3);flex-shrink:0}

/* ── Search ── */
.search-wrap{position:relative;margin-bottom:16px}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--text3);fill:none;stroke-width:2}
.search-input{width:100%;min-width:0;padding:12px 12px 12px 38px;border-radius:12px;border:none;background:var(--input-bg);font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;outline:none}

/* ── Page header ── */
.ph{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin:20px 0 12px}
.ph h2{font-family:'Plus Jakarta Sans',sans-serif;font-size:26px;min-width:0}

/* ── Debt ── */
.debt-hero{text-align:center;padding:24px 0 16px}
.debt-hero-amt{font-family:'Plus Jakarta Sans',sans-serif;font-size:36px}
.debt-hero-lbl{font-size:13px;color:var(--text2);margin-top:4px}
.debt-meta{font-size:12px;color:var(--text3);font-weight:500;margin-bottom:2px}
.debt-name{font-size:15px;font-weight:600}
.debt-sub{font-size:13px;color:var(--text2);margin-top:2px}

/* ── Badge ── */
.badge{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif}
.badge-paid{background:#E8F0EE;color:#4A7C6F}
.badge-unpaid{background:var(--amber-light);color:#A07840}

/* ── Progress ── */
.prog-wrap{height:5px;background:var(--border);border-radius:99px;overflow:hidden;margin-top:6px}
.prog-bar{height:100%;border-radius:99px;background:var(--accent)}
.prog-bar.over{background:var(--danger)}

/* ── Budget table ── */
.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:thin}
.btable{width:100%;min-width:540px;border-collapse:collapse}
.btable th{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);padding:10px 8px;text-align:left;border-bottom:1px solid var(--border)}
.btable td{padding:12px 8px;font-size:14px;border-bottom:1px solid var(--border);vertical-align:top}
.btable tr:last-child td{border-bottom:none}
.bcat{font-weight:600}
.bover{color:var(--danger);font-weight:600}

/* ── Chart ── */
.chart-card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);padding:20px 16px 16px;margin-bottom:20px}
.chart-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:20px;margin-bottom:16px}
.chart-wrap{position:relative;height:200px}

/* ── Modal ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--card);border-radius:20px 20px 0 0;padding:24px 20px calc(40px + env(safe-area-inset-bottom,0px));width:100%;max-width:480px;max-height:88vh;overflow-y:auto;overflow-x:hidden}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:99px;margin:0 auto 20px}
.modal-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:22px;margin-bottom:20px}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text2);margin-bottom:5px}
.fg input,.fg select{width:100%;min-width:0;padding:11px 13px;border-radius:var(--rs);border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;outline:none}
.fg input:focus,.fg select:focus{border-color:var(--accent)}

/* ── Context menu ── */
.ctx{position:fixed;background:var(--card);border:1px solid var(--border);border-radius:var(--rs);box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:300;min-width:160px;overflow:hidden}
.ctx button{display:block;width:100%;padding:13px 16px;text-align:left;background:none;border:none;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;cursor:pointer}
.ctx button:hover{background:var(--bg)}
.ctx button.danger{color:var(--danger)}

/* ── Spinner ── */
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:60px auto}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Login ── */
.login-wrap{max-width:420px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px}
.login-logo{font-family:'Plus Jakarta Sans',sans-serif;font-size:36px;color:var(--text);margin-bottom:6px}
.login-sub{font-size:14px;color:var(--text3);margin-bottom:40px}
.login-err{color:var(--danger);font-size:13px;margin-bottom:12px;text-align:center;display:none}

/* ── Utils ── */
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}.mt24{margin-top:24px}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}
.muted{color:var(--text3);font-size:13px;overflow-wrap:anywhere}
.center{text-align:center}
.hidden{display:none!important}
/* wardrobe */
.item-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:16px}
.item-card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:transform .12s}
.item-card:active{transform:scale(.97)}
.item-img{width:100%;aspect-ratio:3/4;object-fit:cover;background:var(--bg);display:block}
.item-img-placeholder{width:100%;aspect-ratio:3/4;background:var(--bg);display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:28px}
.item-info{padding:10px 12px 12px}
.item-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-sub{font-size:11px;color:var(--text2);margin-top:2px}
/* outfit/pack thumbnails */
.thumb-row{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px}
.thumb{width:44px;height:56px;object-fit:cover;border-radius:6px;background:var(--bg)}
.thumb-placeholder{width:44px;height:56px;border-radius:6px;background:var(--bg);display:inline-flex;align-items:center;justify-content:center;font-size:16px;color:var(--text3)}
/* item picker grid */
.picker-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-height:320px;overflow-y:auto;padding:4px}
.picker-item{border-radius:8px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:border-color var(--transition),box-shadow var(--transition);position:relative}
.picker-item.selected{border-color:#C8B6A6;box-shadow:0 0 0 2px rgba(200,182,166,0.25),inset 0 0 0 999px rgba(200,182,166,0.12)}
.picker-item img,.picker-item .picker-ph{width:100%;aspect-ratio:3/4;object-fit:cover;display:block;background:var(--bg)}
.picker-item .picker-ph{display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:20px}
.picker-item .picker-check{position:absolute;top:4px;right:4px;background:var(--accent);color:#fff;border-radius:50%;width:18px;height:18px;font-size:11px;display:flex;align-items:center;justify-content:center;display:none}
.picker-item.selected .picker-check{display:flex}
/* ── Dark mode: selected item visibility ── */
[data-theme="dark"] .picker-item.selected{
  border-color:#C8B6A6;
  box-shadow:0 0 0 2px rgba(200,182,166,0.4),inset 0 0 0 999px rgba(200,182,166,0.18);
}
[data-theme="dark"] .picker-item .picker-check{background:#C8B6A6;color:#111}

.picker-label{font-size:10px;text-align:center;padding:3px 2px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* inbox/actions */
.status-badge{display:inline-block;padding:3px 9px;border-radius:99px;font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase}
.status-new{background:var(--accent-light);color:var(--text3)}
.status-actionable{background:var(--accent-light);color:var(--text)}
.status-processed{background:#E8F0EE;color:#4A7C6F}
.status-paid{background:#E8F0EE;color:#4A7C6F}
.status-not-started{background:var(--accent-light);color:var(--text3)}
.status-in-progress{background:var(--accent-light);color:var(--text)}
.status-done{background:#E8F0EE;color:#4A7C6F}
.status-waiting{background:#FEF3E2;color:#C47B1A}
.status-overdue{background:var(--danger-light);color:var(--danger);font-weight:700}
/* wardrobe item status badges */
.wstatus-available{background:#E6F9F2;color:#1A8A5A}
.wstatus-in-laundry{background:#FEF3E2;color:#C47B1A}
.wstatus-packed{background:var(--accent-light);color:var(--text)}
.wstatus-archived{background:var(--accent-light);color:var(--text3)}
/* wardrobe home dashboard */
.wd-snap-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px}
.wd-snap{background:var(--card);border-radius:var(--r);border:1px solid var(--border);padding:16px 14px;text-align:center}
.wd-snap-val{font-family:'Plus Jakarta Sans',sans-serif;font-size:28px;color:var(--text);display:block;margin-bottom:2px}
.wd-snap-lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3)}
.wd-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.wd-action-btn{padding:14px 10px;border-radius:var(--r);border:1.5px solid var(--border);background:var(--card);font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:600;color:var(--text);cursor:pointer;text-align:center;transition:all .15s}
.wd-action-btn:active{opacity:.8}
.wd-action-btn.primary{background:var(--text);color:var(--bg);border-color:var(--text)}
.wd-action-btn .wd-btn-icon{font-size:18px;display:block;margin-bottom:4px}
/* vibe mode selector */
.vibe-mode-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.vibe-mode-btn{flex:1;min-width:0;padding:10px 8px;border-radius:10px;border:1.5px solid var(--border);background:var(--card);font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;text-align:center;transition:all .15s;line-height:1.3}
.vibe-mode-btn.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.vibe-mode-btn:active{opacity:.85}
/* tags */
.tag-pill{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:99px;background:var(--accent-light);color:var(--text);font-size:11px;font-weight:500;cursor:pointer;border:none;font-family:'Plus Jakarta Sans',sans-serif;margin:2px}
.tag-pill:active{opacity:.8}
.tag-bar{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.filter-bar{display:flex;gap:6px;overflow-x:auto;overflow-y:hidden;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none;-webkit-overflow-scrolling:touch;overscroll-behavior-x:contain}
.filter-bar::-webkit-scrollbar{display:none}
.filter-chip{flex-shrink:0;padding:5px 12px;border-radius:99px;font-size:12px;font-weight:500;border:1.5px solid var(--border);background:var(--card);color:var(--text2);cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .15s}
.filter-chip.active{background:var(--text);color:var(--bg);border-color:var(--text)}

/* toggle switch */
.tog-wrap{display:flex;align-items:center;gap:8px}
.tog{position:relative;width:44px;height:26px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0;position:absolute}
.tog-slider{position:absolute;inset:0;background:var(--border);border-radius:99px;cursor:pointer;transition:background .2s}
.tog-slider:before{content:'';position:absolute;width:20px;height:20px;left:3px;top:3px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tog input:checked + .tog-slider{background:var(--accent)}
.tog input:checked + .tog-slider:before{transform:translateX(18px)}
.tog-label{font-size:13px;color:var(--text2)}

/* section spacing */
.sec-block{margin-bottom:32px}
.sec-block:last-child{margin-bottom:0}

/* datalist combo input */
.combo-wrap{position:relative}
.combo-wrap input{width:100%;min-width:0;padding:11px 13px;border-radius:var(--rs);border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;outline:none}
.combo-wrap input:focus{border-color:var(--accent)}

/* empty state */
.empty-state{padding:28px 16px;text-align:center;color:var(--text3);font-size:14px}
.empty-state-icon{font-size:28px;margin-bottom:8px}
.empty-state-msg{font-weight:500;color:var(--text2);margin-bottom:4px}

/* chart in budgets */
.budget-chart-wrap{height:180px;position:relative;margin-bottom:4px}
.divider{height:1px;background:var(--border);margin:20px 0}

/* ── Packing checklist ── */
.pk-baggage-bar{
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  background:var(--accent-light);border-radius:var(--rs);
  padding:10px 14px;margin-bottom:14px;font-size:13px
}
.pk-baggage-limit{font-weight:600;color:#111111;white-space:nowrap}
.pk-baggage-notes{color:var(--text2);opacity:.85}
.pk-progress-wrap{margin-bottom:16px}
.pk-tab-badge{display:inline-flex;align-items:center;justify-content:center;background:var(--accent);color:#fff;border-radius:99px;font-size:10px;font-weight:700;padding:1px 6px;margin-left:4px;vertical-align:1px}

.pk-group{margin-bottom:12px;background:var(--card);border-radius:var(--r);border:1px solid var(--border);overflow:hidden}
.pk-group-header{
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:11px 16px;background:var(--card);
  border-bottom:1px solid var(--border);
}
.pk-group-name{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text2)}
.pk-group-count{font-size:11px;font-weight:600;color:var(--text3)}

.pk-check-row{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px 10px 12px;
  border-bottom:1px solid var(--border);
  transition:opacity .15s;
  cursor:default;
}
.pk-group-rows .pk-check-row:last-of-type{border-bottom:none}
.pk-checked .pk-check-label{color:var(--text3);text-decoration:line-through}
.pk-checked{opacity:.6}
.pk-checkbox{
  flex-shrink:0;width:22px;height:22px;background:none;border:none;
  padding:0;cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.pk-checkbox svg{width:18px;height:18px}
.pk-check-label{flex:1;font-size:15px;color:var(--text);user-select:none;cursor:pointer;line-height:1.3}
.pk-qty{display:inline-block;margin-left:6px;font-size:11px;font-weight:600;color:var(--text2);background:var(--accent-light);border-radius:4px;padding:1px 5px}
.pk-check-actions{flex-shrink:0}
.pk-action-btn{
  background:none;border:none;padding:2px 6px;font-size:16px;color:var(--text3);
  cursor:pointer;border-radius:4px;line-height:1;font-family:monospace;letter-spacing:1px
}
.pk-action-btn:active{background:var(--bg)}
.pk-note-line{
  padding:0 14px 8px 44px;font-size:12px;color:var(--text2);
  border-bottom:1px solid var(--border);margin-top:-2px;line-height:1.4
}
.pk-group-rows .pk-note-line:last-child{border-bottom:none}

/* To Get */
.pk-toget-row{border-bottom:1px solid var(--border)}
.pk-toget-row:last-child{border-bottom:none}
.pk-toget-icon{flex-shrink:0;font-size:16px;line-height:1}
.pk-got-btn{
  flex-shrink:0;background:var(--accent-light);color:var(--teal);
  border:none;border-radius:8px;padding:6px 12px;
  font-size:12px;font-weight:700;cursor:pointer;
  font-family:'Plus Jakarta Sans',sans-serif;letter-spacing:.03em;white-space:nowrap
}
.pk-got-btn:active{opacity:.8}

/* ── Micro UX: hover & transitions ── */
.card{transition:border-color var(--transition),box-shadow var(--transition)}
.card:hover{border-color:var(--card-hover-border);box-shadow:0 2px 10px rgba(0,0,0,.06)}
.item-card{transition:transform .12s ease,border-color var(--transition),box-shadow var(--transition)}
.item-card:hover{border-color:var(--card-hover-border);box-shadow:0 2px 8px rgba(0,0,0,.07)}
.btn{transition:opacity var(--transition),transform var(--transition),background var(--transition)}
.btn:hover{opacity:.9}
.btn-primary:hover{opacity:.85}

.btn-ghost:hover{background:var(--accent)}
.icon-btn{transition:opacity var(--transition),transform var(--transition)}
.icon-btn:hover{opacity:.85;transform:scale(1.06)}
.wd-action-btn{transition:all var(--transition)}
.wd-action-btn:hover{border-color:var(--card-hover-border);background:var(--accent-light)}
.wd-action-btn.primary:hover{opacity:.88}
.filter-chip{transition:all var(--transition)}
.filter-chip:hover:not(.active){background:var(--accent-light);border-color:var(--accent);color:var(--text)}
.tag-pill{transition:background var(--transition),transform var(--transition)}
.tag-pill:hover{background:var(--accent);color:var(--card);transform:scale(1.04)}
.vibe-mode-btn{transition:all var(--transition)}
.vibe-mode-btn:hover:not(.active){background:var(--accent-light);border-color:var(--accent);color:var(--text)}
.pk-got-btn{transition:opacity var(--transition),transform var(--transition)}
.pk-got-btn:hover{opacity:.85;transform:scale(1.02)}
.row{transition:background var(--transition)}
.row:hover{background:var(--accent-light)}
.nav-btn{transition:color var(--transition)}
.back-btn{transition:color var(--transition),opacity var(--transition)}
.back-btn:hover{opacity:.7}
.picker-item{transition:border-color var(--transition),transform .12s ease}
.picker-item:hover{transform:scale(1.02)}
/* consistent card padding */
.pk-group{margin-bottom:12px}
/* clickable affordance for pack/outfit cards */
.card[style*="cursor:pointer"]:hover{border-color:var(--card-hover-border)}

@media (max-width:420px){
  .page{padding:0 12px 20px}
  .topbar,.topbar-centered{padding:14px 12px 8px}
  .topbar-title,.topbar-centered-title{font-size:18px}
  .topbar-centered-title{max-width:calc(100% - 112px)}
  .tabs{margin-bottom:16px}
  .tab{min-width:92px;padding:8px 10px;font-size:13px}

  .nav-label{font-size:9px}
  .snap-grid,.wd-snap-grid,.wd-actions{gap:8px}
  .risk-grid{grid-template-columns:1fr}
  .item-grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
  .picker-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
  .pk-baggage-limit{white-space:normal}
  .pk-group-header,.row{padding-left:12px;padding-right:12px}
  .pk-check-row{align-items:flex-start}
  [style*="display:grid"][style*="grid-template-columns:1fr 1fr"]{grid-template-columns:1fr!important}
  [style*="display:grid"][style*="grid-template-columns:1fr 1fr 1fr"]{grid-template-columns:1fr!important}
  [style*="display:flex;justify-content:space-between;align-items:center"]{flex-wrap:wrap}
}
</style>

<script>
// ════════════════════════════════════════════════════════════
// CONFIG — replace with your values

const SUPA_URL = 'https://epgwjqdjrfztfqlzlieq.supabase.co';
const SUPA_KEY = 'sb_publishable_I9_EUNDFXnKmuwA1vE-UpQ_NB3wBw4M';

// ════════════════════════════════════════════════════════════
// TABLES
// ════════════════════════════════════════════════════════════
const T = {
  PERSONAL_INCOME:    'personal_income',
  EXPECTED_INCOME:    'expected_income',
  FIXED_COSTS:        'fixed_costs',
  VARIABLE_SPENDING:  'variable_spending',
  CATEGORY_BUDGETS:   'category_budgets',
  DEBT_MASTER:        'debt_master',
  DEBT_HISTORY:       'debt_history',
  DEBT_TOTAL_HISTORY: 'debt_total_history',
  COMPANY_ACCOUNTS:   'company_accounts',
  COMPANY_FIXED:      'company_fixed_costs',
  INBOX:              'inbox',
  ACTIONS:            'actions',
  INVENTORY:          'inventory',
  OUTFITS:            'outfits',
  PACKS:              'packs',
  IDEAS:              'ideas',
  PROJECTS:           'projects',
  CONTENT_ITEMS:      'content_items',
  HABITS:             'habits',
  HABIT_LOGS:         'habit_logs',
  MOODBOARD:          'moodboard_items',
};

// ════════════════════════════════════════════════════════════
// SUPABASE CLIENT
// ════════════════════════════════════════════════════════════
let DB;
function getDB() {
  if (!DB) DB = supabase.createClient(SUPA_URL, SUPA_KEY);
  return DB;
}

async function dbFetch(table, opts = {}) {
  let q = getDB().from(table).select(opts.select || '*');
  if (opts.eq)    Object.entries(opts.eq).forEach(([k,v]) => { q = q.eq(k,v); });
  if (opts.gte)   q = q.gte(opts.gte[0], opts.gte[1]);
  if (opts.lte)   q = q.lte(opts.lte[0], opts.lte[1]);
  if (opts.order) q = q.order(opts.order[0], {ascending: opts.order[1] ?? false});
  if (opts.limit) q = q.limit(opts.limit);
  const {data, error} = await q;
  if (error) {
    console.error('[Supabase]', table, error.code, error.message);
    showToast('Data error on ' + table + ': ' + error.message, 'error');
    return [];
  }
  console.log('[dbFetch]', table, '->', (data||[]).length, 'rows');
  return data || [];
}

function showToast(msg, type) {
  const t = document.createElement('div');
  const bg = type === 'error' ? '#D84040' : '#1D9E75';
  t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:' + bg + ';color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;z-index:999;max-width:340px;text-align:center;box-shadow:0 4px 12px rgba(0,0,0,.2)';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 6000);
}
async function dbInsert(table, row) {
  const { data: { user } } = await getDB().auth.getUser();
  const rowWithUser = user ? { ...row, user_id: user.id } : row;
  const {data, error} = await getDB().from(table).insert(rowWithUser).select();
  if (error) throw error;
  return data[0];
}
async function dbUpdate(table, id, updates) {
  const {error} = await getDB().from(table).update(updates).eq('id', id);
  if (error) throw error;
}
async function dbDelete(table, id) {
  const {error} = await getDB().from(table).delete().eq('id', id);
  if (error) throw error;
}

// ════════════════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════════════════
function fmt(n) {
  if (n === null || n === undefined || isNaN(n)) return '£0.00';
  const v = parseFloat(n);
  const s = '£' + Math.abs(v).toLocaleString('en-GB', {minimumFractionDigits:2, maximumFractionDigits:2});
  return v < 0 ? '-' + s : s;
}
function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'});
}
function fmtDateUp(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-GB', {day:'2-digit', month:'long', year:'numeric'}).toUpperCase();
}
function monthRange() {
  const n = new Date();
  return {
    start: new Date(n.getFullYear(), n.getMonth(), 1).toISOString(),
    end:   new Date(n.getFullYear(), n.getMonth()+1, 0, 23, 59, 59).toISOString()
  };
}
function debtBal(d) {
  return (parseFloat(d.opening_balance)||0) + (parseFloat(d.new_spend)||0) - (parseFloat(d.payments_made)||0) + (parseFloat(d.interest_charged)||0);
}
function estMin(d) {
  const bal = debtBal(d), pct = parseFloat(d.min_payment_percent)||0;
  return pct > 0 ? bal * (pct/100) : 0;
}
// estInterest: monthly interest cost for one debt
// Excludes interest_free accounts. Uses apr_type to annualise correctly.
function estInterest(d) {
  if (d.interest_free) return 0;
  const bal = debtBal(d), apr = parseFloat(d.apr_percent)||0;
  if (apr === 0) return 0;
  return d.apr_type?.toLowerCase() === 'monthly' ? bal*(apr/100) : bal*(apr/100/12);
}

// ── Central Damage & Risk block ─────────────────────────────
// Inclusion rule: live balance > 0, not status-based.
function calcDamageAndRisk(debts) {

  // 1. Est Interest: live balance > 0, APR > 0, not interest_free
  const intDebts    = debts.filter(d => debtBal(d) > 0 && !d.interest_free && (parseFloat(d.apr_percent)||0) > 0);
  const totalEstInt = intDebts.reduce((s,d) => s + estInterest(d), 0);

  // 2. Est Min Payment: live balance > 0
  const totalEstMin = debts.filter(d => debtBal(d) > 0).reduce((s,d) => s + estMin(d), 0);

  // 3. Utilisation: numerator = sum of all live balances; denominator = ALL debts with limit > 0
  const utilBal   = debts.reduce((s,d) => s + debtBal(d), 0);
  const utilLimit = debts.filter(d => (parseFloat(d.credit_limit)||0) > 0).reduce((s,d) => s + (parseFloat(d.credit_limit)||0), 0);
  const totalUtil = utilLimit > 0 ? (utilBal / utilLimit) * 100 : 0;

  // 4. Highest Risk: live balance > 0, not interest_free — highest APR
  const highRisk = intDebts.reduce((w,d) => {
    if (!w) return d;
    return (parseFloat(d.apr_percent)||0) > (parseFloat(w.apr_percent)||0) ? d : w;
  }, null);

  return { totalEstInt, totalEstMin, totalUtil, highRisk };
}
function setHTML(el, html) {
  if (typeof el === 'string') el = document.getElementById(el);
  if (el) el.innerHTML = html;
}
function root() { return document.getElementById('page-root'); }
function scrollIntoViewIfNeeded(el) {
  if (!el || typeof el.scrollIntoView !== 'function') return;
  el.scrollIntoView({behavior:'smooth', inline:'center', block:'nearest'});
}

// ════════════════════════════════════════════════════════════
// AUTH
// ════════════════════════════════════════════════════════════
async function doLogout() {
  await getDB().auth.signOut();
  document.getElementById('app').classList.add('hidden');
  document.getElementById('login-page').classList.remove('hidden');
  document.getElementById('l-email').value = '';
  document.getElementById('l-pass').value = '';
}

async function doLogin() {
  const email = document.getElementById('l-email').value.trim();
  const pass  = document.getElementById('l-pass').value;
  const err   = document.getElementById('login-err');
  err.style.display = 'none';
  try {
    const {error} = await getDB().auth.signInWithPassword({email, password: pass});
    if (error) throw error;
    showApp();
  } catch(e) {
    err.textContent = e.message || 'Sign in failed';
    err.style.display = 'block';
  }
}
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('l-pass') === document.activeElement) doLogin();
});

// ════════════════════════════════════════════════════════════
// ROUTER
// ════════════════════════════════════════════════════════════
// Top-level routes that should be persisted on refresh
const PERSIST_ROUTES = ['finance','dashboard','inbox','actions','wardrobe','ideas','projects','content','habits'];

// Helper: navigate to a project detail page by title
async function openProjectByTitle(title) {
  if (!title) return;
  const rows = await dbFetch(T.PROJECTS, {});
  const match = rows.find(p => p.title === title);
  if (match) { navigate('projects'); setTimeout(() => renderProjectDetail(match.id), 300); }
  else navigate('projects');
}

async function navigate(route, params = {}) {
  // Persist top-level route so refresh restores it
  if (PERSIST_ROUTES.includes(route)) {
    localStorage.setItem('alika-route', route);
  }

  // Update nav
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const navId = {finance:'nav-finance', dashboard:'nav-dashboard', inbox:'nav-inbox', actions:'nav-actions', wardrobe:'nav-wardrobe', ideas:'nav-ideas', projects:'nav-projects', content:'nav-content', habits:'nav-habits', progress:'nav-dashboard'}[route];
  const topLevel = ['finance','dashboard','inbox','actions','wardrobe','ideas','projects','content','habits','progress','settings'];
  if (navId) {
    const activeBtn = document.getElementById(navId);
    activeBtn?.classList.add('active');
    scrollIntoViewIfNeeded(activeBtn);
  }
  else if (!topLevel.includes(route)) {
    // sub-page: keep finance active
    const financeBtn = document.getElementById('nav-finance');
    financeBtn?.classList.add('active');
    scrollIntoViewIfNeeded(financeBtn);
  }

  // Destroy any existing chart
  if (window._debtChart) { window._debtChart.destroy(); window._debtChart = null; }

  root().innerHTML = '<div class="spinner"></div>';

  const routes = {
    finance:       renderFinance,
    bills:         renderBills,
    'co-bills':    renderCoBills,
    spending:      renderSpending,
    income:        renderIncome,
    debt:          renderDebt,
    'debt-history':renderDebtHistory,
    budgets:       renderBudgets,
    'co-income':   renderCoIncome,
    dashboard:     renderDashboard,
    inbox:         renderInbox,
    actions:       renderActions,
    wardrobe:      renderWardrobe,
    ideas:         renderIdeas,
    projects:      renderProjects,
    content:       renderContent,
    habits:        renderHabits,
    progress:      renderProgress,
    settings:      renderSettings,
  };
  const fn = routes[route];
  if (fn) await fn(params);
}

// ════════════════════════════════════════════════════════════
// DASHBOARD
// ════════════════════════════════════════════════════════════
async function renderDashboard() {
  root().innerHTML = '<div class="spinner"></div>';

  const now = new Date();
  const curY = now.getFullYear(), curM = now.getMonth();
  function isThisMonth(dateStr) {
    if (!dateStr) return false;
    const d = new Date(dateStr);
    return d.getFullYear() === curY && d.getMonth() === curM;
  }
  function todayStr() {
    const t = new Date(); t.setHours(0,0,0,0); return t;
  }

  const [
    personalIncome, fixedCosts, variableSpending, categoryBudgets, debts,
    inboxItems, actions,
    inventory, outfits, packs,
    companyAccounts, companyFixed,
    dashHabits, dashHabitLogs
  ] = await Promise.all([
    dbFetch(T.PERSONAL_INCOME,  {order:['date_received',false]}),
    dbFetch(T.FIXED_COSTS,      {order:['due_day',true]}),
    dbFetch(T.VARIABLE_SPENDING,{order:['date',false]}),
    dbFetch(T.CATEGORY_BUDGETS, {}),
    dbFetch(T.DEBT_MASTER,      {}),
    dbFetch(T.INBOX,            {}),
    dbFetch(T.ACTIONS,          {}),
    dbFetch(T.INVENTORY,        {select:'item_id,status'}),
    dbFetch(T.OUTFITS,          {select:'id'}),
    dbFetch(T.PACKS,            {select:'id,name,start_date,end_date'}),
    dbFetch(T.COMPANY_ACCOUNTS, {order:['date',false]}),
    dbFetch(T.COMPANY_FIXED,    {order:['due_day',true]}),
    dbFetch(T.HABITS,           {order:['created_at',true]}),
    dbFetch(T.HABIT_LOGS,       {eq:{log_date: habitTodayStr()}}),
  ]);

  // ── Habit week logs (separate fetch — gte/lte not combined in dbFetch) ──
  const dashWeekStart = (() => {
    const d = new Date(); d.setHours(0,0,0,0);
    d.setDate(d.getDate() - d.getDay()); // Sunday
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  })();
  const { data: dashWeekLogsRaw } = await getDB()
    .from(T.HABIT_LOGS)
    .select('*')
    .gte('log_date', dashWeekStart);
  const dashWeekLogs = dashWeekLogsRaw || [];

  // ── Finance ──
  const thisMonthIncome   = personalIncome.filter(r => isThisMonth(r.date_received));
  const thisMonthSpending = variableSpending.filter(r => isThisMonth(r.date));
  const totalIncome    = thisMonthIncome.reduce((s,r) => s+(parseFloat(r.gross_amount)||0),0);
  const totalFixed     = fixedCosts.reduce((s,r) => s+(parseFloat(r.monthly_amount)||0),0);
  const activeDebts    = debts.filter(d => d.status?.toLowerCase() !== 'cleared');
  const totalDebt      = activeDebts.reduce((s,d) => s+debtBal(d),0);
  const budgetTarget   = categoryBudgets.reduce((s,r) => s+(parseFloat(r.monthly_target)||0),0);
  const totalSpent     = thisMonthSpending.reduce((s,r) => s+(parseFloat(r.amount)||0),0);
  const budgetRem      = budgetTarget - totalSpent;

  // ── Inbox ──
  const inboxNew        = inboxItems.filter(i => (i.status||'new').toLowerCase() === 'new').length;
  const inboxActionable = inboxItems.filter(i => (i.status||'').toLowerCase() === 'actionable').length;

  // ── Company Finance ──
  const coIncome       = companyAccounts.filter(r => r.status === 'Received' && r.entry_type === 'Income').reduce((s,r) => s+(parseFloat(r.amount)||0), 0);
  const coExpIncome    = companyAccounts.filter(r => r.status === 'Expected'  && r.entry_type === 'Income').reduce((s,r) => s+(parseFloat(r.amount)||0), 0);
  const coExpExpenses  = companyAccounts.filter(r => r.status === 'Expected'  && r.entry_type === 'Expense').reduce((s,r) => s+(parseFloat(r.amount)||0), 0);
  const coFixed     = companyFixed.reduce((s,r) => s+(parseFloat(r.monthly_amount)||0), 0);
  const coFixedPaid = companyFixed.reduce((s,r) => s+(parseFloat(r.paid_amount_this_month)||0), 0);
  const coFixedRem  = coFixed - coFixedPaid;

  // ── Actions ──
  const tod = todayStr();

  // ── Reminders ──
  const reminders = inboxItems.filter(i => i.is_reminder && !i.is_processed);

  // ── Onboarding detection ──
  const isNewUser = personalIncome.length === 0 && actions.length === 0 && inboxItems.length === 0
    && inventory.length === 0 && outfits.length === 0 && dashHabits.length === 0;
  function urgency(a) {
    if ((a.status||'').toLowerCase() === 'done') return 'done';
    if (!a.hard_deadline) return 'upcoming';
    const dl = new Date(a.hard_deadline); dl.setHours(0,0,0,0);
    if (dl < tod)  return 'overdue';
    if (dl.getTime() === tod.getTime()) return 'today';
    return 'upcoming';
  }
  const actOpen      = actions.filter(a => (a.status||'').toLowerCase() !== 'done');
  const actOverdue   = actOpen.filter(a => urgency(a) === 'overdue').length;
  const actToday     = actOpen.filter(a => urgency(a) === 'today').length;
  const actInProg    = actOpen.filter(a => (a.status||'').toLowerCase() === 'in progress').length;

  // ── Wardrobe ──
  const wAvail   = inventory.filter(i => i.status === 'Available').length;
  const wLaundry = inventory.filter(i => i.status === 'In Laundry').length;
  const wPacked  = inventory.filter(i => i.status === 'Packed').length;
  const wOutfits = outfits.length;
  const wPacks   = packs.length;

  // ── This Week ──
  const weekStart = new Date(tod); weekStart.setHours(0,0,0,0);
  const weekEnd   = new Date(tod); weekEnd.setDate(weekEnd.getDate() + 7); weekEnd.setHours(23,59,59,999);

  function inWeek(dateStr) {
    if (!dateStr) return false;
    const d = new Date(dateStr); 
    return d >= weekStart && d <= weekEnd;
  }

  // ── Dashboard Upcoming Bills — true rolling next-due-date logic ──
  const _dashToday = new Date(); _dashToday.setHours(0,0,0,0);
  const _dashWeekEnd = new Date(_dashToday); _dashWeekEnd.setDate(_dashWeekEnd.getDate() + 7); _dashWeekEnd.setHours(23,59,59,999);

  function computeNextDueDate(b) {
    // Monthly bill: due_day_number or legacy due_day
    const dayNum = parseInt(b.due_day_number || b.due_day || '');
    if (!dayNum || isNaN(dayNum)) return null;

    const now = new Date();
    // This month's due date
    let d = new Date(now.getFullYear(), now.getMonth(), dayNum);
    d.setHours(0, 0, 0, 0);
    // If already passed, use next month
    if (d < _dashToday) {
      d = new Date(now.getFullYear(), now.getMonth() + 1, dayNum);
      d.setHours(0, 0, 0, 0);
    }
    return d;
  }

  function billsInWindow(bills, type) {
    return bills
      .map(b => ({ bill: b, due: computeNextDueDate(b) }))
      .filter(({ due }) => due && due >= _dashToday && due <= _dashWeekEnd)
      .map(({ bill, due }) => {
        const amtDue = parseFloat(bill.monthly_amount) || 0;
        const amtPaid = parseFloat(bill.paid_amount_this_month) || 0;
        const fullyPaid = amtPaid >= amtDue && amtDue > 0;
        return {
          date:   due,
          label:  bill.provider || bill.category || 'Bill',
          amount: amtDue,
          amtPaid,
          paid:   fullyPaid,
          type,
        };
      });
  }

  const upcomingBills7 = [
    ...billsInWindow(fixedCosts,    'Personal'),
    ...billsInWindow(companyFixed,  'Company'),
  ].sort((a, b) => a.date - b.date);

  // ── This Week (actions + income only) ──
  const weekItems = [];
  // Expected income this week
  personalIncome.filter(r => (r.status||'').toLowerCase() !== 'received').forEach(r => {
    if (!r.date_received) return;
    const d = new Date(r.date_received);
    if (d >= weekStart && d <= weekEnd) {
      weekItems.push({ date: d, label: (r.paid_by||r.description||'Income') + ' — ' + fmt(r.gross_amount), type: 'Income', typeStyle: 'color:var(--teal)' });
    }
  });
  // Actions due this week
  actions.filter(a => (a.status||'').toLowerCase() !== 'done' && a.hard_deadline).forEach(a => {
    const d = new Date(a.hard_deadline);
    if (d >= weekStart && d <= weekEnd) {
      weekItems.push({ date: d, label: a.title || 'Action', type: 'Action', typeStyle: 'color:var(--text2)' });
    }
  });
  weekItems.sort((a,b) => a.date - b.date);

  // ── Upcoming Trips ──
  const todMidnight = new Date(tod);
  const upcomingTrips = packs
    .filter(p => p.start_date && new Date(p.start_date) >= todMidnight)
    .sort((a,b) => new Date(a.start_date) - new Date(b.start_date))
    .slice(0,3);

  // ── Section card helper ──
  function sCard(title, nav, rows, accent) {
    const accentStyle = accent ? `border-left:3px solid ${accent}` : '';
    const rowsHtml = rows.map(([label, val, cls]) =>
      `<div style="display:flex;justify-content:space-between;align-items:baseline;padding:7px 0;border-bottom:1px solid var(--border)">
        <span style="font-size:13px;color:var(--text2)">${label}</span>
        <span style="font-size:16px;font-weight:600;color:var(--text)" class="${cls||''}">${val}</span>
      </div>`
    ).join('');
    return `<div class="card" style="padding:16px;margin-bottom:12px;${accentStyle}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3)">${title}</span>
        <button onclick="navigate('${nav}')" style="background:none;border:none;font-size:12px;color:var(--accent);cursor:pointer;font-family:inherit;font-weight:500;padding:0">View →</button>
      </div>
      <div style="margin-top:-4px">${rowsHtml}</div>
    </div>`;
  }

  function qBtn(icon, label, action) {
    return `<button onclick="${action}" style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:14px 8px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;font-family:inherit;font-size:11px;font-weight:500;color:var(--text2);transition:all .15s;line-height:1.2;text-align:center" onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--text)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--text2)'">
      <span style="font-size:20px">${icon}</span>${label}
    </button>`;
  }

  const greeting = (() => {
    const h = now.getHours();
    if (h < 12) return 'Good morning';
    if (h < 18) return 'Good afternoon';
    return 'Good evening';
  })();

  root().innerHTML = `
<div class="page">
  <div class="topbar-centered">
    <div class="topbar-centered-title">Dashboard</div>
    <div style="display:flex;align-items:center;gap:8px;margin-left:auto">
      <button onclick="navigate('settings')" style="background:none;border:none;cursor:pointer;color:var(--text3);padding:4px;display:flex;align-items:center;border-radius:6px" title="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      </button>
      <button onclick="doLogout()" style="background:none;border:none;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;padding:4px 8px;border-radius:6px">Sign out</button>
    </div>
  </div>

  <div style="padding:4px 0 20px">
    <div style="font-size:22px;font-weight:400;color:var(--text);letter-spacing:-.01em">${greeting}</div>
    <div style="font-size:13px;color:var(--text3);margin-top:2px">${now.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'})}</div>
  </div>

  ${actOverdue > 0 ? `<div style="background:var(--danger-light);border:1px solid var(--danger);border-radius:var(--rs);padding:10px 14px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center">
    <span style="font-size:13px;font-weight:500;color:var(--danger)">⚠ ${actOverdue} overdue action${actOverdue!==1?'s':''}</span>
    <button onclick="navigate('actions')" style="background:none;border:none;font-size:12px;color:var(--danger);cursor:pointer;font-weight:600;font-family:inherit">View →</button>
  </div>` : ''}

  ${(inboxNew + inboxActionable) > 0 ? `<div style="background:var(--accent-light);border:1px solid var(--accent);border-radius:var(--rs);padding:10px 14px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center">
    <span style="font-size:13px;font-weight:500;color:var(--text)">${inboxNew} new · ${inboxActionable} actionable in Inbox</span>
    <button onclick="navigate('inbox')" style="background:none;border:none;font-size:12px;color:var(--accent);cursor:pointer;font-weight:600;font-family:inherit">View →</button>
  </div>` : ''}

  ${reminders.length ? `
  <div style="margin-bottom:14px">
    <div style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:6px">🔔 Reminders</div>
    ${reminders.map(r => `

      <span style="font-size:13px;font-weight:500;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${(r.content||'').replace(/</g,'&lt;')}</span>
      <button onclick="dbUpdate(T.INBOX,'${String(r.id).replace(/'/g,"\\'")}',{is_reminder:false}).then(()=>renderDashboard())" style="background:none;border:none;font-size:11px;font-weight:600;color:var(--amber);cursor:pointer;font-family:inherit;flex-shrink:0;padding:0">Dismiss</button>
    </div>`).join('')}
  </div>` : ''}

  ${isNewUser ? `
  <div class="card" style="padding:16px;margin-bottom:16px;border-left:3px solid var(--accent)">
    <div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:12px">👋 Welcome to Alika — get started</div>
    <div style="display:flex;flex-direction:column;gap:6px">
      <button onclick="showProjectModal(null)" style="display:flex;align-items:center;gap:10px;background:var(--accent-light);border:1px solid var(--border);border-radius:var(--rs);padding:10px 12px;cursor:pointer;font-family:inherit;text-align:left;width:100%">
        <span style="font-size:16px">📋</span>
        <div>
          <div style="font-size:13px;font-weight:600;color:var(--text)">Add your first Project</div>
          <div style="font-size:11px;color:var(--text3)">Group work, ideas and actions together</div>
        </div>
      </button>
      <button onclick="showHabitModal(null)" style="display:flex;align-items:center;gap:10px;background:var(--accent-light);border:1px solid var(--border);border-radius:var(--rs);padding:10px 12px;cursor:pointer;font-family:inherit;text-align:left;width:100%">
        <span style="font-size:16px">🔄</span>
        <div>
          <div style="font-size:13px;font-weight:600;color:var(--text)">Add your first Habit</div>

        </div>
      </button>
      <button onclick="navigate('content');setTimeout(()=>showContentModal(null),300)" style="display:flex;align-items:center;gap:10px;background:var(--accent-light);border:1px solid var(--border);border-radius:var(--rs);padding:10px 12px;cursor:pointer;font-family:inherit;text-align:left;width:100%">
        <span style="font-size:16px">🗂</span>
        <div>
          <div style="font-size:13px;font-weight:600;color:var(--text)">Add your first Content item</div>
          <div style="font-size:11px;color:var(--text3)">Plan posts and content with a calendar view</div>
        </div>
      </button>
      <button onclick="navigate('finance')" style="display:flex;align-items:center;gap:10px;background:var(--accent-light);border:1px solid var(--border);border-radius:var(--rs);padding:10px 12px;cursor:pointer;font-family:inherit;text-align:left;width:100%">
        <span style="font-size:16px">💷</span>
        <div>
          <div style="font-size:13px;font-weight:600;color:var(--text)">Add your first Finance entry</div>
          <div style="font-size:11px;color:var(--text3)">Track income, bills and debt</div>
        </div>
      </button>
    </div>
  </div>` : ''}

  <div style="margin-bottom:14px">
    <div style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:6px">🗓 Upcoming Bills</div>
    <div class="card" style="padding:0 16px">
      ${upcomingBills7.length ? upcomingBills7.map(b => `<div class="row">
        <div class="row-left">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:2px">
            <div class="row-title" style="${b.paid?'color:var(--text3);text-decoration:line-through':''}">${b.label.replace(/</g,'&lt;')}${b.paid?' <span style="font-size:10px;color:var(--teal);font-weight:600;text-decoration:none">✓</span>':''}</div>
            <span style="font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:${b.type==='Company'?'var(--accent)':'var(--text3)'};background:var(--accent-light);padding:1px 5px;border-radius:99px;flex-shrink:0">${b.type}</span>
          </div>
          <div class="row-sub">${b.date.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'})}${b.amtPaid > 0 && !b.paid ? ` · ${fmt(b.amtPaid)} paid` : ''}</div>
        </div>
        <span style="font-size:14px;font-weight:600;color:${b.paid?'var(--teal)':'var(--danger)'};flex-shrink:0">${fmt(b.amount)}</span>
      </div>`).join('') : '<div class="row"><div class="muted">No bills due in the next 7 days</div></div>'}
    </div>
  </div>

  ${weekItems.length ? `

  <div class="card" style="margin-bottom:12px">
    ${weekItems.map(w => `<div class="row">
      <div class="row-left">
        <div style="font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;margin-bottom:2px;${w.typeStyle}">${w.type}</div>
        <div class="row-title">${w.label.replace(/</g,'&lt;')}</div>
        <div class="row-sub">${w.date.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'})}</div>
      </div>
    </div>`).join('')}
  </div>` : ''}

  <div class="sec-label"${weekItems.length ? '' : ' style="margin-top:4px"'}>Quick Actions</div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px">
    ${qBtn('💷','Finance','navigate(\'finance\')')}
    ${qBtn('📬','Inbox','navigate(\'inbox\')')}
    ${qBtn('✅','Actions','navigate(\'actions\')')}
    ${qBtn('👗','Wardrobe','navigate(\'wardrobe\')')}
    ${qBtn('🎨','Build Outfit','showAddOutfitModal()')}
    ${qBtn('🧳','Pack a Trip','showAddPackModal()')}
    ${qBtn('➕','Add Item','navigate(\'wardrobe\');setTimeout(showAddItemModal,400)')}
  </div>

  <div class="sec-label">Finance</div>
  ${sCard('This Month', 'finance', [
    ['Income received', fmt(totalIncome), ''],
    ['Fixed costs', fmt(totalFixed), ''],
    ['Total debt', fmt(totalDebt), totalDebt > 0 ? 'neg' : ''],
    ['Budget remaining', fmt(budgetRem), budgetRem < 0 ? 'neg' : 'pos'],
  ])}

  <div class="sec-label">Company Finance</div>
  ${sCard('This Month', 'finance', [
    ['Income received',    fmt(coIncome),      'pos'],
    ['Expected income',    fmt(coExpIncome),   ''],
    ['Expected expenses',  fmt(coExpExpenses), coExpExpenses > 0 ? 'neg' : ''],
    ['Fixed costs remaining', fmt(coFixedRem), coFixedRem < 0 ? 'neg' : ''],

  <div class="sec-label">Inbox</div>
  ${sCard('Messages', 'inbox', [
    ['New', inboxNew, ''],
    ['Actionable', inboxActionable, ''],
  ])}

  <div class="sec-label">Actions</div>
  ${sCard('Tasks', 'actions', [
    ['Overdue', actOverdue, actOverdue > 0 ? 'neg' : ''],
    ['Due today', actToday, ''],
    ['In progress', actInProg, ''],
    ['All open', actOpen.length, ''],
  ])}

  <div class="sec-label">Wardrobe</div>
  ${sCard('Items & Looks', 'wardrobe', [
    ['Available', wAvail, ''],
    ['In laundry', wLaundry, ''],
    ['Packed', wPacked, ''],
    ['Saved outfits', wOutfits, ''],
    ['Packs', wPacks, ''],
  ])}

  ${upcomingTrips.length ? `

  <div class="card" style="margin-bottom:12px">
    ${upcomingTrips.map(p => `<div class="row">

      <button onclick="renderPackDetail('${String(p.id).replace(/'/g,"\\'")}')" style="background:none;border:none;font-size:12px;color:var(--accent);cursor:pointer;font-weight:500;font-family:inherit;flex-shrink:0">View \u2192</button>
    </div>`).join('')}

async function renderFinance() {
  const [
    personalIncome, fixedCosts,
    variableSpending, categoryBudgets, debts,
    companyAccounts, companyFixed
  ] = await Promise.all([
    dbFetch(T.PERSONAL_INCOME,  {order:['date_received',false]}),
    dbFetch(T.FIXED_COSTS,      {order:['due_day',true]}),
    dbFetch(T.VARIABLE_SPENDING,{order:['date',false]}),
    dbFetch(T.CATEGORY_BUDGETS, {order:['category',true]}),
    dbFetch(T.DEBT_MASTER,      {order:['attack_order',true]}),
    dbFetch(T.COMPANY_ACCOUNTS, {order:['date',false]}),
    dbFetch(T.COMPANY_FIXED,    {order:['due_day',true]}),
  ]);

  const now = new Date();
  const curY = now.getFullYear(), curM = now.getMonth();
  function isThisMonth(dateStr) {
    if (!dateStr) return false;
    const d = new Date(dateStr);
    return d.getFullYear() === curY && d.getMonth() === curM;
  }
  const thisMonthIncome   = personalIncome.filter(r => isThisMonth(r.date_received));
  const thisMonthSpending = variableSpending.filter(r => isThisMonth(r.date));

  const totalIncome  = thisMonthIncome.reduce((s,r) => s+(parseFloat(r.gross_amount)||0),0);
  const totalExp     = personalIncome.filter(r=>(r.status||'').toLowerCase()==='expected').reduce((s,r)=>s+(parseFloat(r.gross_amount)||0),0);
  const totalFixed      = fixedCosts.reduce((s,r) => s+(parseFloat(r.monthly_amount)||0),0);
  const totalSpent      = thisMonthSpending.reduce((s,r) => s+(parseFloat(r.amount)||0),0);
  const budgetTarget    = categoryBudgets.reduce((s,r) => s+(parseFloat(r.monthly_target)||0),0);
  const remaining       = fixedCosts.reduce((s,r) => {
    const due  = parseFloat(r.monthly_amount)||0;
    const paid = parseFloat(r.paid_amount_this_month)||0;
    return s + Math.max(0, due - paid);
  }, 0);
  const budgetRem    = budgetTarget - totalSpent;

  const activeDebts  = debts.filter(d => d.status?.toLowerCase() !== 'cleared');
  const totalDebt    = activeDebts.reduce((s,d) => s+debtBal(d),0);
  const { totalEstInt, totalEstMin, totalUtil, highRisk } = calcDamageAndRisk(debts);

  const coReceived   = companyAccounts.filter(r => r.status==='Received' && r.entry_type==='Income');
  const coExpInc     = companyAccounts.filter(r => r.status==='Expected'  && r.entry_type==='Income');
  const coExpExp     = companyAccounts.filter(r => r.status==='Expected'  && r.entry_type==='Expense');
  const coIncome     = coReceived.reduce((s,r) => s+(parseFloat(r.amount)||0),0);
  const coExpIncome  = coExpInc.reduce((s,r) => s+(parseFloat(r.amount)||0),0);
  const coExpExpenses= coExpExp.reduce((s,r) => s+(parseFloat(r.amount)||0),0);
  const coCommission = companyAccounts.reduce((s,r) => s+(parseFloat(r.manager_commission)||0),0);
  const coFixed      = companyFixed.reduce((s,r) => s+(parseFloat(r.monthly_amount)||0),0);
  const coFixedPaid  = companyFixed.reduce((s,r) => s+(parseFloat(r.paid_amount_this_month)||0), 0);

  const coLoan       = companyAccounts.filter(r=>r.loan_direction).reduce((s,r)=>s+(parseFloat(r.amount)||0),0);

  // Sort bills by due_day, show next 5 with remaining balance
  const unpaidBills = fixedCosts.filter(r=>{
    const due = parseFloat(r.monthly_amount)||0;
    const paid = parseFloat(r.paid_amount_this_month)||0;
    return paid < due;
  }).sort((a,b)=>(a.due_day||99)-(b.due_day||99));
  const coUnpaid    = companyFixed.filter(r=>{
    const due = parseFloat(r.monthly_amount)||0;

async function renderBills() {
  const bills = await dbFetch(T.FIXED_COSTS, {order:['due_day',true]});
  const currentMonthKey = (() => { const n=new Date(); return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`; })();
  // Compute paid status: fully paid if paid_amount_this_month >= monthly_amount
  const withStatus = bills.map(b => {
    const amtDue  = parseFloat(b.monthly_amount) || 0;
    const amtPaid = parseFloat(b.paid_amount_this_month) || 0;
    return { ...b, _amtDue: amtDue, _amtPaid: amtPaid, _fullyPaid: amtPaid >= amtDue && amtDue > 0 };
  });
  const unpaid = withStatus.filter(b => !b._fullyPaid).sort((a,b) => (a.due_day||99)-(b.due_day||99));
  const paid   = withStatus.filter(b =>  b._fullyPaid).sort((a,b) => (a.due_day||99)-(b.due_day||99));
  _renderBillsUI('Bills', T.FIXED_COSTS, unpaid, paid, false);
}
async function renderCoBills() {
  const bills = await dbFetch(T.COMPANY_FIXED, {order:['due_day',true]});
  const withStatus = bills.map(b => {
    const amtDue  = parseFloat(b.monthly_amount) || 0;
    const amtPaid = parseFloat(b.paid_amount_this_month) || 0;
    return { ...b, _amtDue: amtDue, _amtPaid: amtPaid, _fullyPaid: amtPaid >= amtDue && amtDue > 0 };
  });
  const unpaid = withStatus.filter(b => !b._fullyPaid).sort((a,b) => (a.due_day||99)-(b.due_day||99));
  const paid   = withStatus.filter(b =>  b._fullyPaid).sort((a,b) => (a.due_day||99)-(b.due_day||99));
  _renderBillsUI('Company Bills', T.COMPANY_FIXED, unpaid, paid, true);
}

function _renderBillsUI(title, table, unpaid, paid, isCo) {

  const totalPaid = [...unpaid, ...paid].reduce((s,b) => s + b._amtPaid, 0);
  const allBills  = [...unpaid, ...paid];
  const grandTotal = allBills.reduce((s,b) => s + b._amtDue, 0);
  const remaining  = Math.max(0, grandTotal - totalPaid);

  root().innerHTML = `

  <div class="topbar-centered">

      <div style="font-size:11px;color:var(--text3);margin-top:2px">${allBills.length} bill${allBills.length!==1?'s':''}</div>
    </div>
    <div class="card" style="padding:12px 14px">
      <div style="font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:4px">Paid So Far</div>
      <div style="font-size:18px;font-weight:700;color:var(--teal)">${fmt(totalPaid)}</div>
      <div style="font-size:11px;color:var(--text3);margin-top:2px">${paid.length} fully paid</div>
    </div>
    <div class="card" style="padding:12px 14px">
      <div style="font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:4px">Remaining</div>
      <div style="font-size:18px;font-weight:700;color:${remaining>0?'var(--danger)':'var(--teal)'}">${fmt(remaining)}</div>

  <div class="card">${billRows(unpaid, table, isCo)||'<div class="row"><div class="muted">None</div></div>'}</div>

  <div class="card">${billRows(paid, table, isCo)||'<div class="row"><div class="muted">None</div></div>'}</div>
</div>`;
}

function billRows(rows, table, isCo) {
  return rows.map(b => {
    const amtDue  = b._amtDue  || 0;
    const amtPaid = b._amtPaid || 0;
    const remaining = Math.max(0, amtDue - amtPaid);
    const fullyPaid = b._fullyPaid;
    const hasPart   = amtPaid > 0 && !fullyPaid;
    const dayLabel  = (b.due_day_number || b.due_day) ? 'DAY ' + (b.due_day_number || b.due_day) : '—';
    return `
  <div class="row bill-row" data-s="${(b.provider+' '+(b.category||'')).toLowerCase()}">
    <div class="row-left" style="flex:1;min-width:0">
      <div class="row-tag">${dayLabel}</div>
      <div class="row-title">${b.provider||b.category||'—'}${b.category&&b.provider?' — '+b.category:''}</div>
      <div style="display:flex;align-items:baseline;gap:8px;margin-top:3px;flex-wrap:wrap">
        <span style="font-size:13px;color:var(--text2)">Due: ${fmt(amtDue)}</span>
        ${amtPaid > 0 ? `<span style="font-size:12px;color:var(--teal)">Paid: ${fmt(amtPaid)}</span>` : ''}
        ${hasPart ? `<span style="font-size:12px;color:var(--amber)">Rem: ${fmt(remaining)}</span>` : ''}
        ${fullyPaid ? `<span style="font-size:11px;font-weight:700;color:var(--teal)">✓ PAID</span>` : ''}
      </div>

async function renderDebt() {
  const debts = await dbFetch(T.DEBT_MASTER, {order:['attack_order',true]});
  const active  = debts.filter(d => d.status?.toLowerCase() !== 'cleared');
  const cleared = debts.filter(d => d.status?.toLowerCase() === 'cleared');

  // ── Snapshot calculations — aligned with Finance page ─────
  // Use same logic as Finance page: activeDebts for balance, calcDamageAndRisk(all debts) for util
  const totalDebt      = active.reduce((s,d) => s + debtBal(d), 0);
  const { totalEstInt, totalEstMin, totalUtil } = calcDamageAndRisk(debts);
  // Credit limit: ALL debts with a limit (same denominator as calcDamageAndRisk)
  const totalLimit     = debts.filter(d => (parseFloat(d.credit_limit)||0) > 0)
                              .reduce((s,d) => s + (parseFloat(d.credit_limit)||0), 0);
  // New spend: active debts only; Payments Made: ALL debts (active + cleared) — same live source as cards
  const totalNewSpend  = active.reduce((s,d) => s + (parseFloat(d.new_spend)||0), 0);
  const totalPayments  = debts.reduce((s,d) => s + (parseFloat(d.payments_made)||0), 0);
  const cardsCleared   = cleared.length;

  // ── Debt Strategy — improved logic ─────────────────────────
  const withBal = active.filter(d => debtBal(d) > 0);

  function urgencyScore(d) {
    if (d.interest_free) return 0;
    const apr = parseFloat(d.apr_percent) || 0;
    const bal = debtBal(d);
    const limit = parseFloat(d.credit_limit) || 0;
    const util = limit > 0 ? (bal / limit) : 0;
    return (apr * 0.7) + (util * 100 * 0.3);
  }

  const nonFreeWithBal = withBal.filter(d => !d.interest_free && (parseFloat(d.apr_percent)||0) > 0);
  const highRisk = nonFreeWithBal.slice().sort((a,b) =>
    (parseFloat(b.apr_percent)||0) - (parseFloat(a.apr_percent)||0)
  )[0] || withBal[0] || null;

  const focusCard = withBal.slice()
    .sort((a,b) => urgencyScore(b) - urgencyScore(a))[0] || null;

  const nextCard = withBal.slice()
    .sort((a,b) => urgencyScore(b) - urgencyScore(a))
    .find(d => d.id !== focusCard?.id) || null;

  // Payoff data for focus card (used by inline overpayment calculator)
  const focusBal  = focusCard ? debtBal(focusCard) : 0;
  const focusMinP = focusCard ? estMin(focusCard) : 0;
  const focusPaid = focusCard ? (parseFloat(focusCard.payments_made)||0) : 0;
  const defaultOverpay = Math.max(0, focusPaid - focusMinP);

  // ── Util colour helper ─────────────────────────────────────
  function utilCol(pct) {
    return pct >= 90 ? 'var(--danger)' : pct >= 50 ? 'var(--amber)' : 'var(--teal)';
  }

  // ── Card breakdown ─────────────────────────────────────────
  function debtCard(d) {
    const bal   = debtBal(d);
    const limit = parseFloat(d.credit_limit)||0;
    const util  = limit > 0 ? (bal / limit) * 100 : null;
    const apr   = parseFloat(d.apr_percent)||0;
    const min   = estMin(d);
    const ns    = parseFloat(d.new_spend)||0;
    const pm    = parseFloat(d.payments_made)||0;

    const utilBar = util !== null ? `
      <div style="display:flex;align-items:center;gap:8px;margin-top:6px">
        <div style="flex:1;height:4px;border-radius:2px;background:var(--border)">
          <div style="height:4px;border-radius:2px;width:${Math.min(util,100).toFixed(1)}%;background:${utilCol(util)}"></div>
        </div>
        <span style="font-size:11px;font-weight:600;color:${utilCol(util)};flex-shrink:0">${util.toFixed(0)}%</span>
      </div>` : '';

    return `<div class="row" style="flex-direction:column;align-items:stretch;padding:14px 16px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
        <div style="flex:1;min-width:0">
          <div style="font-size:15px;font-weight:700;color:var(--text)">${(d.account_name||'').replace(/</g,'&lt;')}</div>
          <div style="font-size:12px;color:var(--text3);margin-top:2px">${d.apr_type||'APR'}: <strong style="color:${apr>20?'var(--danger)':'var(--text2)'}">${apr}%</strong>${d.interest_free ? ' &nbsp;·&nbsp; <span style="color:var(--teal);font-weight:600">Interest Free</span>' : ''}</div>
        </div>
        <div style="text-align:right;flex-shrink:0;margin-left:12px">
          <div style="font-size:18px;font-weight:700;color:var(--text)">${fmt(bal)}</div>
          ${limit ? `<div style="font-size:11px;color:var(--text3)">of ${fmt(limit)}</div>` : ''}
        </div>
      </div>
      ${utilBar}
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:10px">
        <div style="background:var(--bg);border-radius:var(--rs);padding:7px 10px">
          <div style="font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin-bottom:2px">New Spend</div>
          <div style="font-size:14px;font-weight:700;color:${ns>100?'var(--danger)':'var(--text)'}">${fmt(ns)}</div>
        </div>
        <div style="background:var(--bg);border-radius:var(--rs);padding:7px 10px">
          <div style="font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin-bottom:2px">Paid</div>
          <div style="font-size:14px;font-weight:700;color:var(--teal)">${fmt(pm)}</div>
        </div>
        <div style="background:var(--bg);border-radius:var(--rs);padding:7px 10px">
          <div style="font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin-bottom:2px">Est Min</div>
          <div style="font-size:14px;font-weight:700;color:var(--text)">${min > 0 ? fmt(min) : '—'}</div>

function debtCalcPayoff(overpayInput) {
  const panel = document.getElementById('debt-payoff-panel');
  if (!panel) return;
  const op  = Math.max(0, parseFloat(overpayInput) || 0);
  const ctx = window._debtCtx || {};
  const { totalDebt = 0, totalLimit = 0, totalUtil = 0, focusBal = 0, focusMinP = 0 } = ctx;

  if (op <= 0) {
    panel.innerHTML = '<div style="font-size:12px;color:var(--text3)">Enter an overpayment amount above to see the impact</div>';
    return;
  }

  // Payoff estimate at current overpayment
  const months = focusBal > 0 ? Math.ceil(focusBal / op) : 0;
  const payoffStr = months <= 0 ? 'Already cleared' :
                    months === 1 ? 'Less than 1 month' :
                    months <= 120 ? `~${months} month${months !== 1 ? 's' : ''}` :
                    'Over 10 years';

  // Baseline: minimum-only payoff (if min > 0)
  const baselineMonths = (focusMinP > 0 && focusBal > 0) ? Math.ceil(focusBal / focusMinP) : null;
  const monthsSaved    = (baselineMonths !== null && months > 0 && baselineMonths > months)
    ? baselineMonths - months : null;

  // Debt reduction after 1 month overpayment
  const debtReduction = Math.min(op, focusBal);
  const newTotalDebt  = Math.max(0, totalDebt - debtReduction);
  const newUtil       = totalLimit > 0 ? (newTotalDebt / totalLimit) * 100 : 0;
  const utilChange    = totalUtil - newUtil;

  panel.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
      <div>
        <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:2px">Payoff Time</div>
        <div style="font-size:15px;font-weight:700;color:var(--teal)">${payoffStr}</div>
        <div style="font-size:11px;color:var(--text3)">at £${op}/mo overpay</div>
        ${monthsSaved !== null ? `<div style="font-size:11px;font-weight:600;color:var(--teal);margin-top:3px">↓ ${monthsSaved} month${monthsSaved!==1?'s':''} faster than minimum</div>` : ''}
      </div>
      <div>
        <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:2px">Debt After Month 1</div>
        <div style="font-size:15px;font-weight:700;color:var(--text)">${fmt(newTotalDebt)}</div>
        <div style="font-size:11px;color:var(--teal)">−${fmt(debtReduction)} this month</div>
        ${baselineMonths !== null ? `<div style="font-size:11px;color:var(--text3);margin-top:3px">Min-only: ~${baselineMonths} mo${baselineMonths>120?' (10+ yrs)':''}</div>` : ''}
      </div>
    </div>
    ${totalLimit > 0 ? `<div style="display:flex;align-items:center;gap:6px;padding-top:8px;border-top:1px solid var(--border)">
      <div style="flex:1">
        <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:3px">Utilisation after payment</div>
        <div style="height:4px;border-radius:2px;background:var(--border);margin-bottom:3px">
          <div style="height:4px;border-radius:2px;width:${Math.min(newUtil,100).toFixed(1)}%;background:${newUtil>=90?'var(--danger)':newUtil>=50?'var(--amber)':'var(--teal)'}"></div>
        </div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <span style="font-size:14px;font-weight:700;color:${newUtil>=90?'var(--danger)':newUtil>=50?'var(--amber)':'var(--teal)'}">${newUtil.toFixed(2)}%</span>
        ${utilChange > 0.01 ? `<div style="font-size:10px;color:var(--teal)">↓ ${utilChange.toFixed(2)}% better</div>` : ''}
      </div>
    </div>` : ''}`;
}

async function renderDebtHistory() {
  const [history, totalHist, debts] = await Promise.all([
    dbFetch(T.DEBT_HISTORY,       {order:['statement_date',true]}),
    dbFetch(T.DEBT_TOTAL_HISTORY, {order:['statement_date',true]}),
    dbFetch(T.DEBT_MASTER,        {order:['account_name',true]}),
  ]);

  const byAccount = {};
  // Use descending order for display list
  [...history].reverse().forEach(h=>{ if(!byAccount[h.account])byAccount[h.account]=[]; byAccount[h.account].push(h); });

  // ── Build month-aggregated chart data ──
  // Priority: use debt_total_history if available (already one-row-per-month totals).
  // Fallback: aggregate debt_history by YYYY-MM — for each month take the LATEST
  // closing_balance per account, then sum across accounts to get total for that month.
  let chartLabels = [], chartData = [];

  if (totalHist && totalHist.length) {
    // Aggregate by month (YYYY-MM) — use the latest entry per month
    const byMonth = {};
    totalHist.forEach(r => {
      if (!r.statement_date) return;
      const ym = r.statement_date.substring(0, 7); // "YYYY-MM"
      if (!byMonth[ym] || r.statement_date > byMonth[ym].statement_date) {
        byMonth[ym] = r;
      }
    });
    const sorted = Object.entries(byMonth).sort((a,b)=>a[0].localeCompare(b[0]));
    chartLabels = sorted.map(([ym]) => {
      const d = new Date(ym + '-01');
      return d.toLocaleDateString('en-GB', {month:'short', year:'numeric'});
    });
    chartData = sorted.map(([,r]) => parseFloat(r.total_debt)||0);

  } else if (history && history.length) {
    // For each YYYY-MM, pick the LATEST entry per account, then sum closing_balances
    const accountsByMonth = {}; // { "YYYY-MM": { accountName: latestClosingBalance } }
    history.forEach(r => {
      if (!r.statement_date || !r.account) return;
      const ym = r.statement_date.substring(0, 7);
      if (!accountsByMonth[ym]) accountsByMonth[ym] = {};
      // Keep only the latest date entry per account per month
      const existing = accountsByMonth[ym][r.account];
      if (!existing || r.statement_date > existing.date) {
        accountsByMonth[ym][r.account] = { date: r.statement_date, bal: parseFloat(r.closing_balance)||0 };
      }
    });
    const sorted = Object.entries(accountsByMonth).sort((a,b)=>a[0].localeCompare(b[0]));
    chartLabels = sorted.map(([ym]) => {
      const d = new Date(ym + '-01');
      return d.toLocaleDateString('en-GB', {month:'short', year:'numeric'});
    });
    chartData = sorted.map(([,accts]) => Object.values(accts).reduce((s,v)=>s+v.bal, 0));
  }

  root().innerHTML = `
<div class="page">
  <div class="topbar-centered">
    <button class="back-btn" onclick="navigate('debt')">‹ Back</button>
    <div class="topbar-centered-title">Debt History</div>
    <div class="topbar-centered-right"></div>
  </div>
  <div class="chart-card">
    <div class="chart-title">Debt Progress</div>
    <div class="chart-wrap"><canvas id="debt-chart"></canvas></div>
    <div style="display:flex;align-items:center;gap:6px;margin-top:10px;font-size:12px;color:var(--text2)">
      <div style="width:10px;height:10px;border-radius:50%;background:var(--accent)"></div>Total debt by month
    </div>
  </div>
  <button class="btn btn-primary mb16" onclick="showHistoryModal(${JSON.stringify(debts.map(d=>d.account_name)).replace(/"/g,"'")})">Add History Entry</button>
  <div class="ph"><h2 style="text-align:left">Debt History</h2></div>
  <div class="search-wrap">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <input class="search-input" placeholder="Search account…" oninput="filterGroups(this.value)"/>
  </div>
  <div id="hist-groups">
    ${Object.entries(byAccount).map(([acc,rows])=>`
    <div class="acct-group" data-acct="${acc.toLowerCase()}">
      <div class="ph mt16"><h2 style="text-align:left">${acc}</h2></div>
      <div class="card">
        ${rows.map(r=>{
          const change=(parseFloat(r.closing_balance)||0)-(parseFloat(r.opening_balance)||0);
          return `<div class="row">
            <div class="row-left">
              <div class="row-tag">${fmtDateUp(r.statement_date)}</div>
              <div class="row-title">Close: ${fmt(r.closing_balance)}</div>
              <div class="row-sub">Open Bal: ${fmt(r.opening_balance)} | Change: ${fmt(change)}</div>
            </div>
            <button class="menu-btn" onclick="delHistEntry('${r.id}')">···</button>
          </div>`;
        }).join('')}
      </div>
    </div>`).join('')||'<div class="muted center mt16">No history recorded yet</div>'}
  </div>
</div>`;

  // ── Draw chart ──
  if (window._debtChart) { window._debtChart.destroy(); window._debtChart = null; }
  const canvas = document.getElementById('debt-chart');
  if (!canvas) return;
  if (!chartLabels.length) {
    canvas.parentElement.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📈</div><div class="empty-state-msg">No history yet</div><div>Add history entries to see your progress</div></div>';
    return;
  }
  window._debtChart = new Chart(canvas.getContext('2d'), {
    type: 'line',
    data: {
      labels: chartLabels,
      datasets: [{
        label: 'Total Debt',
        data: chartData,
        borderColor: 'var(--accent)',
        backgroundColor: 'rgba(200,182,166,.12)',
        borderWidth: 2,
        pointBackgroundColor: 'var(--accent)',
        pointRadius: 4,
        tension: .3,
        fill: true
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        y: { ticks: { callback: v => '£' + v.toLocaleString('en-GB') }, grid: { color: 'rgba(0,0,0,.05)' } },
        x: { ticks: { font: { size: 11 } }, grid: { display: false } }
      }
    }
  });
}

  // Store ctx on window so suiteDecisionCheck can read it without args
