// HABITS PAGE
// Tables: habits, habit_logs
// habits: id, title, type, frequency, tracking_mode, notes, created_at, user_id
// habit_logs: id, habit_id, log_date, value, created_at, user_id
// ════════════════════════════════════════════════════════════
const HABIT_TYPES      = ['Routine','Health','Tracking','Wellness'];
const HABIT_FREQS      = ['Daily','Weekly','Ad hoc'];
const HABIT_TRACK_MODES= ['Check','Count'];

function habitTodayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

async function renderHabits() {
  const today = habitTodayStr();
  const [habits, logs] = await Promise.all([
    dbFetch(T.HABITS,     {order:['created_at', true]}),
    dbFetch(T.HABIT_LOGS, {eq:{log_date: today}}),
  ]);

  // Build a map: habit_id → log for today
  const todayLogMap = {};
  logs.forEach(l => { todayLogMap[l.habit_id] = l; });

  function habitCard(h) {
    const safeId   = String(h.id).replace(/'/g, "\\'");
    const log      = todayLogMap[h.id];
    const isCheck  = h.tracking_mode === 'Check';
    const isCount  = h.tracking_mode === 'Count';
    const done     = isCheck && log && log.value >= 1;
    const count    = isCount ? (log ? (parseInt(log.value)||0) : 0) : 0;
    const typeTag  = (h.type||'').toUpperCase();
    const freqTag  = h.frequency || '';

    // Target logic (Count only)
    const target     = h.target ? parseInt(h.target) : null;
    const targetType = h.target_type || 'min'; // 'min' | 'max'
    let targetState  = null; // 'met' | 'exceeded' | null
    if (isCount && target !== null) {
      if (targetType === 'min' && count >= target) targetState = 'met';
      if (targetType === 'max' && count >  target) targetState = 'exceeded';
    }

    const cardBorder = done         ? 'border-left:3px solid var(--teal)'
                     : targetState === 'met'      ? 'border-left:3px solid var(--teal)'
                     : targetState === 'exceeded' ? 'border-left:3px solid var(--danger)'
                     : '';
    const decDisabled = count <= 0;

    const actionBtn = isCheck
      ? `<button onclick="habitToggleCheck('${safeId}',${done})" style="flex-shrink:0;width:36px;height:36px;border-radius:50%;background:${done?'var(--teal)':'var(--border)'};border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s" title="${done?'Mark undone':'Mark done'}">
           <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="${done?'#fff':'var(--text3)'}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
         </button>`
      : `<div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
           <button onclick="habitDecrement('${safeId}',${count})" style="width:30px;height:30px;border-radius:50%;background:var(--border);border:none;cursor:${decDisabled?'default':'pointer'};font-size:16px;font-weight:600;color:var(--text2);display:flex;align-items:center;justify-content:center;opacity:${decDisabled?'.4':'1'}" ${decDisabled?'disabled':''}>−</button>
           <span style="font-size:20px;font-weight:700;min-width:28px;text-align:center;color:${targetState==='exceeded'?'var(--danger)':targetState==='met'?'var(--teal)':'var(--text)'}">${count}${target!==null?`<span style="font-size:12px;font-weight:400;color:var(--text3)"> / ${target}</span>`:''}</span>
           <button onclick="habitIncrement('${safeId}',${count})" style="width:30px;height:30px;border-radius:50%;background:var(--teal);border:none;cursor:pointer;font-size:18px;font-weight:600;color:#fff;display:flex;align-items:center;justify-content:center">+</button>
         </div>`;

    let statusLine;
    if (isCheck) {
      statusLine = `<span style="font-size:11px;font-weight:600;color:${done?'var(--teal)':'var(--text3)'};">${done?'✓ Done today':'Not yet done'}</span>`;
    } else if (target !== null) {
      if (targetType === 'min') {
        statusLine = targetState === 'met'
          ? `<span style="font-size:11px;font-weight:600;color:var(--teal)">✓ Target met (${count} / ${target})</span>`
          : `<span style="font-size:11px;color:var(--text3)">Today: <strong style="color:var(--text)">${count}</strong> <span style="color:var(--text3)">/ ${target} goal</span></span>`;
      } else {
        statusLine = targetState === 'exceeded'
          ? `<span style="font-size:11px;font-weight:600;color:var(--danger)">⚠ Limit exceeded (${count} / ${target})</span>`
          : `<span style="font-size:11px;color:var(--text3)">Today: <strong style="color:var(--text)">${count}</strong> <span style="color:var(--text3)">/ ${target} max</span></span>`;
      }
    } else {
      statusLine = `<span style="font-size:11px;color:var(--text3)">Today: <strong style="color:var(--text)">${count}</strong></span>`;
    }

    return `<div class="card" style="padding:14px 16px;margin-bottom:10px;${cardBorder}">
      <div style="display:flex;align-items:center;gap:12px">
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:3px">
            ${typeTag ? `<span class="row-tag" style="margin-bottom:0">${typeTag}</span>` : ''}
            ${freqTag ? `<span style="font-size:10px;font-weight:500;color:var(--text3)">${freqTag}</span>` : ''}
          </div>
          <div class="row-title">${(h.title||'—').replace(/</g,'&lt;')}</div>
          <div style="margin-top:5px">${statusLine}</div>
          ${h.notes ? `<div class="row-sub" style="margin-top:2px">${h.notes.replace(/</g,'&lt;')}</div>` : ''}
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          ${actionBtn}
          <button class="menu-btn" onclick="ctxHabit(event,'${safeId}')">···</button>
        </div>
      </div>
    </div>`;
  }

  root().innerHTML = `
<div class="page">
  <div class="topbar-centered">
    <div class="topbar-centered-title">Habits</div>
    <button class="icon-btn topbar-centered-right" onclick="showHabitModal(null)">+</button>
  </div>
  <div style="font-size:12px;color:var(--text3);text-align:center;margin-bottom:16px">${new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'})}</div>
  ${habits.length ? habits.map(habitCard).join('') : '<div class="card"><div class="row"><div class="muted">No habits yet — track routines or counts like water intake or daily steps</div></div></div>'}
</div>`;
}

async function habitToggleCheck(habitId, currentlyDone) {
  const today = habitTodayStr();
  const { data: { user } } = await getDB().auth.getUser();
  const uid = user?.id;
  if (currentlyDone) {
    // Remove today's log
    const { error } = await getDB().from(T.HABIT_LOGS).delete().eq('habit_id', habitId).eq('log_date', today);
    if (error) { showToast('Error: ' + error.message, 'error'); return; }
  } else {
    // Upsert log with value 1
    const existing = await dbFetch(T.HABIT_LOGS, {eq:{habit_id:habitId, log_date:today}});
    if (existing.length) {
      await getDB().from(T.HABIT_LOGS).update({value:1}).eq('habit_id', habitId).eq('log_date', today);
    } else {
      const row = {habit_id:habitId, log_date:today, value:1};
      if (uid) row.user_id = uid;
      await getDB().from(T.HABIT_LOGS).insert(row);
    }
  }
  renderHabits();
}

async function habitIncrement(habitId, currentCount) {
  const today = habitTodayStr();
  const { data: { user } } = await getDB().auth.getUser();
  const uid = user?.id;
  const newVal = currentCount + 1;
  const existing = await dbFetch(T.HABIT_LOGS, {eq:{habit_id:habitId, log_date:today}});
  if (existing.length) {
    await getDB().from(T.HABIT_LOGS).update({value:newVal}).eq('habit_id', habitId).eq('log_date', today);
  } else {
    const row = {habit_id:habitId, log_date:today, value:newVal};
    if (uid) row.user_id = uid;
    await getDB().from(T.HABIT_LOGS).insert(row);
  }
  renderHabits();
}

async function habitDecrement(habitId, currentCount) {
  if (currentCount <= 0) return;
  const today = habitTodayStr();
  const newVal = currentCount - 1;
  if (newVal === 0) {
    await getDB().from(T.HABIT_LOGS).delete().eq('habit_id', habitId).eq('log_date', today);
  } else {
    await getDB().from(T.HABIT_LOGS).update({value:newVal}).eq('habit_id', habitId).eq('log_date', today);
  }
  renderHabits();
}

function ctxHabit(e, id) {
  showCtx(e, [
    {label:'Edit',   fn: () => showHabitModal(id)},
    {label:'Delete', danger: true, fn: async () => {
      if (confirm('Delete this habit and all its logs?')) {
        // Delete logs first, then habit
        await getDB().from(T.HABIT_LOGS).delete().eq('habit_id', id);
        await dbDelete(T.HABITS, id);
        renderHabits();
      }
    }},
  ]);
}

async function showHabitModal(editId) {
  let ex = null;
  if (editId) { const r = await dbFetch(T.HABITS, {eq:{id:editId}}); ex = r[0] || null; }

  const allHabits  = await dbFetch(T.HABITS, {});
  const customTypes= allHabits.map(r=>r.type).filter(Boolean);
  const allTypes   = [...new Set([...HABIT_TYPES, ...customTypes])].sort();
  const curTrack   = ex?.tracking_mode || 'Check';
  const curTargetType = ex?.target_type || 'min';

  showModal(editId ? 'Edit Habit' : 'New Habit', `
    ${datalist('dl-hab-type', allTypes)}
    <div class="fg"><label>Title</label><input id="f-hab-title" value="${(ex?.title||'').replace(/"/g,'&quot;')}" placeholder="e.g. Kitchen reset, Weed" autocomplete="off"/></div>
    <div class="fg"><label>Type</label>${dlInput('f-hab-type','dl-hab-type', ex?.type||'', 'e.g. Routine, Health…')}</div>
    <div class="fg"><label>Frequency</label><select id="f-hab-freq">
      ${HABIT_FREQS.map(f=>`<option value="${f}"${(ex?.frequency||'Daily')===f?' selected':''}>${f}</option>`).join('')}
    </select></div>
    <div class="fg"><label>Tracking Mode</label><select id="f-hab-mode" onchange="document.getElementById('f-hab-target-wrap').style.display=this.value==='Count'?'':'none'">
      ${HABIT_TRACK_MODES.map(m=>`<option value="${m}"${curTrack===m?' selected':''}>${m} — ${m==='Check'?'Done / Not done':'Tap to count'}</option>`).join('')}
    </select></div>
    <div id="f-hab-target-wrap" style="display:${curTrack==='Count'?'':'none'}">
      <div class="fg"><label>Target <span style="font-weight:400;color:var(--text3)">(optional)</span></label><input id="f-hab-target" type="number" min="0" value="${ex?.target||''}" placeholder="e.g. 5"/></div>
      <div class="fg"><label>Target Type</label><select id="f-hab-targettype">
        <option value="min"${curTargetType==='min'?' selected':''}>At least (min)</option>
        <option value="max"${curTargetType==='max'?' selected':''}>Do not exceed (max)</option>
      </select></div>
    </div>
    <div class="fg"><label>Notes <span style="font-weight:400;color:var(--text3)">(optional)</span></label><input id="f-hab-notes" value="${(ex?.notes||'').replace(/"/g,'&quot;')}" placeholder="Optional notes…"/></div>
  `, async () => {
    const title = v('f-hab-title');
    if (!title) return alert('Enter a title.');
    const mode       = v('f-hab-mode') || 'Check';
    const targetRaw  = document.getElementById('f-hab-target')?.value?.trim();
    const targetVal  = (mode === 'Count' && targetRaw) ? (parseInt(targetRaw)||null) : null;
    const targetType = (mode === 'Count' && targetVal !== null) ? (v('f-hab-targettype') || 'min') : null;
    const row = {
      title,
      type:          v('f-hab-type')  || null,
      frequency:     v('f-hab-freq')  || 'Daily',
      tracking_mode: mode,
      target:        targetVal,
      target_type:   targetType,
      notes:         v('f-hab-notes') || null,
    };
    if (editId) {
      await dbUpdate(T.HABITS, editId, row);
    } else {
      await dbInsert(T.HABITS, row);
    }
    renderHabits();
  });
  setTimeout(() => document.getElementById('f-hab-title')?.focus(), 100);
}

// ── Monthly bills reset ──────────────────────────────────────
// On the 1st of a new month, reset paid_amount_this_month to 0 for all personal
// and company fixed-cost bills. Uses localStorage to track last-reset month.
async function resetBillsPaidIfNewMonth() {
  const now = new Date();
  const currentMonthKey = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const lastResetKey = localStorage.getItem('alika-bills-reset-month');
  if (lastResetKey === currentMonthKey) return; // already reset this month

  try {
    // Bulk-reset personal bills
    const personalBills = await dbFetch(T.FIXED_COSTS, {});
    const paidPersonal = personalBills.filter(b => (parseFloat(b.paid_amount_this_month)||0) > 0);
    await Promise.all(paidPersonal.map(b => dbUpdate(T.FIXED_COSTS, b.id, { paid_amount_this_month: 0 })));

    // Bulk-reset company bills
    const companyBills = await dbFetch(T.COMPANY_FIXED, {});
    const paidCompany = companyBills.filter(b => (parseFloat(b.paid_amount_this_month)||0) > 0);
    await Promise.all(paidCompany.map(b => dbUpdate(T.COMPANY_FIXED, b.id, { paid_amount_this_month: 0 })));

    localStorage.setItem('alika-bills-reset-month', currentMonthKey);
  } catch (e) {
    // Non-fatal — will retry next load
    console.warn('Bills monthly reset failed:', e);
  }
}

async function boot() {
  const {data:{session}} = await getDB().auth.getSession();
  if (session) {
    showApp();
  } else {
    document.getElementById('login-page').classList.remove('hidden');
  }
}

boot();

// ════════════════════════════════════════════════════════════
// THEME SWITCHER
// ════════════════════════════════════════════════════════════
function applyTheme(val) {
  const html = document.documentElement;
  if (val) html.setAttribute('data-theme', val);
  else html.removeAttribute('data-theme');
  localStorage.setItem('alika-theme', val);
  // update active state on buttons
  document.querySelectorAll('.theme-opt').forEach(btn => {
    btn.classList.toggle('active', (btn.dataset.themeVal || '') === val);
  });
}
// Theme panel managed via settings page
// Apply saved theme on load
(function() {
  const saved = localStorage.getItem('alika-theme') || '';
  applyTheme(saved);
})();

</script>
