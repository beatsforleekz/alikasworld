function suiteDecisionCheck() {
  const box = document.getElementById('suite-decision-box');
  if (!box) return;
  const ctx = window._dcCtx || {};
  const amt = parseFloat(document.getElementById('dc-amt')?.value) || 0;
  if (amt <= 0) {
    box.innerHTML = '<div style="font-size:12px;color:var(--text3);text-align:center">Enter an amount above to check this spend</div>';
    box.style.background = 'var(--accent-light)'; box.style.borderColor = 'var(--border)';
    return;
  }

  const { totalBudgetTarget = 0, totalSpentThisMonth = 0, allBillsPaid = true, unpaidBillsCount = 0, totalBillsCount = 0 } = ctx;

  // Use input target (user can override auto-filled value), fall back to app data
  const inputTgt  = parseFloat(document.getElementById('dc-target')?.value);
  const effectiveTgt = (!isNaN(inputTgt) && inputTgt > 0) ? inputTgt : totalBudgetTarget;
  const effectiveRem = effectiveTgt > 0 ? effectiveTgt - totalSpentThisMonth : null;

  // Optional available balance
  const availInput = parseFloat(document.getElementById('dc-avail')?.value);
  const availBal   = (!isNaN(availInput) && availInput >= 0) ? availInput : null;

  const reasons = [];
  let verdict, icon, cue;
  const isSmall = amt <= 15;

  // ── Primary: budget target logic ─────────────────────────
  if (effectiveTgt === 0) {
    verdict = 'Caution'; icon = '⚠️';
    reasons.push('No monthly target set');
    cue = 'Add targets to get better insights';
  } else if (isSmall && (effectiveRem === null || effectiveRem > 0)) {
    verdict = 'Safe'; icon = '✅';
    reasons.push('Small amount within budget');
    cue = 'Fine to proceed';
  } else if (effectiveRem !== null && amt <= effectiveRem * 0.5) {
    verdict = 'Safe'; icon = '✅';
    reasons.push(`Within monthly target (${fmt(effectiveRem)} remaining)`);
    cue = 'Fine if intentional';
  } else if (effectiveRem !== null && amt <= effectiveRem) {
    verdict = 'Caution'; icon = '⚠️';
    reasons.push(`Uses most of remaining target (${fmt(effectiveRem)} left)`);
    cue = 'Keep an eye on remaining spend this month';
  } else if (effectiveRem !== null) {
    verdict = 'Not Ideal'; icon = '🔴';
    reasons.push(`Exceeds target (${fmt(effectiveRem)} left of ${fmt(effectiveTgt)})`);
    cue = 'Consider reducing amount or waiting';
  } else {
    verdict = 'Safe'; icon = '✅';
    reasons.push('Within budget');
    cue = 'Fine if intentional';
  }

  // ── Adjust: available balance ─────────────────────────────
  if (availBal !== null) {
    if (amt > availBal) {
      verdict = 'Not Ideal'; icon = '🔴';
      reasons.push(`Exceeds available balance of ${fmt(availBal)}`);
      cue = 'You don\'t have enough available right now';
    } else if (amt > availBal * 0.5 && verdict === 'Safe') {
      verdict = 'Caution'; icon = '⚠️';
      reasons.push(`Uses over half your available balance (${fmt(availBal)})`);
      cue = 'Consider if you need that balance for other things';
    } else if (verdict === 'Safe') {
      reasons.push(`Available balance: ${fmt(availBal)}`);
    }
  }

  // ── Adjust: unpaid bills ──────────────────────────────────
  if (verdict !== 'Not Ideal' && totalBillsCount > 0 && !allBillsPaid) {
    if (verdict === 'Safe') { verdict = 'Caution'; icon = '⚠️'; }
    reasons.push(`${unpaidBillsCount} unpaid bill${unpaidBillsCount !== 1 ? 's' : ''} remaining`);
    if (cue === 'Fine if intentional') cue = 'Better to cover bills first';
  }

  const colours = { 'Safe':'var(--teal)', 'Caution':'var(--amber)', 'Not Ideal':'var(--danger)' };
  const bgs     = { 'Safe':'var(--teal-light)', 'Caution':'var(--amber-light)', 'Not Ideal':'var(--danger-light)' };
  box.style.background   = bgs[verdict]     || 'var(--accent-light)';
  box.style.borderColor  = colours[verdict] || 'var(--border)';
  box.innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <span style="font-size:18px">${icon}</span>
      <span style="font-size:15px;font-weight:700;color:${colours[verdict]||'var(--text)'}">${verdict}</span>
    </div>
    ${reasons.map(r => `<div style="font-size:13px;color:var(--text2);margin-bottom:2px">· ${r}</div>`).join('')}
    <div style="font-size:11px;color:var(--text3);margin-top:5px;font-style:italic">${cue}</div>`;
}

function coEntryTypeValue(entryType) {
  return entryType === 'Expense' ? 'Expense' : 'Income';
}

function coDisplayStatus(entryType, status) {
  const type = coEntryTypeValue(entryType);
  const raw = (status || '').toLowerCase();
  if (type === 'Expense') {
    if (raw === 'expected') return 'Expected';
    return 'Paid';
  }
  if (raw === 'expected') return 'Expected';
  return 'Received';
}

function coStoredStatus(entryType, status) {
  const type = coEntryTypeValue(entryType);
  const display = coDisplayStatus(type, status);
  if (type === 'Expense') return display === 'Expected' ? 'Expected' : 'Paid';
  return display === 'Expected' ? 'Expected' : 'Received';
}

function coStatusSelectHTML(entryType, currentStatus) {
  const type = coEntryTypeValue(entryType);
  const current = coDisplayStatus(type, currentStatus);
  const settledLabel = type === 'Expense' ? 'Paid' : 'Received';
  return `<label>Status</label><select id="f-status">
    <option value="${settledLabel}" ${current===settledLabel?'selected':''}>${settledLabel}</option>
    <option value="Expected" ${current==='Expected'?'selected':''}>Expected</option>
  </select>`;
}

async function renderCoIncome() {
  const accounts = await dbFetch(T.COMPANY_ACCOUNTS, {order:['date',false]});
  const receivedIncome = accounts.filter(r => coEntryTypeValue(r.entry_type) === 'Income' && coDisplayStatus(r.entry_type, r.status) === 'Received');
  const expectedIncome = accounts.filter(r => coEntryTypeValue(r.entry_type) === 'Income' && coDisplayStatus(r.entry_type, r.status) === 'Expected');
  const expenseRows = accounts.filter(r => coEntryTypeValue(r.entry_type) === 'Expense');

  root().innerHTML = `
<div class="page">
  <div class="topbar-centered">
    <button class="back-btn" onclick="navigate('finance')">‹ Back</button>

    <button class="tab active" onclick="coTab('received',this)">Received</button>

  </div>
  <div id="co-expenses" class="hidden">
    <div class="card">${coAccountRows(expenseRows, 'No company expenses yet')}</div>

function coTab(tab, btn) {
  ['received','expected','expenses','all'].forEach(t=>{
    document.getElementById('co-'+t)?.classList.toggle('hidden', t!==tab);
  });
  document.querySelectorAll('.tabs .tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');

function coAccountRows(rows, emptyMessage='No transactions') {
  if(!rows.length) return `<div class="row"><div class="muted">${emptyMessage}</div></div>`;
  return rows.map(r=>`
  <div class="row bill-row" data-s="${[r.description,r.category,r.status,r.entry_type].join(' ').toLowerCase()}">
    <div class="row-left">

}

function ctxAccount(e, id, entryType='Income', status='Expected') {
  const type = coEntryTypeValue(entryType);
  const displayStatus = coDisplayStatus(type, status);
  const settledLabel = type === 'Expense' ? 'Paid' : 'Received';
  const nextStatus = displayStatus === 'Expected' ? settledLabel : 'Expected';
  showCtx(e,[
    {label:'Edit',   fn:()=>showAccountModal(id)},
    {label:`Mark ${nextStatus}`, fn:async()=>{await dbUpdate(T.COMPANY_ACCOUNTS,id,{status:coStoredStatus(type, nextStatus)});renderCoIncome();}},
    {label:'Delete', danger:true, fn:async()=>{if(confirm('Delete?')){await dbDelete(T.COMPANY_ACCOUNTS,id);renderCoIncome();}}}
  ]);
}

function showModal(title, bodyHTML, onSave) {
  document.querySelector('.overlay')?.remove();
  const el = document.createElement('div');
  el.className = 'overlay';
  el.innerHTML = `<div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">${title}</div>
    ${bodyHTML}
    <button class="btn btn-primary mt16" id="modal-save-btn">Save</button>
  </div>`;
  document.body.appendChild(el);
  el.addEventListener('click', e=>{ if(e.target===el) el.remove(); });
  document.getElementById('modal-save-btn').addEventListener('click', async()=>{
    const page = root();
    const prevScrollTop = page ? page.scrollTop : 0;
    try{
      await onSave();
      el.remove();
      const restoreScroll = () => {
        const nextPage = root();
        if (nextPage) nextPage.scrollTop = prevScrollTop;
      };
      requestAnimationFrame(() => {
        restoreScroll();
        requestAnimationFrame(restoreScroll);
      });
    } catch(e){ alert(e.message||'Error saving'); }
  });
}

function showCtx(e, items) {
  document.querySelectorAll('.ctx').forEach(m=>m.remove());
  const menu = document.createElement('div');
  menu.className = 'ctx';
  menu.style.top  = Math.min(e.clientY, window.innerHeight-items.length*50)+'px';
  menu.style.left = Math.min(e.clientX, window.innerWidth-180)+'px';
  items.forEach(item=>{
    const btn = document.createElement('button');
    btn.textContent = item.label;
    if(item.danger) btn.className='danger';
    btn.onclick = ()=>{ menu.remove(); item.fn(); };
    menu.appendChild(btn);
  });
  document.body.appendChild(menu);
  setTimeout(()=>document.addEventListener('click', ()=>menu.remove(), {once:true}), 0);
}

function filterRows(q) {
  document.querySelectorAll('.bill-row').forEach(r=>{
    r.style.display = (r.dataset.s||'').includes(q.toLowerCase())?'':'none';
  });
}

function filterGroups(q) {
  document.querySelectorAll('.acct-group').forEach(g=>{

}

function v(id)   { const el=document.getElementById(id); return el?el.value.trim():''; }
function num(id) { const val=parseFloat(v(id)); return isNaN(val)?0:val; }
function today() { return new Date().toISOString().substring(0,10); }

// Build a <datalist> tag from an array of strings, deduped case-insensitively
function datalist(id, values) {
  const seen = new Set();
  const opts = values.filter(v => {
    if (!v) return false;
    const k = v.toLowerCase();
    if (seen.has(k)) return false;
    seen.add(k);
    return true;
  }).sort((a,b)=>a.localeCompare(b));
  return `<datalist id="${id}">${opts.map(s=>`<option value="${s.replace(/"/g,'&quot;')}">`).join('')}</datalist>`;
}
// Build a datalist-backed input field
function dlInput(fieldId, listId, currentVal, placeholder='') {
  return `<input id="${fieldId}" list="${listId}" value="${(currentVal||'').replace(/"/g,'&quot;')}" placeholder="${placeholder}" autocomplete="off"/>`;
}

// Derive a Date this month from a due_day integer
function dueDateThisMonth(dueDay) {
  if (!dueDay) return null;
  const n = new Date();
  return new Date(n.getFullYear(), n.getMonth(), parseInt(dueDay));
}

// Get next due date for a bill (monthly bills only)
function billNextDueDate(b) {
  const today = new Date(); today.setHours(0,0,0,0);
  const dayNum = parseInt(b.due_day_number || b.due_day);
  if (!dayNum) return null;
  const n = new Date();
  let d = new Date(n.getFullYear(), n.getMonth(), dayNum);
  if (d < today) d = new Date(n.getFullYear(), n.getMonth() + 1, dayNum);
  return d;
}

function fmtBillDue(b) {
  const d = billNextDueDate(b);
  if (!d) return '—';
  return d.toLocaleDateString('en-GB', {day:'2-digit', month:'long', year:'numeric'}).toUpperCase();
}

function fmtDueDay(dueDay) {
  if (!dueDay) return '—';
  const d = dueDateThisMonth(dueDay);
  return d.toLocaleDateString('en-GB', {day:'2-digit', month:'long', year:'numeric'}).toUpperCase();
}

// Check if a bill is due within the next 7 days (rolling window)
function billDueWithin7Days(b) {
  const amtDue  = parseFloat(b.monthly_amount) || 0;
  const amtPaid = parseFloat(b.paid_amount_this_month) || 0;
  if (amtPaid >= amtDue && amtDue > 0) return false; // fully paid
  const today = new Date(); today.setHours(0,0,0,0);
  const weekEnd = new Date(today); weekEnd.setDate(weekEnd.getDate() + 7); weekEnd.setHours(23,59,59,999);
  const dayNum = parseInt(b.due_day_number || b.due_day);
  if (!dayNum) return false;
  const n = new Date();
  const thisMonth = new Date(n.getFullYear(), n.getMonth(), dayNum);
  const nextMonth = new Date(n.getFullYear(), n.getMonth() + 1, dayNum);
  return (thisMonth >= today && thisMonth <= weekEnd) || (nextMonth >= today && nextMonth <= weekEnd);
}

// Derive display status — never written to DB
// Received → 'Received'
// Expected + future date → 'Expected'
// Expected + today or past → 'Overdue'
function incomeDisplayStatus(row) {
  const stored = (row.status || '').toLowerCase();
  if (stored === 'received') return 'Received';
  const dateStr = row.date_received || row.expected_date;
  if (!dateStr) return 'Expected';
  const d = new Date(dateStr);
  const tod = new Date(); tod.setHours(0,0,0,0);
  return d <= tod ? 'Overdue' : 'Expected';
}

  function inboxRow(item) {
    const s = (item.status||'new').toLowerCase();
    const stMap = {
      processed: {label:'Processed', cls:'status-processed'},
      actionable: {label:'Actionable', cls:'status-actionable'},
      new: {label:'New', cls:'status-new'},
    };
    const st = stMap[s] || stMap.new;
    return `<div class="row bill-row" data-s="${[item.content,item.area].join(' ').toLowerCase()}">
      <div class="row-left">
        ${item.area ? `<div class="row-sub" style="margin-bottom:3px">${item.area}</div>` : ''}
        <div class="row-title">${item.content||'—'}${item.is_reminder ? ' <span style="font-size:12px">🔔</span>' : ''}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0">
        <button class="menu-btn" onclick="ctxInboxItem(event,'${item.id}')">···</button>
        ${s !== 'processed' ? `<button onclick="showMakeActionModal('${item.id}')" style="font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text);background:var(--accent-light);border:none;border-radius:6px;padding:4px 8px;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;white-space:nowrap">→ Action</button>` : ''}
      </div>
    </div>`;
  }

  function section(title, sItems, emptyMsg) {
    return `<div class="ph" style="margin-top:20px;margin-bottom:8px">
      <h2 style="font-size:16px;font-weight:600;color:var(--text)">${title}</h2>
      <span class="muted">${sItems.length}</span>
    </div>
    <div class="card">
      ${sItems.length ? sItems.map(inboxRow).join('') : `<div class="row"><div class="muted">${emptyMsg}</div></div>`}
    </div>`;
  }

  const newItems        = items.filter(i => (i.status||'new').toLowerCase() === 'new');
  const actionableItems = items.filter(i => i.status?.toLowerCase() === 'actionable');
  const processedItems  = items.filter(i => i.status?.toLowerCase() === 'processed');

  root().innerHTML = `
<div class="page">
  <div class="topbar-centered">

  </div>
  <div class="search-wrap">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <input class="search-input" placeholder="Search…" oninput="filterRows(this.value)"/>
  </div>
  ${section('New', newItems, 'Nothing new — tap + to capture an idea, task or reminder')}
  ${actionableItems.length || true ? section('Actionable', actionableItems, 'Nothing actionable — mark items here when they need doing') : ''}
  ${section('Processed', processedItems, 'Nothing processed yet — mark items done when handled')}
</div>`;
}

async function showAddInboxModal() {
  const allItems = await dbFetch(T.INBOX, {});
  const areas = [...new Set(allItems.map(r=>r.area).filter(Boolean))].sort();
  showModal('Quick Capture', `
    ${datalist('dl-ib-area', areas)}
    <div class="fg"><label>Capture</label><input id="f-cap" placeholder="What's on your mind?" autocomplete="off"/></div>
    <div class="fg"><label>Area (optional)</label>${dlInput('f-area','dl-ib-area','','e.g. Work, Home, Health')}</div>
    <div class="fg" style="display:flex;align-items:center;gap:10px;padding:6px 0">
      <input type="checkbox" id="f-cap-reminder" style="width:16px;height:16px;cursor:pointer;flex-shrink:0"/>
      <label for="f-cap-reminder" style="font-size:14px;font-weight:500;color:var(--text);cursor:pointer;margin:0">🔔 Set as Reminder</label>
    </div>
  `, async () => {
    const cap = v('f-cap');
    if (!cap) return alert('Enter something to capture.');
    const { data: sessionData } = await getDB().auth.getSession();
    const session = sessionData?.session;
    if (!session?.user) return alert('Not signed in.');
    const uid = session.user.id;
    const isReminder = document.getElementById('f-cap-reminder')?.checked || false;
    const payload = {
      user_id:       uid,
      content:       cap,
      area:          v('f-area') || null,
      is_actionable: false,
      status:        'new',
      is_reminder:   isReminder,
      is_processed:  false,
    };
    const { error } = await getDB().from(T.INBOX).insert(payload);
    if (error) { showToast('Inbox error: ' + error.message, 'error'); return; }
    renderInbox();
  });
  setTimeout(()=>document.getElementById('f-cap')?.focus(), 100);
}

function ctxInboxItem(e, id) {
  // Check cache first; fall back gracefully if not loaded
  const allInbox = window._inboxCache || [];
  const cached = allInbox.find(i => String(i.id) === String(id));
  const isReminder = !!(cached && cached.is_reminder);

  showCtx(e, [
    {label:'Mark Actionable', fn: async()=>{await dbUpdate(T.INBOX,id,{is_actionable:true, status:'actionable'});renderInbox();}},
    {label:'Mark Processed',  fn: async()=>{await dbUpdate(T.INBOX,id,{is_actionable:false,status:'processed'});renderInbox();}},
    {label: isReminder ? '🔔 Remove Reminder' : '🔔 Set as Reminder',
     fn: async () => {
       if (isReminder) {
         await dbUpdate(T.INBOX, id, {is_reminder: false});
       } else {
         await dbUpdate(T.INBOX, id, {is_reminder: true, is_processed: false});
       }
       renderInbox();
     }},
    {label:'Make Action',     fn: ()=>showMakeActionModal(id)},
    {label:'Delete', danger:true, fn: async()=>{if(confirm('Delete?')){await dbDelete(T.INBOX,id);renderInbox();}}},
  ]);
}

      <option value="Now">Now</option>

      <option value="Someday">Someday</option>
    </select></div>
    <div class="fg"><label>Due Date (optional)</label><input id="f-ma-due" type="date"/></div>

    await dbInsert(T.ACTIONS, {
      title:        title,

// ACTIONS PAGE
// Columns: id, user_id, title, domain, area, project, timing,
//          hard_deadline, status, notes, inbox_id, created_at
// ════════════════════════════════════════════════════════════
async function renderActions(params={}) {
  const actions = await dbFetch(T.ACTIONS, {order:['created_at', false]});

  const domains  = [...new Set(actions.map(r=>r.domain).filter(Boolean))].sort();
  const areas    = [...new Set(actions.map(r=>r.area).filter(Boolean))].sort();
  const projects = [...new Set(actions.map(r=>r.project).filter(Boolean))].sort();
  const timings  = ['Now','This Week','Someday'];

  // groupBy: 'area' | 'domain' | 'project' | 'timing' | 'status' | 'none'
  const groupBy  = params.groupBy  || 'area';
  // filterBy: which field the second row filters on
  const filterBy = params.filterBy || window._actFilterBy || 'domain';
  window._actFilterBy = filterBy;
  // filter
  let fDomain  = params.fDomain  || '';
  let fArea    = params.fArea    || '';
  let fProject = params.fProject || '';
  let fTiming  = params.fTiming  || '';
  let fStatus  = params.fStatus  || '';

  window._actFilters = {groupBy, fDomain, fArea, fProject, fTiming, fStatus, filterBy};

  function filtered() {
    return actions.filter(a =>
      (!fDomain  || a.domain  === fDomain)  &&
      (!fArea    || a.area    === fArea)    &&
      (!fProject || a.project === fProject) &&
      (!fTiming  || a.timing  === fTiming)  &&
      (!fStatus  || a.status  === fStatus)
    );
  }

  // Derive urgency: 'overdue' | 'today' | 'upcoming' | 'done'
  function urgency(a) {
    if ((a.status||'').toLowerCase() === 'done') return 'done';
    if (!a.hard_deadline) return 'upcoming';
    const tod = new Date(); tod.setHours(0,0,0,0);
    const dl  = new Date(a.hard_deadline); dl.setHours(0,0,0,0);
    if (dl < tod)  return 'overdue';
    if (dl.getTime() === tod.getTime()) return 'today';
    return 'upcoming';
  }

  function statusBadge(a) {
    const u = urgency(a);
    if (u === 'overdue') {
      const stored = a.status || 'Not Started';
      return `<span class="status-badge status-overdue">Overdue</span><span class="status-badge status-${stored.toLowerCase().replace(/ /g,'-')}" style="margin-left:4px">${stored}</span>`;
    }
    const raw = a.status || 'Not Started';
    const cls = 'status-' + raw.toLowerCase().replace(/ /g,'-');
    return `<span class="status-badge ${cls}">${raw}</span>`;
  }

  function chip(label, active, onclick) {
    return `<button class="filter-chip${active?' active':''}" onclick="${onclick}">${label}</button>`;
  }

  function actionRow(a) {
    const u   = urgency(a);
    const sub = [a.domain, a.area, a.project].filter(Boolean).join(' · ');
    const due = a.hard_deadline ? fmtDate(a.hard_deadline) : (a.timing || '');
    const rowStyle = u === 'overdue' ? 'border-left:3px solid var(--danger);background:var(--danger-light)' : '';
    return `<div class="row bill-row" data-s="${[a.title,a.domain,a.area,a.project,a.timing].join(' ').toLowerCase()}" style="${rowStyle}">
      <div class="row-left">
        ${statusBadge(a)}
        <div class="row-title" style="margin-top:4px">${a.title||'—'}</div>
        ${sub ? `<div class="row-sub">${sub}</div>` : ''}
        ${due ? `<div class="row-sub" style="${u==='overdue'?'color:var(--danger);font-weight:600':''}">Due: ${due}</div>` : ''}
        ${a.notes ? `<div class="row-sub">${a.notes}</div>` : ''}
      </div>
      <button class="menu-btn" onclick="ctxAction(event,'${a.id}')">···</button>
    </div>`;
  }

  function sectionHead(title, count, color) {
    return `<div class="ph" style="margin-top:20px;margin-bottom:8px">
      <h2 style="font-size:16px;font-weight:600;color:${color||'var(--text)'}">${title}</h2>
      <span class="muted">${count}</span>
    </div>`;
  }

  function renderGrouped(rows) {
    if (!rows.length) return '<div class="card"><div class="row"><div class="muted">No actions yet — convert Inbox items into actions to track your work</div></div></div>';

    const overdueRows  = rows.filter(a => urgency(a) === 'overdue');
    const todayRows    = rows.filter(a => urgency(a) === 'today');
    const active       = rows.filter(a => !['overdue','today','done'].includes(urgency(a)));
    const done         = rows.filter(a => urgency(a) === 'done');

    // When grouping by deadline-aware sections (none or deadline grouping)
    if (groupBy === 'none') {
      return `
        ${overdueRows.length ? sectionHead('Overdue', overdueRows.length, 'var(--danger)') + `<div class="card">${overdueRows.map(actionRow).join('')}</div>` : ''}
        ${todayRows.length   ? sectionHead('Today', todayRows.length, 'var(--amber)')    + `<div class="card">${todayRows.map(actionRow).join('')}</div>`   : ''}
        ${active.length      ? sectionHead('Upcoming', active.length)                   + `<div class="card">${active.map(actionRow).join('')}</div>`        :
          (!overdueRows.length && !todayRows.length) ? '<div class="card"><div class="row"><div class="muted">No active actions — convert Inbox items to start tracking</div></div></div>' : ''}
        ${done.length        ? sectionHead('Done', done.length, 'var(--text3)')          + `<div class="card">${done.map(actionRow).join('')}</div>`          : ''}
      `;
    }

    // For other group modes: always pin overdue + today at top, then groups, then done
    const keyFn = {
      area:    a => a.area    || '(No Area)',
      domain:  a => a.domain  || '(No Domain)',
      project: a => a.project || '(No Project)',
      timing:  a => a.timing  || '(No Timing)',
      status:  a => a.status  || 'Not Started',
    }[groupBy] || (a => a.area || '(No Area)');

    const groups = {};
    active.forEach(a => {
      const k = keyFn(a);
      if (!groups[k]) groups[k] = [];
      groups[k].push(a);
    });
    // Also bucket today rows into groups
    todayRows.forEach(a => {
      const k = keyFn(a);
      if (!groups[k]) groups[k] = [];
      groups[k].push(a);
    });

    const sortedKeys = Object.keys(groups).sort((a,b) => {
      if (a.startsWith('(') && !b.startsWith('(')) return 1;
      if (b.startsWith('(') && !a.startsWith('(')) return -1;
      return a.localeCompare(b);
    });

    const overdueHTML = overdueRows.length
      ? sectionHead('Overdue', overdueRows.length, 'var(--danger)') + `<div class="card">${overdueRows.map(actionRow).join('')}</div>`
      : '';

    const groupedHTML = sortedKeys.map(k =>
      sectionHead(k, groups[k].length) + `<div class="card">${groups[k].map(actionRow).join('')}</div>`
    ).join('');

    const doneHTML = done.length
      ? sectionHead('Done', done.length, 'var(--text3)') + `<div class="card">${done.map(actionRow).join('')}</div>`
      : '';

    return overdueHTML + (groupedHTML || '<div class="card"><div class="row"><div class="muted">No active actions — convert Inbox items to start tracking work</div></div></div>') + doneHTML;
  }

  // Values for the second-row chips based on selected filterBy field
  const filterValueMap = {
    domain:  domains,
    area:    areas,
    project: projects,
    timing:  timings,
    status:  ['Not Started','In Progress','Waiting','Done'],
  };
  const filterValues = filterValueMap[filterBy] || [];

  // Current active value for the selected filter field
  const activeFilterVal = {
    domain:  fDomain,
    area:    fArea,
    project: fProject,
    timing:  fTiming,
    status:  fStatus,
  }[filterBy] || '';

  const rows = filtered();
  const activeFilters = [fDomain,fArea,fProject,fTiming,fStatus].filter(Boolean);

  root().innerHTML = `
<div class="page">
  <div class="topbar-centered">
    <div class="topbar-centered-title">Actions</div>
    <button class="icon-btn topbar-centered-right" onclick="showAddActionModal()">+</button>
  </div>

  <!-- Row 1: choose which field to filter/group by -->
  <div class="filter-bar" style="margin-bottom:6px">
    ${chip('Domain',  filterBy==='domain',  "setActFilterBy('domain')")}
    ${chip('Area',    filterBy==='area',    "setActFilterBy('area')")}
    ${chip('Project', filterBy==='project', "setActFilterBy('project')")}
    ${chip('Timing',  filterBy==='timing',  "setActFilterBy('timing')")}
    ${chip('Status',  filterBy==='status',  "setActFilterBy('status')")}
  </div>

  <!-- Row 2: values for the selected field -->
  <div class="filter-bar" style="margin-bottom:14px">
    ${chip('All', !activeFilterVal, `setActFilter('${filterBy}','')`)}
    ${filterValues.map(val => {
      const safe = val.replace(/'/g,"\\'");
      return chip(val, activeFilterVal===val, `setActFilter('${filterBy}','${safe}')`);
    }).join('')}
  </div>

  <div class="search-wrap">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <input class="search-input" placeholder="Search…" oninput="filterRows(this.value)"/>
  </div>

  ${activeFilters.length ? `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">
    ${fDomain  ? `<span class="filter-chip active" onclick="setActFilter('domain','')"  style="font-size:11px">Domain: ${fDomain} ×</span>`  : ''}
    ${fArea    ? `<span class="filter-chip active" onclick="setActFilter('area','')"    style="font-size:11px">Area: ${fArea} ×</span>`    : ''}
    ${fProject ? `<span class="filter-chip active" onclick="setActFilter('project','')" style="font-size:11px">Project: ${fProject} ×</span>` : ''}
    ${fTiming  ? `<span class="filter-chip active" onclick="setActFilter('timing','')"  style="font-size:11px">Timing: ${fTiming} ×</span>`  : ''}
    ${fStatus  ? `<span class="filter-chip active" onclick="setActFilter('status','')"  style="font-size:11px">Status: ${fStatus} ×</span>`  : ''}
  </div>` : ''}

  <!-- Group by row -->
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap">
    <span style="font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);flex-shrink:0">Group</span>
    <div class="filter-bar" style="margin-bottom:0;flex:1">
      ${chip('Area',    groupBy==='area',    "setActGroup('area')")}
      ${chip('Domain',  groupBy==='domain',  "setActGroup('domain')")}
      ${chip('Project', groupBy==='project', "setActGroup('project')")}
      ${chip('Timing',  groupBy==='timing',  "setActGroup('timing')")}
      ${chip('Status',  groupBy==='status',  "setActGroup('status')")}
      ${chip('None',    groupBy==='none',    "setActGroup('none')")}
    </div>
  </div>

  ${renderGrouped(rows)}
</div>`;
}

function setActGroup(groupBy) {
  const f = window._actFilters || {};
  renderActions({...f, groupBy, filterBy: window._actFilterBy || 'domain'});
}

// Called when user clicks a field-type chip in row 1 — clears the filter for that field and updates row 2
function setActFilterBy(filterBy) {
  window._actFilterBy = filterBy;
  const f = window._actFilters || {};
  renderActions({...f, filterBy});
}

function setActFilter(key, val) {
  const f = window._actFilters || {};
  renderActions({
    groupBy:   f.groupBy  || 'area',
    filterBy:  window._actFilterBy || 'domain',
    fDomain:   key==='domain'  ? val : (f.fDomain  ||''),
    fArea:     key==='area'    ? val : (f.fArea    ||''),
    fProject:  key==='project' ? val : (f.fProject ||''),
    fTiming:   key==='timing'  ? val : (f.fTiming  ||''),
    fStatus:   key==='status'  ? val : (f.fStatus  ||''),
  });
}

function ctxAction(e, id) {
  showCtx(e, [
    {label:'Mark Done',        fn: async()=>{await dbUpdate(T.ACTIONS,id,{status:'Done'});renderActions(window._actFilters);}},

    {label:'Delete', danger:true, fn: async()=>{if(confirm('Delete?')){await dbDelete(T.ACTIONS,id);renderActions(window._actFilters);}}},
  ]);
}

const WARD_STATUSES  = ['Available','In Laundry','Packed','Archived'];
const WARD_STYLE_TYPES = ['Core','Statement','Support'];
const VIBE_MODES     = ['Core / Everyday','Freelance / Authority','Artist / Visible'];

// ── Global vibe mode (persists across pages) ──
window._vibeMode = window._vibeMode || '';

function setVibeMode(v) {
  window._vibeMode = (window._vibeMode === v) ? '' : v; // toggle off if same
}

function wardStatusClass(s) {
  if (!s) return '';
  const map = {'Available':'wstatus-available','In Laundry':'wstatus-in-laundry','Packed':'wstatus-packed','Archived':'wstatus-archived'};
  return map[s] || ('status-' + s.toLowerCase().replace(/ /g,'-'));
}

// ── Tags helpers ──
function parseTags(str) {
  if (!str) return [];
  return str.split(',').map(t=>t.trim()).filter(Boolean);
}
function tagsHtml(tags, onclickFn) {
  if (!tags || !tags.length) return '';
  return `<div class="tag-bar">${tags.map(t=>`<button class="tag-pill" onclick="${onclickFn}(event,'${t.replace(/'/g,"\\'")}')">${t.replace(/</g,'&lt;')}</button>`).join('')}</div>`;
}

// ── Vibe mode bar HTML ──
function vibeModeBarHtml(onchange) {
  return `<div class="vibe-mode-bar">
    ${VIBE_MODES.map(v=>`<button class="vibe-mode-btn${window._vibeMode===v?' active':''}" onclick="setVibeMode('${v.replace(/'/g,"\\'")}');${onchange}">${v.replace(/</g,'&lt;')}</button>`).join('')}
  </div>`;
}

// ── 4-tab header shared across all wardrobe pages ──
function wardTabBar(active) {
  const tabs = [{id:'home',label:'Home'},{id:'wardrobe',label:'Items'},{id:'outfits',label:'Outfits'},{id:'packing',label:'Packing'}];
  return `<div class="tabs" style="overflow-x:auto;flex-wrap:nowrap;scrollbar-width:none">
    ${tabs.map(t=>`<button class="tab${active===t.id?' active':''}" style="white-space:nowrap" onclick="renderWardrobe({tab:'${t.id}'})">${t.label}</button>`).join('')}
  </div>`;
}

async function renderWardrobe(params={}) {
  const tab = params.tab || 'home';
  if (tab === 'home')    return renderWardrobeHome();
  if (tab === 'outfits') return renderOutfits();
  if (tab === 'packing') return renderPacking();
  return renderWardrobeItems(params);
}

// ── Wardrobe Home dashboard ──
async function renderWardrobeHome() {
  root().innerHTML = '<div class="spinner"></div>';
  // Reset suggestion skip counters on fresh load
  window._wsiwSkipOutfit = 0;
  window._wsiwSkipSlot   = 0;
  const [items, outfits] = await Promise.all([
    dbFetch(T.INVENTORY, {
      select: 'item_id,category,colour,item_name,status,vibe,image,style_type,tags,user_id',
      order: ['item_name', true]
    }),
    dbFetch(T.OUTFITS, {order:['created_at',false]}),
  ]);

  const total     = items.length;
  const available = items.filter(i => i.status === 'Available').length;
  const laundry   = items.filter(i => i.status === 'In Laundry').length;
  const packed    = items.filter(i => i.status === 'Packed').length;
  const cats      = [...new Set(items.map(r=>r.category).filter(Boolean))].sort();
  const vibeMode  = window._vibeMode || '';

  function shortcut(label, key, val) {
    const safe = val.replace(/'/g,"\\'");
    return `<button class="filter-chip" onclick="renderWardrobeItems({${key}:'${safe}'})">${label.replace(/</g,'&lt;')}</button>`;
  }

  // ── "What should I wear" suggestion engine ──────────────
  // skipOutfit: index into validCandidates to skip (for refresh cycling)
  // skipSlotSeed: seed offset for fallback slot picks
  function buildSuggestionHtml(skipOutfit, skipSlotSeed) {
    skipOutfit   = skipOutfit   || 0;
    skipSlotSeed = skipSlotSeed || 0;
    const usable = items.filter(i => i.status === 'Available' || i.status === 'Packed');

    // shared refresh SVG button
    const refreshBtn = `<button id="wsiwRefreshBtn" onclick="event.stopPropagation();refreshWardrobeSuggestion()" title="New suggestion" style="background:none;border:none;cursor:pointer;padding:2px 4px;color:var(--text3);display:inline-flex;align-items:center;border-radius:4px;transition:opacity .15s;line-height:1" onmouseover="this.style.opacity='.6'" onmouseout="this.style.opacity='1'"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg></button>`;

    // 1. Try to find a saved outfit (prefer vibe-matching, prefer mostly-available items)
    let candidates = [...outfits];
    if (vibeMode) {
      const vm = vibeMode.toLowerCase();
      candidates.sort((a, b) => {
        const aHit = ((a.tags||'') + ' ' + (a.occasion||'')).toLowerCase().includes(vm) ? 0 : 1;
        const bHit = ((b.tags||'') + ' ' + (b.occasion||'')).toLowerCase().includes(vm) ? 0 : 1;
        return aHit - bHit;
      });
    }
    // Collect ALL valid candidates so we can cycle through them
    const validCandidates = [];
    for (const o of candidates) {
      let ids = [];
      try { ids = Array.isArray(o.item_ids) ? o.item_ids : JSON.parse(o.item_ids||'[]'); } catch(e){}
      if (!ids.length) continue;
      const oItems  = ids.map(id => items.find(i=>i.item_id===id||i.id===id)).filter(Boolean);
      const usableN = oItems.filter(i => i.status==='Available'||i.status==='Packed').length;
      if (oItems.length > 0 && usableN / oItems.length >= 0.5) {
        validCandidates.push({ outfit: o, oItems });
      }
    }

    if (validCandidates.length) {
      const idx = skipOutfit % validCandidates.length;
      const { outfit, oItems } = validCandidates[idx];
      const safeOutfitId = String(outfit.id).replace(/"/g,'&quot;');
      const thumbs = oItems.slice(0,5).map(i => {
        const safeItemId = (i.item_id||'').toString().replace(/'/g,"\\'");
        return i.image
          ? `<img src="${i.image.replace(/"/g,'&quot;')}" alt="" loading="lazy" onclick="event.stopPropagation();showEditItemModal('${safeItemId}')" style="width:50px;height:64px;object-fit:cover;border-radius:8px;flex-shrink:0;cursor:pointer" onerror="this.style.display='none'" title="${(i.item_name||'').replace(/"/g,'&quot;')}">`
          : `<div onclick="event.stopPropagation();showEditItemModal('${safeItemId}')" style="width:50px;height:64px;border-radius:8px;background:var(--accent-light);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;cursor:pointer">👗</div>`;
      }).join('');
      const hint = vibeMode
        ? `<div style="font-size:11px;color:var(--accent);font-weight:500;margin-bottom:6px;letter-spacing:.02em">✦ Based on current vibe · ${oItems.length} piece${oItems.length!==1?'s':''}</div>`
        : `<div style="font-size:11px;color:var(--text3);margin-bottom:6px">Saved outfit · ${oItems.length} piece${oItems.length!==1?'s':''}${validCandidates.length>1?' · '+validCandidates.length+' options':''}</div>`;
      return `
  <div class="sec-label" style="display:flex;align-items:center;justify-content:center;gap:6px">What Should I Wear? ${refreshBtn}</div>
  <div class="card" style="padding:16px;cursor:pointer" onclick="showEditOutfitModal('${safeOutfitId}')">
    ${hint}
    <div style="font-size:15px;font-weight:500;color:var(--text);margin-bottom:10px">${(outfit.name||'Untitled').replace(/</g,'&lt;')}</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:flex-end">${thumbs}${oItems.length>5?`<div style="font-size:11px;color:var(--text3);padding:0 4px;align-self:center">+${oItems.length-5}</div>`:''}</div>
    <div style="margin-top:10px;font-size:12px;color:var(--accent);font-weight:500">Edit outfit →</div>
  </div>`;
    }

    // 2. Fallback: pick individual items per slot (use skipSlotSeed to vary picks)
    const pool = vibeMode
      ? usable.filter(i => (i.vibe||'').toLowerCase().includes(vibeMode.toLowerCase()))
      : usable;
    const slotKeys = {
      top:    ['top','shirt','blouse','tee','knitwear','jumper','crop'],
      bottom: ['trousers','jeans','shorts','skirt','mini','midi','maxi'],
      dress:  ['dress','jumpsuit','co-ord'],
      outer:  ['jacket','coat','blazer','cardigan','hoodie','outerwear'],
      shoes:  ['shoes','boots','trainers','heels','sandals','sneakers','flats','mules'],
      hair:   ['accessories','hair','bag','jewellery','hat'],
    };
    function matchSlot(item, keys) {
      const c = (item.category||'').toLowerCase();
      return keys.some(k => c.includes(k));
    }
    const pick = {};
    for (const [slot, keys] of Object.entries(slotKeys)) {
      if (slot==='bottom' && pick.dress) continue;
      if (slot==='top'    && pick.dress) continue;
      if (slot==='dress'  && (pick.top||pick.bottom)) continue;
      const matches = pool.filter(i => matchSlot(i, keys));
      if (!matches.length) continue;
      // Sort by style priority then use seed offset to cycle through options
      const sorted = [...matches].sort((a,b) => {
        const r = s => s==='Statement'?0:s==='Core'?1:2;
        return r(a.style_type) - r(b.style_type);
      });
      pick[slot] = sorted[skipSlotSeed % sorted.length];
    }
    const picks = Object.values(pick).filter(Boolean);
    if (!picks.length) return '';

    const thumbs = picks.map(i => {
      const name = (i.item_name||i.category||'').replace(/</g,'&lt;');
      const safeItemId = (i.item_id||'').toString().replace(/'/g,"\\'");
      return `<div onclick="showEditItemModal('${safeItemId}')" style="display:flex;flex-direction:column;align-items:center;gap:4px;min-width:56px;max-width:68px;cursor:pointer">
        ${i.image
          ? `<img src="${i.image.replace(/"/g,'&quot;')}" alt="" loading="lazy" style="width:56px;height:72px;object-fit:cover;border-radius:8px;transition:transform .12s" onmouseover="this.style.transform='scale(1.04)'" onmouseout="this.style.transform=''" onerror="this.style.display='none'">`
          : `<div style="width:56px;height:72px;border-radius:8px;background:var(--accent-light);display:flex;align-items:center;justify-content:center;font-size:18px">👗</div>`}
        <div style="font-size:10px;color:var(--text3);text-align:center;line-height:1.2;width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${name}</div>
      </div>`;
    }).join('');

    const fallbackNote = vibeMode
      ? `<div style="font-size:11px;color:var(--accent);font-weight:500;margin-bottom:10px;letter-spacing:.02em">✦ Item suggestions based on current vibe</div>`
      : `<div style="font-size:11px;color:var(--text3);margin-bottom:10px">No saved outfit matched — item suggestions</div>`;

    return `
  <div class="sec-label" style="display:flex;align-items:center;justify-content:center;gap:6px">What Should I Wear? ${refreshBtn}</div>
  <div class="card" style="padding:16px">
    ${fallbackNote}
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end">${thumbs}</div>
    <div style="margin-top:12px;font-size:12px;color:var(--text3)">
      Tap any item to edit · <button onclick="renderWardrobeItems({})" style="background:none;border:none;color:var(--accent);font-size:12px;cursor:pointer;font-family:inherit;font-weight:500;padding:0">browse wardrobe →</button>
    </div>
  </div>`;
  }

  // Expose data needed for in-place refresh (no full page reload)
  window._wsiwData = { items, outfits, vibeMode };

  const suggestionHtml = buildSuggestionHtml(window._wsiwSkipOutfit||0, window._wsiwSkipSlot||0);
  // ────────────────────────────────────────────────────────

  root().innerHTML = `
<div class="page">
  <div class="topbar-centered">
    <div class="topbar-centered-title">Wardrobe</div>
    <button class="icon-btn topbar-centered-right" onclick="showAddItemModal()">+</button>
  </div>
  ${wardTabBar('home')}

  <div class="sec-label" style="margin-top:4px">Styling Mode</div>
  ${vibeModeBarHtml("renderWardrobeHome()")}

  ${suggestionHtml ? `<div id="ward-suggestion-wrap">${suggestionHtml}</div>` : ''}

  <div class="sec-label">Quick Actions</div>
  <div class="wd-actions" style="margin-bottom:20px">
    <button class="wd-action-btn primary" onclick="showAddItemModal()"><span class="wd-btn-icon">➕</span>Add Item</button>
    <button class="wd-action-btn" onclick="showAddOutfitModal()"><span class="wd-btn-icon">👗</span>Build Outfit</button>
    <button class="wd-action-btn" onclick="showAddPackModal()"><span class="wd-btn-icon">🧳</span>Pack a Trip</button>
    <button class="wd-action-btn" onclick="renderWardrobeItems({})"><span class="wd-btn-icon">🗂️</span>Enter Wardrobe</button>
  </div>

  <div class="sec-label">Overview</div>
  <div class="wd-snap-grid">
    <div class="wd-snap"><span class="wd-snap-val">${total}</span><span class="wd-snap-lbl">Total Items</span></div>
    <div class="wd-snap"><span class="wd-snap-val" style="color:#1A8A5A">${available}</span><span class="wd-snap-lbl">Available</span></div>
    <div class="wd-snap"><span class="wd-snap-val" style="color:#C47B1A">${laundry}</span><span class="wd-snap-lbl">In Laundry</span></div>
    <div class="wd-snap"><span class="wd-snap-val" style="color:var(--accent)">${packed}</span><span class="wd-snap-lbl">Packed</span></div>
  </div>

  <div class="sec-label">Browse by Status</div>
  <div class="filter-bar" style="margin-bottom:16px">
    ${WARD_STATUSES.map(s => shortcut(s,'fStatus',s)).join('')}
  </div>

  ${cats.length ? `<div class="sec-label">Browse by Category</div>
  <div class="filter-bar" style="margin-bottom:4px">
    ${cats.map(c => shortcut(c,'fCat',c)).join('')}
  </div>` : ''}
</div>`;
}

// ── Refresh "What should I wear" in-place (no full page reload) ──
function refreshWardrobeSuggestion() {
  const btn = document.getElementById('wsiwRefreshBtn');
  if (btn) {
    btn.style.opacity = '0.3';
    btn.style.transform = 'rotate(180deg)';
    btn.style.transition = 'transform .35s ease, opacity .15s';
  }

  // Advance skip counters
  window._wsiwSkipOutfit = ((window._wsiwSkipOutfit||0) + 1);
  window._wsiwSkipSlot   = ((window._wsiwSkipSlot||0)   + 1);

  const d = window._wsiwData;
  if (!d) { renderWardrobeHome(); return; }

  const { items, outfits } = d;
  const vibeMode = window._vibeMode || '';

  // ── replicate buildSuggestionHtml inline so we can call it without a full re-render ──
  const skipOutfit   = window._wsiwSkipOutfit;
  const skipSlotSeed = window._wsiwSkipSlot;
  const usable = items.filter(i => i.status === 'Available' || i.status === 'Packed');

  const refreshBtnHtml = `<button id="wsiwRefreshBtn" onclick="event.stopPropagation();refreshWardrobeSuggestion()" title="New suggestion" style="background:none;border:none;cursor:pointer;padding:2px 4px;color:var(--text3);display:inline-flex;align-items:center;border-radius:4px;transition:opacity .15s;line-height:1" onmouseover="this.style.opacity='.6'" onmouseout="this.style.opacity='1'"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg></button>`;

  let candidates = [...outfits];
  if (vibeMode) {
    const vm = vibeMode.toLowerCase();
    candidates.sort((a,b) => {
      const aHit = ((a.tags||'')+' '+(a.occasion||'')).toLowerCase().includes(vm)?0:1;
      const bHit = ((b.tags||'')+' '+(b.occasion||'')).toLowerCase().includes(vm)?0:1;
      return aHit-bHit;
    });
  }
  const validCandidates = [];
  for (const o of candidates) {
    let ids=[]; try{ids=Array.isArray(o.item_ids)?o.item_ids:JSON.parse(o.item_ids||'[]');}catch(e){}
    if(!ids.length) continue;
    const oItems=ids.map(id=>items.find(i=>i.item_id===id||i.id===id)).filter(Boolean);
    const usableN=oItems.filter(i=>i.status==='Available'||i.status==='Packed').length;
    if(oItems.length>0 && usableN/oItems.length>=0.5) validCandidates.push({outfit:o,oItems});
  }

  let newHtml = '';

  if (validCandidates.length) {
    const idx = skipOutfit % validCandidates.length;
    const {outfit,oItems} = validCandidates[idx];
    const safeOutfitId = String(outfit.id).replace(/"/g,'&quot;');
    const thumbs = oItems.slice(0,5).map(i=>{
      const safeItemId=(i.item_id||'').toString().replace(/'/g,"\\'");
      return i.image
        ? `<img src="${i.image.replace(/"/g,'&quot;')}" alt="" loading="lazy" onclick="event.stopPropagation();showEditItemModal('${safeItemId}')" style="width:50px;height:64px;object-fit:cover;border-radius:8px;flex-shrink:0;cursor:pointer" onerror="this.style.display='none'" title="${(i.item_name||'').replace(/"/g,'&quot;')}">`
        : `<div onclick="event.stopPropagation();showEditItemModal('${safeItemId}')" style="width:50px;height:64px;border-radius:8px;background:var(--accent-light);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;cursor:pointer">👗</div>`;
    }).join('');
    const hint = vibeMode
      ? `<div style="font-size:11px;color:var(--accent);font-weight:500;margin-bottom:6px;letter-spacing:.02em">✦ Based on current vibe · ${oItems.length} piece${oItems.length!==1?'s':''}</div>`
      : `<div style="font-size:11px;color:var(--text3);margin-bottom:6px">Saved outfit · ${oItems.length} piece${oItems.length!==1?'s':''}${validCandidates.length>1?' · '+validCandidates.length+' options':''}</div>`;
    newHtml = `
  <div class="sec-label" style="display:flex;align-items:center;justify-content:center;gap:6px">What Should I Wear? ${refreshBtnHtml}</div>
  <div class="card" style="padding:16px;cursor:pointer" onclick="showEditOutfitModal('${safeOutfitId}')">
    ${hint}
    <div style="font-size:15px;font-weight:500;color:var(--text);margin-bottom:10px">${(outfit.name||'Untitled').replace(/</g,'&lt;')}</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:flex-end">${thumbs}${oItems.length>5?`<div style="font-size:11px;color:var(--text3);padding:0 4px;align-self:center">+${oItems.length-5}</div>`:''}</div>
    <div style="margin-top:10px;font-size:12px;color:var(--accent);font-weight:500">Edit outfit →</div>
  </div>`;
  } else {
    const pool = vibeMode ? usable.filter(i=>(i.vibe||'').toLowerCase().includes(vibeMode.toLowerCase())) : usable;
    const slotKeys = {
      top:    ['top','shirt','blouse','tee','knitwear','jumper','crop'],
      bottom: ['trousers','jeans','shorts','skirt','mini','midi','maxi'],
      dress:  ['dress','jumpsuit','co-ord'],
      outer:  ['jacket','coat','blazer','cardigan','hoodie','outerwear'],
      shoes:  ['shoes','boots','trainers','heels','sandals','sneakers','flats','mules'],
      hair:   ['accessories','hair','bag','jewellery','hat'],
    };
    const pick = {};
    for (const [slot,keys] of Object.entries(slotKeys)) {
      if (slot==='bottom'&&pick.dress) continue;
      if (slot==='top'&&pick.dress) continue;
      if (slot==='dress'&&(pick.top||pick.bottom)) continue;
      const matches = pool.filter(i=>keys.some(k=>(i.category||'').toLowerCase().includes(k)));
      if (!matches.length) continue;
      const sorted = [...matches].sort((a,b)=>{const r=s=>s==='Statement'?0:s==='Core'?1:2;return r(a.style_type)-r(b.style_type);});
      pick[slot] = sorted[skipSlotSeed % sorted.length];
    }
    const picks = Object.values(pick).filter(Boolean);
    if (!picks.length) return;
    const thumbs = picks.map(i=>{
      const name=(i.item_name||i.category||'').replace(/</g,'&lt;');
      const safeItemId=(i.item_id||'').toString().replace(/'/g,"\\'");
      return `<div onclick="showEditItemModal('${safeItemId}')" style="display:flex;flex-direction:column;align-items:center;gap:4px;min-width:56px;max-width:68px;cursor:pointer">
        ${i.image?`<img src="${i.image.replace(/"/g,'&quot;')}" alt="" loading="lazy" style="width:56px;height:72px;object-fit:cover;border-radius:8px" onerror="this.style.display='none'">`:
        `<div style="width:56px;height:72px;border-radius:8px;background:var(--accent-light);display:flex;align-items:center;justify-content:center;font-size:18px">👗</div>`}
        <div style="font-size:10px;color:var(--text3);text-align:center;line-height:1.2;width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${name}</div>
      </div>`;
    }).join('');
    const fallbackNote = vibeMode
      ? `<div style="font-size:11px;color:var(--accent);font-weight:500;margin-bottom:10px;letter-spacing:.02em">✦ Item suggestions based on current vibe</div>`
      : `<div style="font-size:11px;color:var(--text3);margin-bottom:10px">No saved outfit matched — item suggestions</div>`;
    newHtml = `
  <div class="sec-label" style="display:flex;align-items:center;justify-content:center;gap:6px">What Should I Wear? ${refreshBtnHtml}</div>
  <div class="card" style="padding:16px">
    ${fallbackNote}
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end">${thumbs}</div>
    <div style="margin-top:12px;font-size:12px;color:var(--text3)">
      Tap any item to edit · <button onclick="renderWardrobeItems({})" style="background:none;border:none;color:var(--accent);font-size:12px;cursor:pointer;font-family:inherit;font-weight:500;padding:0">browse wardrobe →</button>
    </div>
  </div>`;
  }

  // Swap the suggestion block in the DOM without touching the rest of the page
  const container = document.querySelector('#ward-suggestion-wrap');
  if (container) {
    container.innerHTML = newHtml;
  }
}

// ── Wardrobe Items page ──
async function renderWardrobeItems(params={}) {
  root().innerHTML = '<div class="spinner"></div>';
  const items = await dbFetch(T.INVENTORY, {
    select: 'item_id,category,colour,item_name,status,image,set_name,vibe,shoot_level,travel_friendly,season,silhouette,notes,style_type,tags,user_id',
    order: ['item_name', true]
  });

  const cats    = [...new Set(items.map(r=>r.category).filter(Boolean))].sort();
  const colours = [...new Set(items.map(r=>r.colour).filter(Boolean))].sort();

  const fCat    = params.fCat    || '';
  const fColour = params.fColour || '';
  const fStatus = params.fStatus || '';
  const fTag    = params.fTag    || '';
  // vibe mode from global
  const fVibe   = window._vibeMode || '';
  window._wardFilters = {fCat, fColour, fStatus, fTag};
  window._wardItems   = items;

  const filtered = items.filter(i => {
    if (fCat    && i.category !== fCat) return false;
    if (fColour && i.colour   !== fColour) return false;
    if (fStatus && i.status   !== fStatus) return false;
    if (fTag    && !parseTags(i.tags).some(t=>t.toLowerCase().includes(fTag.toLowerCase()))) return false;
    if (fVibe   && !(i.vibe||'').toLowerCase().includes(fVibe.toLowerCase())) return false;
    return true;
  });

  function wchip(label, active, fn) {
    return `<button class="filter-chip${active?' active':''}" onclick="${fn}">${label.replace(/</g,'&lt;')}</button>`;
  }

  function itemCard(item) {
    const safeId   = (item.item_id||'').toString().replace(/'/g,"\\'");
    const safeName = (item.item_name||item.item_id||'—').toString().replace(/</g,'&lt;');
    const safeCat  = (item.category||'').toString().replace(/</g,'&lt;');
    const safeCol  = (item.colour||'').toString().replace(/</g,'&lt;');
    const stCls    = wardStatusClass(item.status);
    const isLaundry = item.status === 'In Laundry';
    const imgBlock = item.image
      ? `<div style="position:relative;width:100%;aspect-ratio:3/4;background:var(--bg)">
           <div class="item-img-placeholder" id="ph-${safeId}" style="position:absolute;inset:0;display:flex">👗</div>
           <img class="item-img" src="${item.image.replace(/"/g,'&quot;')}" alt="${safeName}" loading="lazy"
             style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover${isLaundry?';filter:grayscale(60%) opacity(0.6)':''}"
             onload="var ph=document.getElementById('ph-${safeId}');if(ph)ph.style.display='none'"
             onerror="this.style.display='none'">
         </div>`
      : `<div class="item-img-placeholder"${isLaundry?' style="opacity:.5"':''}>👗</div>`;
    const itemTags = parseTags(item.tags);
    return `<div class="item-card"${isLaundry?' style="opacity:.75"':''}>
      <div onclick="showEditItemModal('${safeId}')">
        ${imgBlock}
      </div>
      <div class="item-info">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:4px">
          <div style="flex:1;min-width:0">
            ${item.status ? `<span class="status-badge ${stCls}" style="font-size:9px;padding:2px 6px;margin-bottom:2px;display:inline-block">${item.status}</span>` : ''}
            <div class="item-name" onclick="showEditItemModal('${safeId}')" style="cursor:pointer">${safeName}</div>
            <div class="item-sub">${[safeCat,safeCol].filter(Boolean).join(' · ')}</div>
          </div>
          <button onclick="event.stopPropagation();ctxItemOutfit(event,'${safeId}')" style="background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:0 2px;line-height:1;flex-shrink:0;margin-top:-2px" title="Outfit options">···</button>
        </div>
        ${itemTags.length ? `<div class="tag-bar" style="margin-top:4px" onclick="event.stopPropagation()">${itemTags.map(t=>`<button class="tag-pill" style="font-size:10px;padding:2px 6px" onclick="wardFilter('fTag','${t.replace(/'/g,"\\'")}');event.stopPropagation()">${t.replace(/</g,'&lt;')}</button>`).join('')}</div>` : ''}
      </div>
    </div>`;
  }

  root().innerHTML = `
<div class="page">
  <div class="topbar-centered">
    <div class="topbar-centered-title">Wardrobe</div>
    <button class="icon-btn topbar-centered-right" onclick="showAddItemModal()">+</button>
  </div>
  ${wardTabBar('wardrobe')}

  ${vibeModeBarHtml("wardFilter('_vibe',window._vibeMode)")}

  <div class="filter-bar">
    ${wchip('All cats', !fCat, "wardFilter('fCat','')")}
    ${cats.map(c=>wchip(c, fCat===c, `wardFilter('fCat','${c.replace(/'/g,"\\'")}')`) ).join('')}
  </div>
  <div class="filter-bar">
    ${wchip('All status', !fStatus, "wardFilter('fStatus','')")}
    ${WARD_STATUSES.map(s=>wchip(s, fStatus===s, `wardFilter('fStatus','${s.replace(/'/g,"\\'")}')`) ).join('')}
  </div>
  ${colours.length ? `<div class="filter-bar">
    ${wchip('All colours', !fColour, "wardFilter('fColour','')")}
    ${colours.map(c=>wchip(c, fColour===c, `wardFilter('fColour','${c.replace(/'/g,"\\'")}')`) ).join('')}
  </div>` : ''}

  <div class="search-wrap">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <input class="search-input" placeholder="Search items or tags…" oninput="filterWardItems(this.value)"/>
  </div>

  ${fVibe ? `<div style="margin-bottom:10px;font-size:12px;color:var(--accent);font-weight:600;display:flex;align-items:center;gap:6px">
    <span>🎨 Mode: ${fVibe.replace(/</g,'&lt;')}</span>
    <button onclick="setVibeMode('${fVibe.replace(/'/g,"\\'")}');renderWardrobeItems(window._wardFilters||{})" style="background:none;border:none;color:var(--text3);font-size:12px;cursor:pointer">✕ clear</button>
  </div>` : ''}

  <div class="item-grid" id="ward-grid">
    ${filtered.length
      ? filtered.map(itemCard).join('')
      : `<div class="muted" style="grid-column:1/-1;text-align:center;padding:32px">No items found — try clearing filters</div>`}
  </div>
</div>`;
}

// ── Item outfit actions ──
function ctxItemOutfit(e, itemId) {
  showCtx(e, [
    {label:'✏ Edit item',       fn: () => showEditItemModal(itemId)},
    {label:'➕ Add to outfit',   fn: () => addItemToOutfit(itemId)},
    {label:'🎨 Create outfit',   fn: () => createOutfitFromItem(itemId)},
  ]);
}

async function addItemToOutfit(itemId) {
  const outfits = await dbFetch(T.OUTFITS, {order:['created_at',false]});
  if (!outfits.length) {
    if (confirm('No outfits yet. Create one now?')) createOutfitFromItem(itemId);
    return;
  }
  // Show a picker modal listing existing outfits
  const listHtml = outfits.map(o => {
    let ids = []; try { ids = Array.isArray(o.item_ids)?o.item_ids:JSON.parse(o.item_ids||'[]'); } catch(e){}
    const already = ids.includes(itemId);
    // Use data-attributes to avoid quote conflicts in onclick
    const oId = String(o.id);
    const name = (o.name||'Untitled').replace(/</g,'&lt;');
    const rowStyle = already ? 'opacity:.5' : '';
    const cursorStyle = already ? 'default' : 'pointer';
    const alreadyNote = already ? '<div class="row-sub">Already in this outfit</div>' : '';
    const addBtn = already ? '' : '<button class="add-to-outfit-btn" data-outfit-id="' + oId + '" data-item-id="' + itemId + '" style="background:var(--accent-light);border:none;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;color:var(--text);cursor:pointer;font-family:inherit;white-space:nowrap">Add \u2192</button>';
    return '<div class="row" style="' + rowStyle + '">'
      + '<div class="row-left" style="cursor:' + cursorStyle + '">'
      + '<div class="row-title">' + name + '</div>'
      + alreadyNote
      + '</div>'
      + addBtn
      + '</div>';
  }).join('');
  showModal('Add to Outfit', '<div class="card" style="margin-bottom:0">' + listHtml + '</div>', null);
  // Attach delegated click handler after modal renders
  requestAnimationFrame(() => {
    document.querySelectorAll('.add-to-outfit-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        addItemToExistingOutfit(btn.dataset.outfitId, btn.dataset.itemId);
      });
    });
  });
}

async function addItemToExistingOutfit(outfitId, itemId) {
  const rows = await dbFetch(T.OUTFITS, {eq:{id:outfitId}});
  const outfit = rows[0]; if (!outfit) return;
  let ids = []; try { ids = Array.isArray(outfit.item_ids)?outfit.item_ids:JSON.parse(outfit.item_ids||'[]'); } catch(e){}
  if (!ids.includes(itemId)) {
    ids.push(itemId);
    await dbUpdate(T.OUTFITS, outfitId, {item_ids: JSON.stringify(ids)});
    showToast('Added to outfit: ' + (outfit.name||'Untitled'), 'ok');
  }
  // close modal
  document.querySelector('.overlay')?.remove();
}

async function createOutfitFromItem(itemId) {
  // Pre-select this item and open outfit modal
  window._invCache = window._invCache || await dbFetch(T.INVENTORY, {order:['item_name',true]});
  // temporarily set preselectId so showOutfitModal can pick it up
  window._preselectedItemId = itemId;
  showAddOutfitModal();
}

function wardFilter(key, val) {
  if (key === '_vibe') { renderWardrobeItems({...(window._wardFilters||{})}); return; }
  const f = window._wardFilters || {};
  renderWardrobeItems({fCat:f.fCat||'', fColour:f.fColour||'', fStatus:f.fStatus||'', fTag:f.fTag||'', [key]:val});
}

function filterWardItems(q) {
  const lq = q.toLowerCase();
  document.querySelectorAll('.item-card').forEach(card => {
    card.style.display = card.textContent.toLowerCase().includes(lq) ? '' : 'none';
  });
}

async function showAddItemModal() { showItemModal(null); }
async function showEditItemModal(id) { showItemModal(id); }

  const vibes    = [...new Set(allItems.map(r=>r.vibe).filter(Boolean))].sort();

  const silos    = [...new Set(allItems.map(r=>r.silhouette).filter(Boolean))].sort();

  showModal(title, `
    ${datalist('dl-wi-cat', cats)}

    ${datalist('dl-wi-season', seasons)}
    ${datalist('dl-wi-silo', silos)}

    ${datalist('dl-wi-set', setNames)}
    <div class="fg"><label>Item ID</label><input id="f-wi-id" value="${(ex?.item_id||'').replace(/"/g,'&quot;')}" placeholder="e.g. DRESS_001" autocomplete="off"/></div>
    <div class="fg"><label>Item Name</label><input id="f-wi-name" value="${(ex?.item_name||'').replace(/"/g,'&quot;')}"/></div>
    <div class="fg"><label>Category</label>${dlInput('f-wi-cat','dl-wi-cat',ex?.category||'','e.g. Dress, Top, Shorts')}</div>
    <div class="fg"><label>Colour</label><input id="f-wi-colour" value="${(ex?.colour||'').replace(/"/g,'&quot;')}"/></div>
    <div class="fg"><label>Status</label><select id="f-wi-status">
      ${WARD_STATUSES.map(s=>`<option value="${s}" ${currentStatus===s?'selected':''}>${s}</option>`).join('')}
    </select></div>
    <div class="fg"><label>Style Type</label><select id="f-wi-styletype">
      <option value="">— select —</option>
      ${WARD_STYLE_TYPES.map(s=>`<option value="${s}" ${currentStyleType===s?'selected':''}>${s}</option>`).join('')}
    </select></div>
    <div class="fg"><label>Tags <span style="font-weight:400;color:var(--text3)">(comma-separated)</span></label><input id="f-wi-tags" value="${(ex?.tags||'').replace(/"/g,'&quot;')}" placeholder="e.g. summer, beach, casual"/></div>
    <div class="fg"><label>Image URL</label><input id="f-wi-img" value="${(ex?.image||'').replace(/"/g,'&quot;')}" placeholder="https://…" type="url"/></div>
    <div class="fg"><label>Vibe</label>${dlInput('f-wi-vibe','dl-wi-vibe',ex?.vibe||'','e.g. Core Everyday, Artist / Visible')}</div>
    <div class="fg"><label>Shoot Level</label>${dlInput('f-wi-shoot','dl-wi-shoot',ex?.shoot_level||'')}</div>
    <div class="fg"><label>Season</label>${dlInput('f-wi-season','dl-wi-season',ex?.season||'','e.g. Spring/Summer')}</div>
    <div class="fg"><label>Silhouette</label>${dlInput('f-wi-silo','dl-wi-silo',ex?.silhouette||'')}</div>
    <div class="fg"><label>Set Name</label>${dlInput('f-wi-set','dl-wi-set',ex?.set_name||'')}</div>
    <div class="fg" style="display:flex;align-items:center;justify-content:space-between">
      <label style="text-transform:uppercase;font-size:11px;font-weight:600;letter-spacing:.06em;color:var(--text2)">Travel Friendly</label>
      <label class="tog"><input type="checkbox" id="f-wi-travel" ${ex?.travel_friendly?'checked':''}/><span class="tog-slider"></span></label>
    </div>
    <div class="fg"><label>Notes</label><input id="f-wi-notes" value="${(ex?.notes||'').replace(/"/g,'&quot;')}"/></div>
    ${editId ? `<button class="btn" style="background:var(--danger-light);color:var(--danger);margin-bottom:4px" onclick="delItem('${editId}')">Delete Item</button>` : ''}
  `, async () => {
    const row = {
      item_id:         v('f-wi-id')        || null,
      item_name:       v('f-wi-name')      || null,
      category:        v('f-wi-cat')       || null,
      colour:          v('f-wi-colour')    || null,
      status:          v('f-wi-status')    || 'Available',
      style_type:      v('f-wi-styletype') || null,
      tags:            v('f-wi-tags')      || null,
      image:           v('f-wi-img')       || null,
      vibe:            v('f-wi-vibe')      || null,
      shoot_level:     v('f-wi-shoot')     || null,
      season:          v('f-wi-season')    || null,
      silhouette:      v('f-wi-silo')      || null,
      set_name:        v('f-wi-set')       || null,
      travel_friendly: document.getElementById('f-wi-travel')?.checked ?? false,
      notes:           v('f-wi-notes')     || null,
    };
    if (editId) {
      const {error} = await getDB().from(T.INVENTORY).update(row).eq('item_id', editId);
      if (error) throw error;
    } else await dbInsert(T.INVENTORY, row);
    const f = window._wardFilters;
    if (f) renderWardrobeItems({...f});
    else   renderWardrobeHome();
  });
}

async function delItem(id) {
  document.querySelector('.overlay')?.remove();
  if (!confirm('Delete this item?')) return;
  const {error} = await getDB().from(T.INVENTORY).delete().eq('item_id', id);
  if (error) { showToast('Delete failed: ' + error.message, 'error'); return; }
  renderWardrobeItems({...(window._wardFilters||{})});
}

const OUTFIT_OCCASIONS = ['Casual','Work','Event','Travel'];

async function renderOutfits() {
  const [outfits, inventory] = await Promise.all([
    dbFetch(T.OUTFITS, {order:['created_at',false]}),
    dbFetch(T.INVENTORY, {order:['item_name',true]}),
  ]);
  window._invCache = inventory;

  const fOccasion = window._outfitFilterOccasion || '';
  const fTag      = window._outfitFilterTag      || '';
  const vibeMode  = window._vibeMode             || '';

  let displayed = outfits.filter(o => {
    if (fOccasion && o.occasion !== fOccasion) return false;
    if (fTag && !parseTags(o.tags).some(t=>t.toLowerCase().includes(fTag.toLowerCase()))) return false;
    return true;
  });
  // vibe-sort: matching outfits first
  if (vibeMode) {
    const vm = vibeMode.toLowerCase();
    displayed = [...displayed].sort((a, b) => {
      const aMatch = ((a.tags||'') + ' ' + (a.notes||'')).toLowerCase().includes(vm) ? 0 : 1;
      const bMatch = ((b.tags||'') + ' ' + (b.notes||'')).toLowerCase().includes(vm) ? 0 : 1;
      return aMatch - bMatch;
    });
  }

  function outfitCard(o) {
    let ids = [];
    try { ids = Array.isArray(o.item_ids) ? o.item_ids : JSON.parse(o.item_ids||'[]'); } catch(e){}
    const items = ids.map(id => inventory.find(i=>i.item_id===id||i.id===id)).filter(Boolean);
    const thumbs = items.slice(0,6).map(i => i.image
      ? `<img class="thumb" src="${i.image.replace(/"/g,'&quot;')}" alt="" loading="lazy" style="width:52px;height:66px;object-fit:cover;border-radius:6px;flex-shrink:0" onerror="this.style.display='none'">`
      : `<div class="thumb-placeholder" style="width:52px;height:66px">👗</div>`
    ).join('');
    const oTags = parseTags(o.tags);
    const safeId = String(o.id).replace(/"/g,'&quot;');
    return `<div class="card" style="padding:16px;margin-bottom:10px;cursor:pointer" onclick="showEditOutfitModal('${safeId}')">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div style="flex:1;min-width:0">
          <div class="row-title">${(o.name||'Untitled').replace(/</g,'&lt;')}</div>
          <div class="row-sub" style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:2px">
            <span>${items.length} item${items.length!==1?'s':''}</span>
            ${o.occasion ? `<span class="status-badge" style="background:var(--teal-light);color:var(--teal);font-size:9px;padding:2px 6px">${o.occasion.replace(/</g,'&lt;')}</span>` : ''}
          </div>
          ${o.project ? `<div class="row-sub" style="margin-top:3px;cursor:pointer;color:var(--accent)" onclick="event.stopPropagation();openProjectByTitle('${o.project.replace(/'/g,"\\'")}')">📁 ${o.project.replace(/</g,'&lt;')}</div>` : ''}
          ${o.notes ? `<div class="row-sub" style="margin-top:2px">${o.notes.replace(/</g,'&lt;')}</div>` : ''}
          ${oTags.length ? `<div class="tag-bar" style="margin-top:4px" onclick="event.stopPropagation()">${oTags.map(t=>`<button class="tag-pill" style="font-size:10px;padding:2px 6px" onclick="window._outfitFilterTag='${t.replace(/'/g,"\\'")}';renderOutfits()">${t.replace(/</g,'&lt;')}</button>`).join('')}</div>` : ''}
        </div>
        <button class="menu-btn" onclick="event.stopPropagation();ctxOutfit(event,'${safeId}')">···</button>
      </div>
      ${thumbs ? `<div class="thumb-row" style="margin-top:10px;gap:6px;flex-wrap:wrap">${thumbs}</div>` : ''}
    </div>`;
  }

  function ochip(label, active, fn) {
    return `<button class="filter-chip${active?' active':''}" onclick="${fn}">${label}</button>`;
  }

  root().innerHTML = `
<div class="page">
  <div class="topbar-centered">
    <div class="topbar-centered-title">Outfits</div>
    <button class="icon-btn topbar-centered-right" onclick="showAddOutfitModal()">+</button>
  </div>
  ${wardTabBar('outfits')}

  ${vibeModeBarHtml("renderOutfits()")}

  <div class="filter-bar">
    ${ochip('All', !fOccasion, "window._outfitFilterOccasion='';renderOutfits()")}
    ${OUTFIT_OCCASIONS.map(o=>ochip(o, fOccasion===o, `window._outfitFilterOccasion='${o}';renderOutfits()`)).join('')}
  </div>

  ${vibeMode ? `<div style="margin-bottom:10px;font-size:12px;color:var(--accent);font-weight:600;display:flex;align-items:center;justify-content:space-between">
    <span>✦ Styling: ${vibeMode.replace(/</g,'&lt;')}</span>
    <span style="font-size:11px;color:var(--text3);font-weight:400">${displayed.filter(o=>((o.tags||'')+' '+(o.notes||'')).toLowerCase().includes(vibeMode.toLowerCase())).length} matching</span>
  </div>` : ''}
  ${fTag ? `<div style="margin-bottom:10px;font-size:12px;color:var(--text2);display:flex;align-items:center;gap:8px">
    <span class="tag-pill" style="font-size:11px">${fTag.replace(/</g,'&lt;')}</span>
    <button onclick="window._outfitFilterTag='';renderOutfits()" style="background:none;border:none;color:var(--text3);font-size:12px;cursor:pointer">✕ clear tag</button>
  </div>` : ''}

  ${displayed.length
    ? displayed.map(outfitCard).join('')
    : '<div class="card"><div class="row"><div class="muted">No outfits yet — tap + to create one</div></div></div>'}
</div>`;
}

function ctxOutfit(e, id) {
  showCtx(e, [
    {label:'Edit',   fn: ()=>showEditOutfitModal(id)},
    {label:'Delete', danger:true, fn: async()=>{ if(confirm('Delete outfit?')){ await dbDelete(T.OUTFITS,id); renderOutfits(); }}},
  ]);
}

async function showAddOutfitModal()     { showOutfitModal(null); }
async function showEditOutfitModal(id)  { showOutfitModal(id); }

async function showOutfitModal(editId) {
  let ex = null;
  if (editId) { const r = await dbFetch(T.OUTFITS, {eq:{id:editId}}); ex=r[0]||null; }
  let inventory = window._invCache || await dbFetch(T.INVENTORY, {order:['item_name',true]});
  let selIds = [];
  if (ex?.item_ids) { try { selIds = Array.isArray(ex.item_ids) ? ex.item_ids : JSON.parse(ex.item_ids); } catch(e){} }
  // honour preselectItemId from createOutfitFromItem
  if (!editId && window._preselectedItemId) {
    if (!selIds.includes(window._preselectedItemId)) selIds = [window._preselectedItemId];
    window._preselectedItemId = null;
  }

  // Apply vibe mode filter to picker if active
  const vibeMode = window._vibeMode || '';
  let pickerItems = inventory;
  if (vibeMode) {
    const vibeFiltered = inventory.filter(i => (i.vibe||'').toLowerCase().includes(vibeMode.toLowerCase()));
    // always show selected items regardless
    const selectedInFull = selIds.map(id => inventory.find(i=>i.item_id===id||i.id===id)).filter(Boolean);
    pickerItems = [...new Map([...vibeFiltered,...selectedInFull].map(i=>[i.item_id||i.id,i])).values()];
  }

  const currentOccasion = ex?.occasion || '';
  const currentProject  = ex?.project  || '';
  const allProjects     = await dbFetch(T.PROJECTS, {});
  const projTitles      = allProjects.map(r => r.title).filter(Boolean);

  function pickerGrid(inv) {
    // Sort: selected first, then vibe-match, then rest
    const vm = vibeMode.toLowerCase();
    const sorted = [...inv].sort((a, b) => {
      const aSel   = selIds.includes(a.item_id||a.id) ? 0 : 1;
      const bSel   = selIds.includes(b.item_id||b.id) ? 0 : 1;
      if (aSel !== bSel) return aSel - bSel;
      if (vm) {
        const aM = (a.vibe||'').toLowerCase().includes(vm) ? 0 : 1;
        const bM = (b.vibe||'').toLowerCase().includes(vm) ? 0 : 1;
        return aM - bM;
      }
      return 0;
    });
    return sorted.map(i => {
      const key = String(i.item_id || i.id || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;');
      const sel = selIds.includes(i.item_id || i.id || '');
      const vibeMatch = vibeMode && (i.vibe||'').toLowerCase().includes(vibeMode.toLowerCase());
      const dimmed    = vibeMode && !vibeMatch && !sel;
      return `<div class="picker-item${sel?' selected':''}" onclick="togglePickerItem(this)" data-key="${key}" style="${dimmed?'opacity:.45':''}${vibeMatch&&!sel?';outline:1.5px solid var(--accent);outline-offset:-1.5px;border-radius:8px':''}">
        ${i.image ? `<img src="${i.image.replace(/"/g,'&quot;')}" alt="" loading="lazy" style="width:100%;aspect-ratio:3/4;object-fit:cover;display:block">` : `<div class="picker-ph">👗</div>`}
        <div class="picker-check">✓</div>
        <div class="picker-label">${(i.item_name||i.item_id||'').replace(/</g,'&lt;')}</div>
      </div>`;
    }).join('');
  }

  showModal(editId?'Edit Outfit':'Create Outfit', `
    ${datalist('dl-out-occasion', OUTFIT_OCCASIONS)}
    ${datalist('dl-out-project', projTitles)}
    <div class="fg"><label>Name</label><input id="f-out-name" value="${(ex?.name||'').replace(/"/g,'&quot;')}" placeholder="e.g. Event look"/></div>
    <div class="fg"><label>Occasion</label>${dlInput('f-out-occasion','dl-out-occasion', currentOccasion, 'e.g. Casual, Event, Work…')}</div>
    <div class="fg"><label>Project <span style="font-weight:400;color:var(--text3)">(optional)</span></label>${dlInput('f-out-project','dl-out-project', currentProject, 'Link to a project…')}</div>
    <div class="fg"><label>Tags <span style="font-weight:400;color:var(--text3)">(comma-separated)</span></label><input id="f-out-tags" value="${(ex?.tags||'').replace(/"/g,'&quot;')}" placeholder="e.g. summer, casual, date"/></div>
    <div class="fg"><label>Notes</label><input id="f-out-notes" value="${(ex?.notes||'').replace(/"/g,'&quot;')}"/></div>
    <div class="fg"><label>Select Items${vibeMode ? ` <span style="font-size:11px;color:var(--accent);font-weight:400">· showing ${vibeMode.replace(/</g,'&lt;')} vibe</span>` : ''}</label>
      <input id="outfit-picker-search" type="search" placeholder="Search items…" autocomplete="off"
        style="width:100%;padding:9px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;outline:none;margin-bottom:8px"
        oninput="filterPickerGrid('outfit-picker',this.value)"/>
      <div class="picker-grid" id="outfit-picker">${pickerGrid(pickerItems)}</div>
    </div>
  `, async () => {
    const name = v('f-out-name');
    if (!name) return alert('Enter a name.');
    const picked = [...document.querySelectorAll('#outfit-picker .picker-item.selected')].map(el=>el.dataset.key);
    const row = {
      name,
      item_ids: JSON.stringify(picked),
      occasion: v('f-out-occasion') || null,
      project:  v('f-out-project')  || null,
      tags:     v('f-out-tags')     || null,
      notes:    v('f-out-notes')    || null,
    };
    if (editId) await dbUpdate(T.OUTFITS, editId, row);
    else        await dbInsert(T.OUTFITS, row);
    renderOutfits();
  });
}

function togglePickerItem(el, key) {
  el.classList.toggle('selected');
}

// Filter picker grid items by search query — preserves selection state
function filterPickerGrid(gridId, query) {
  const q = query.trim().toLowerCase();
  const grid = document.getElementById(gridId);
  if (!grid) return;
  grid.querySelectorAll('.picker-item').forEach(el => {
    const label = (el.querySelector('.picker-label')?.textContent || '').toLowerCase();
    const key   = (el.dataset.key || '').toLowerCase();
    el.style.display = (!q || label.includes(q) || key.includes(q)) ? '' : 'none';
  });
}
